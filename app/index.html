<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CheckinSmart — Sistema de Gestión</title>
<script src="/assets/config.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f8f7f4;--surface:#fff;--surface-alt:#f1f0ec;
  --text:#1a1a1a;--text-secondary:#6b6b6b;--text-tertiary:#999;
  --primary:var(--cs-primario,#0288d1);--primary-light:#e1f5fe;--primary-hover:var(--cs-primario-dark,#0277bd);
  --accent:var(--cs-secundario,#e67e22);--accent-light:#fef3e2;
  --danger:#c0392b;--danger-light:#fdecea;
  --info:#2980b9;--info-light:#e3f2fd;
  --border:#e5e3de;--border-focus:#0288d1;
  --shadow-sm:0 1px 2px rgba(0,0,0,.05);
  --shadow-md:0 4px 12px rgba(0,0,0,.08);
  --shadow-lg:0 8px 30px rgba(0,0,0,.12);
  --radius:6px;--radius-lg:10px;
}
html{font-size:14px}
body{font-family:'DM Sans',system-ui,sans-serif;background:var(--bg);color:var(--text);line-height:1.5}
h1,h2,h3,h4{font-family:'Space Grotesk','DM Sans',sans-serif;font-weight:600}

.app{display:flex;min-height:100vh}
.sidebar{width:240px;background:var(--primary);color:#fff;display:flex;flex-direction:column;position:fixed;top:0;left:0;bottom:0;z-index:100;transition:transform .2s}
.sidebar-header{padding:16px 20px;border-bottom:1px solid rgba(255,255,255,.15);display:flex;align-items:center;gap:12px}
.sidebar-logo{width:44px;height:44px;border-radius:50%;object-fit:cover;border:2px solid rgba(255,255,255,.3);flex-shrink:0}
.sidebar-header h1{font-size:1rem;letter-spacing:.5px}
.sidebar-header small{opacity:.7;font-size:.75rem}
.sidebar-nav{flex:1;padding:12px 0;overflow-y:auto}
.nav-section{padding:0 12px;margin-bottom:8px}
.nav-section-title{font-size:.65rem;text-transform:uppercase;letter-spacing:1.5px;opacity:.5;padding:8px 12px 4px}
.nav-item{display:flex;align-items:center;gap:10px;padding:9px 12px;border-radius:var(--radius);cursor:pointer;font-size:.85rem;transition:background .15s;color:rgba(255,255,255,.8)}
.nav-item:hover{background:rgba(255,255,255,.1);color:#fff}
.nav-item.active{background:rgba(255,255,255,.15);color:#fff;font-weight:500}
.nav-item svg{width:18px;height:18px;flex-shrink:0}
.nav-badge{margin-left:auto;background:var(--accent);color:#fff;font-size:.65rem;padding:1px 7px;border-radius:10px;font-weight:600}
.sidebar-footer{padding:16px 20px;border-top:1px solid rgba(255,255,255,.15);font-size:.75rem}
.sidebar-link{color:rgba(255,255,255,.55);text-decoration:none;font-size:.73rem;padding:3px 0;display:flex;align-items:center;gap:6px;transition:color .15s}
.sidebar-link:hover{color:#fff}

.main{margin-left:240px;flex:1;min-width:0}
.topbar{height:56px;background:var(--surface);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;padding:0 24px;position:sticky;top:0;z-index:50}
.topbar-left{display:flex;align-items:center;gap:16px}
.topbar-left h2{font-size:1.1rem}
.topbar-right{display:flex;align-items:center;gap:8px}
.lang-btn{padding:4px 10px;border:1px solid var(--border);border-radius:var(--radius);background:var(--surface);font-size:.75rem;cursor:pointer;font-family:inherit}
.lang-btn.active{background:var(--primary);color:#fff;border-color:var(--primary)}
.content{padding:24px}

.stat-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:16px;margin-bottom:24px}
.stat-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:20px;transition:box-shadow .15s}
.stat-card:hover{box-shadow:var(--shadow-md)}
.stat-label{font-size:.75rem;color:var(--text-secondary);margin-bottom:4px}
.stat-value{font-size:1.8rem;font-weight:700;font-family:'Space Grotesk',sans-serif}
.stat-change{font-size:.7rem;margin-top:4px}
.stat-change.up{color:var(--primary)}

.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);overflow:hidden;margin-bottom:16px}
.card-header{padding:16px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.card-header h3{font-size:.95rem}
.card-body{padding:20px}

.table-wrapper{overflow-x:auto}
table{width:100%;border-collapse:collapse}
th{text-align:left;padding:10px 16px;font-size:.7rem;text-transform:uppercase;letter-spacing:.8px;color:var(--text-secondary);border-bottom:2px solid var(--border);font-weight:600}
td{padding:12px 16px;border-bottom:1px solid var(--border);font-size:.85rem;vertical-align:middle}
tr:hover td{background:var(--surface-alt)}
.badge{display:inline-block;padding:2px 10px;border-radius:20px;font-size:.7rem;font-weight:600}
.badge-green{background:var(--primary-light);color:var(--primary)}
.badge-orange{background:var(--accent-light);color:var(--accent)}
.badge-red{background:var(--danger-light);color:var(--danger)}
.badge-blue{background:var(--info-light);color:var(--info)}
.badge-gray{background:var(--surface-alt);color:var(--text-secondary)}

.btn{display:inline-flex;align-items:center;gap:6px;padding:8px 16px;border-radius:var(--radius);font-size:.8rem;font-weight:500;cursor:pointer;border:1px solid transparent;font-family:inherit;transition:all .15s}
.btn-primary{background:var(--primary);color:#fff;border-color:var(--primary)}
.btn-primary:hover{background:var(--primary-hover)}
.btn-outline{background:transparent;color:var(--text);border-color:var(--border)}
.btn-outline:hover{background:var(--surface-alt)}
.btn-danger{background:var(--danger);color:#fff}
.btn-sm{padding:5px 10px;font-size:.75rem}
.btn-icon{width:32px;height:32px;padding:0;display:inline-flex;align-items:center;justify-content:center;border-radius:var(--radius);border:1px solid var(--border);background:var(--surface);cursor:pointer}

.form-group{margin-bottom:16px}
.form-label{display:block;font-size:.75rem;font-weight:500;margin-bottom:4px;color:var(--text-secondary)}
.form-input{width:100%;padding:8px 12px;border:1px solid var(--border);border-radius:var(--radius);font-size:.85rem;font-family:inherit;background:var(--surface);transition:border-color .15s}
.form-input:focus{outline:none;border-color:var(--border-focus);box-shadow:0 0 0 3px rgba(15,81,50,.1)}
select.form-input{appearance:auto}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.form-row-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px}

.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.4);display:flex;align-items:center;justify-content:center;z-index:200;animation:fadeIn .15s}
.modal{background:var(--surface);border-radius:var(--radius-lg);width:90%;max-width:600px;max-height:85vh;overflow-y:auto;box-shadow:var(--shadow-lg);animation:slideUp .2s}
.modal-wide{max-width:min(96vw,1200px)!important;width:96%!important;max-height:92vh!important}
.modal-wide .modal-header h3{font-size:1.1rem}
.modal-wide .modal-body{padding:24px}
.modal-wide .stay-summary{grid-template-columns:repeat(5,1fr)}
.modal-wide .detail-tabs{display:flex;gap:4px;margin-bottom:20px}
.modal-wide .detail-tab{flex:1;text-align:center;padding:10px 8px;font-size:.9rem}
/* ===== PIN LOGIN ===== */
.pin-overlay{position:fixed;inset:0;background:linear-gradient(135deg,var(--primary-hover) 0%,var(--primary) 100%);display:flex;align-items:center;justify-content:center;z-index:9999;flex-direction:column;gap:24px}
.pin-card{background:white;border-radius:20px;padding:40px 36px;width:360px;box-shadow:0 24px 80px rgba(0,0,0,.4);text-align:center}
.pin-card h2{color:var(--primary);margin-bottom:4px;font-size:1.4rem}
.pin-card .pin-sub{color:#888;font-size:.82rem;margin-bottom:20px}
.pin-user-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(120px,1fr));gap:10px;margin-bottom:20px}
.pin-user-btn{padding:14px 10px;border:2px solid #e0e0e0;border-radius:12px;cursor:pointer;background:white;text-align:center;font-size:.88rem;font-weight:600;transition:all .15s;line-height:1.3}
.pin-user-btn:hover{border-color:var(--primary);background:var(--primary-light)}
.pin-user-btn.selected{border-color:var(--primary);background:var(--primary-light)}
.pin-user-btn .pin-role{font-size:.65rem;color:#aaa;text-transform:uppercase;margin-top:3px;font-weight:400}
.pin-display{font-size:2.2rem;letter-spacing:12px;height:60px;display:flex;align-items:center;justify-content:center;background:#f7f7f7;border-radius:10px;margin:0 0 16px;font-family:monospace;border:2px solid #e8e8e8;color:#222;min-height:60px}
.pin-numpad{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;max-width:230px;margin:0 auto}
.pin-btn{height:58px;font-size:1.3rem;font-weight:700;border:none;border-radius:12px;cursor:pointer;background:#f2f2f2;color:#222;transition:all .12s;outline:none}
.pin-btn:hover{background:#e0e0e0;transform:scale(1.04)}
.pin-btn:active{transform:scale(.95);background:#d0d0d0}
.pin-btn.pin-del{background:#fff0f0;color:#c62828;font-size:1rem}
.pin-btn.pin-ok{background:#e8f5e9;color:#2e7d32;font-size:.95rem;font-weight:700}
.pin-btn.pin-empty{background:transparent;cursor:default;pointer-events:none}
.pin-err{color:#c62828;font-size:.82rem;min-height:18px;margin-top:6px;font-weight:600}
.pin-ver{color:rgba(255,255,255,.45);font-size:.7rem;text-align:center}
/* ===== USER MANAGEMENT ===== */
.user-row{display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid var(--border)}
.user-row:last-child{border-bottom:none}
.user-badge-role{font-size:.65rem;font-weight:700;padding:2px 7px;border-radius:8px;text-transform:uppercase;background:#e8f5e9;color:#2e7d32}
.user-badge-role.admin{background:#e3f2fd;color:#1565c0}
/* ===== TURNO ACTIVO (topbar) ===== */
.turno-chip{display:flex;align-items:center;gap:6px;background:var(--primary);color:white;border-radius:20px;padding:4px 12px;font-size:.8rem;font-weight:600;cursor:pointer;border:none;white-space:nowrap}
.turno-chip:hover{background:#0a3d26}
/* ===== WELCOME / GOODBYE ANIMATIONS ===== */
@keyframes wc-in{from{opacity:0;transform:scale(.72) translateY(24px)}to{opacity:1;transform:scale(1) translateY(0)}}
@keyframes wc-bg{from{opacity:0}to{opacity:1}}
@keyframes wc-pulse{0%,100%{opacity:.7;transform:scale(1)}50%{opacity:1;transform:scale(1.04)}}
.wc-overlay{position:fixed;inset:0;z-index:10000;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:20px;animation:wc-bg .4s ease both}
.wc-overlay.welcome{background:linear-gradient(145deg,var(--primary-hover) 0%,var(--primary) 55%,var(--primary-hover) 100%)}
.wc-overlay.goodbye{background:linear-gradient(145deg,#1a237e 0%,#283593 55%,#0d47a1 100%)}
.wc-card{background:rgba(255,255,255,.97);border-radius:28px;padding:52px 68px;text-align:center;box-shadow:0 28px 90px rgba(0,0,0,.55);animation:wc-in .65s cubic-bezier(.34,1.56,.64,1) both;max-width:460px;width:90%}
.wc-logo{height:76px;border-radius:12px;margin-bottom:18px;box-shadow:0 6px 24px rgba(0,0,0,.18);animation:wc-pulse 2.5s ease-in-out infinite}
.wc-greeting{font-size:.8rem;color:#aaa;text-transform:uppercase;letter-spacing:3px;margin-bottom:6px}
.wc-name{font-size:2.6rem;font-weight:900;line-height:1.1;margin-bottom:8px}
.wc-name.green{background:linear-gradient(135deg,var(--primary),var(--primary-hover));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.wc-name.blue{background:linear-gradient(135deg,#1565c0,#283593);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.wc-role{font-size:.85rem;color:#888;margin-bottom:18px}
.wc-time-chip{display:inline-flex;align-items:center;gap:8px;border-radius:24px;padding:7px 18px;font-size:.85rem;font-weight:700}
.wc-time-chip.green{background:var(--primary-light);color:var(--primary);border:1px solid var(--border-focus)}
.wc-time-chip.blue{background:#e3f2fd;color:#1565c0;border:1px solid #90caf9}
.wc-warn-box{background:#fff8e1;border:1px solid #ffe082;border-radius:12px;padding:10px 18px;font-size:.82rem;color:#e65100;margin-top:14px;line-height:1.5}
.wc-hint{color:rgba(255,255,255,.4);font-size:.72rem;letter-spacing:1px;cursor:pointer;margin-top:4px}
.wc-hint:hover{color:rgba(255,255,255,.7)}
/* ===== SIGNAGE / CARTELERÍA ===== */
.cartel-templates{display:grid;grid-template-columns:repeat(auto-fill,minmax(130px,1fr));gap:10px;margin-bottom:16px}
.cartel-tpl-btn{border-radius:12px;padding:14px 10px;border:2px solid var(--border);cursor:pointer;text-align:center;font-size:.82rem;font-weight:600;background:white;transition:all .15s;line-height:1.4}
.cartel-tpl-btn:hover{border-color:var(--primary);background:var(--surface-alt)}
.cartel-tpl-btn.active{border-color:var(--primary);background:#e8f5e9}
.cartel-preview-wrap{border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;box-shadow:var(--shadow);background:white;aspect-ratio:1/1.414;position:relative;max-width:320px;margin:0 auto}
/* ===== ESCANER EN FICHA ===== */
.scan-adult-tabs{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:14px}
.scan-adult-btn{padding:6px 12px;border:2px solid var(--border);border-radius:20px;cursor:pointer;font-size:.8rem;font-weight:600;background:white;transition:all .15s}
.scan-adult-btn:hover{border-color:var(--primary)}
.scan-adult-btn.done{border-color:var(--primary);background:#e8f5e9;color:var(--primary)}
.scan-adult-btn.active{border-color:var(--primary);background:var(--primary);color:white}
.scan-adult-btn.warn{border-color:var(--accent);background:#fff8e1}
.scan-preview{width:100%;max-width:200px;border:1px solid var(--border);border-radius:var(--radius);display:block;margin-top:8px}
.scan-slot{background:var(--surface-alt);border:2px dashed var(--border);border-radius:var(--radius);padding:14px;text-align:center;font-size:.8rem;color:var(--text-tertiary);margin-top:8px;cursor:pointer}
.scan-slot:hover{border-color:var(--primary);color:var(--primary)}
.scan-warn-banner{background:#fff8e1;border:1px solid #ffe082;border-radius:var(--radius);padding:10px 14px;font-size:.82rem;color:#e65100;margin-bottom:12px;display:flex;align-items:center;gap:8px}
.scan-queue-banner{background:#e3f2fd;border:1px solid #90caf9;border-radius:var(--radius);padding:10px 14px;font-size:.82rem;color:#1565c0;margin-bottom:12px;display:flex;align-items:center;gap:8px;cursor:pointer}
/* === C5 guest row === */
tr.c5-row{background:#f3e5f5!important}
tr.c5-row td{border-bottom:1px solid #ce93d8!important}
tr.c5-row td:first-child{box-shadow:inset 4px 0 0 #7b1fa2}
.c5-badge{display:inline-block;width:8px;height:8px;border-radius:50%;background:#7b1fa2;margin-left:5px;vertical-align:middle;title:'cobro especial'}
/* === C5 cobro overlay inside modal === */
.c5-overlay{position:absolute;inset:0;background:rgba(255,255,255,.97);z-index:10;display:flex;align-items:center;justify-content:center;border-radius:var(--radius);padding:32px}
.c5-auth-box{background:white;border-radius:16px;padding:28px 24px;width:300px;text-align:center;box-shadow:0 8px 32px rgba(123,31,162,.2);border:2px solid #e1bee7}
.modal-body{position:relative}
/* ===== SHIFT LOG ===== */
.slog-entry{display:flex;gap:10px;padding:6px 0;border-bottom:1px solid var(--border);font-size:.82rem;align-items:flex-start}
.slog-ts{color:var(--text-tertiary);white-space:nowrap;font-family:monospace;font-size:.78rem;min-width:80px}
.slog-action{font-weight:700;min-width:80px;font-size:.78rem}
.slog-details{color:var(--text-secondary)}
.modal-header{padding:20px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.modal-header h3{font-size:1rem}
.modal-body{padding:20px}
.modal-footer{padding:16px 20px;border-top:1px solid var(--border);display:flex;justify-content:flex-end;gap:8px}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes slideUp{from{transform:translateY(20px);opacity:0}to{transform:translateY(0);opacity:1}}

.pitch-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(64px,1fr));gap:6px}
.pitch-cell{aspect-ratio:1;border-radius:var(--radius);display:flex;flex-direction:column;align-items:center;justify-content:center;font-size:.65rem;font-weight:600;cursor:pointer;border:2px solid transparent;transition:all .15s}
.pitch-cell.free{background:#e8f5e9;color:#2e7d32;border-color:#c8e6c9}
.pitch-cell.free:hover{border-color:#2e7d32;box-shadow:var(--shadow-sm)}
.pitch-cell.occupied{background:#ffebee;color:#c62828;border-color:#ffcdd2}
.pitch-cell.reserved{background:#fff3e0;color:#e65100;border-color:#ffe0b2}
.pitch-cell.maintenance{background:#eceff1;color:#546e6a;border-color:#cfd8dc}
.pitch-cell-num{font-size:.8rem;font-weight:700}
.pitch-cell-type{font-size:.5rem;opacity:.8}

.service-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:12px}
.service-card{padding:16px;border-radius:var(--radius);border:1px solid var(--border);background:var(--surface)}
.service-icon{font-size:1.5rem;margin-bottom:8px}
.service-name{font-size:.85rem;font-weight:600;margin-bottom:4px}

/* CSS Bar Chart */
.bar-chart{display:flex;align-items:flex-end;gap:8px;height:180px;padding:0 4px}
.bar-col{flex:1;display:flex;flex-direction:column;align-items:center;gap:4px}
.bar-fill{width:100%;border-radius:4px 4px 0 0;transition:height .4s ease;min-width:24px}
.bar-label{font-size:.65rem;color:var(--text-secondary)}
.bar-value{font-size:.65rem;font-weight:600}

/* CSS Pie/Donut */
.donut-chart{position:relative;width:180px;height:180px;margin:0 auto}
.donut-center{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;flex-direction:column}
.donut-center-value{font-size:1.4rem;font-weight:700;font-family:'Space Grotesk',sans-serif}
.donut-center-label{font-size:.65rem;color:var(--text-secondary)}
.legend{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;margin-top:12px}
.legend-item{display:flex;align-items:center;gap:4px;font-size:.7rem}
.legend-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}

.progress-bar-h{height:8px;background:var(--border);border-radius:4px;overflow:hidden}
.progress-bar-h-fill{height:100%;border-radius:4px;transition:width .3s}

.tabs{display:flex;gap:2px;border-bottom:2px solid var(--border);margin-bottom:20px}
.tab{padding:10px 16px;font-size:.8rem;cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-2px;color:var(--text-secondary);font-weight:500;transition:all .15s}
.tab.active{color:var(--primary);border-bottom-color:var(--primary)}
.tab:hover{color:var(--text)}

.toast{position:fixed;bottom:24px;right:24px;background:#333;color:#fff;padding:12px 20px;border-radius:var(--radius);font-size:.8rem;z-index:300;animation:slideUp .3s;box-shadow:var(--shadow-lg)}
.toast.success{background:var(--primary)}
.toast.error{background:var(--danger)}
.detail-tabs{display:flex;gap:0;border-bottom:2px solid var(--border);margin-bottom:20px}
.detail-tab{padding:10px 18px;font-size:.82rem;font-weight:500;cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-2px;color:var(--text-secondary);transition:all .15s}
.detail-tab.active{color:var(--primary);border-bottom-color:var(--primary);font-weight:600}
.detail-tab:hover{color:var(--text)}
.stay-summary{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:16px}
.stay-box{background:var(--surface-alt);border-radius:var(--radius);padding:14px;text-align:center}
.stay-box-label{font-size:.7rem;text-transform:uppercase;letter-spacing:1px;color:var(--text-secondary);margin-bottom:4px}
.stay-box-val{font-size:1.25rem;font-weight:700;font-family:'Space Grotesk',sans-serif}
.move-pitch-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(70px,1fr));gap:6px;max-height:220px;overflow-y:auto;border:1px solid var(--border);border-radius:var(--radius);padding:10px;margin:12px 0}
.move-pitch-cell{border-radius:var(--radius);padding:8px 4px;text-align:center;font-size:.7rem;font-weight:600;cursor:pointer;border:2px solid transparent;transition:all .15s}
.move-pitch-cell.avail{background:#e8f5e9;color:#2e7d32;border-color:#c8e6c9}
.move-pitch-cell.avail:hover{border-color:#2e7d32;transform:scale(1.05)}
.move-pitch-cell.conflict{background:#ffebee;color:#c62828;border-color:#ffcdd2;cursor:default;opacity:.6}
.move-pitch-cell.current{background:var(--primary);color:#fff;border-color:var(--primary);cursor:default}
.move-pitch-cell.chosen{background:var(--accent);color:#fff;border-color:var(--accent)}
.alert-box{padding:10px 14px;border-radius:var(--radius);font-size:.82rem;margin:10px 0;display:flex;align-items:flex-start;gap:8px}

.store-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:14px;margin-top:16px}

.prod-card.thetford{border-top:3px solid #0071CE}
.prod-img{height:120px;display:flex;align-items:center;justify-content:center;background:var(--surface-alt);font-size:3rem;position:relative;overflow:hidden}

.prod-body{padding:12px}
.prod-name{font-size:.85rem;font-weight:600;margin-bottom:4px;line-height:1.3}
.prod-cat{font-size:.65rem;text-transform:uppercase;letter-spacing:1px;color:var(--text-secondary);margin-bottom:8px}

.cart-title{font-size:1rem;font-weight:600;margin-bottom:14px;padding-bottom:10px;border-bottom:1px solid var(--border)}

.cart-item{display:flex;align-items:center;gap:8px;padding:7px 0;border-bottom:1px solid var(--border);font-size:.82rem}
.cart-item-name{flex:1;font-weight:500}
.cart-qty-ctrl{display:flex;align-items:center;gap:6px}
.cart-qty-btn{width:22px;height:22px;border-radius:50%;border:1px solid var(--border);background:var(--surface);cursor:pointer;font-size:.9rem;display:flex;align-items:center;justify-content:center}

.closed-tag{display:inline-block;background:#e8f5e9;color:#1b5e20;padding:2px 10px;border-radius:12px;font-size:.75rem;font-weight:600}

const NATIONALITIES=['España','Alemania','Francia','Reino Unido','Países Bajos','Italia','Portugal','Bélgica','Suiza','Dinamarca','Suecia','Noruega','Austria','Polonia','Irlanda','USA','Canadá','Australia'];

const PIE_COLORS=['#0288d1','#e67e22','#2980b9','#8e44ad','#c0392b','#16a085','#f39c12','#2c3e50'];

function genPitches(){
  var p=[], id=1;
  ZONES.forEach(function(z){
    var c=z==='A'?25:z==='B'?25:z==='C'?20:z==='D'?20:15;
    for(var i=1;i<=c;i++){
      var r=Math.random(), s=r<.55?'occupied':r<.8?'free':r<.92?'reserved':'maintenance';
      p.push({id:id++,code:z+String(i).padStart(2,'0'),zone:z,status:s,electricity:Math.random()>.2,water:Math.random()>.15,size:Math.random()>.5?'large':'standard'});
    }
  });
  // VIRTUAL TRANSIT PITCHES (SALA DE ESPERA)
  for(var v=1; v<=4; v++) {
    p.push({id:id++,code:'ESPERA-'+v,zone:'TRÁNSITO',status:'free',electricity:false,water:false,size:'virtual'});
  }
  // PARKING PITCHES
  for(var pk=1; pk<=15; pk++) {
    p.push({id:id++,code:'PK-'+String(pk).padStart(2,'0'),zone:'PARKING',status:'free',electricity:false,water:false,size:'parking'});
  }
  return p;
}

function genGuests(pitches){

    var da=Math.floor(Math.random()*5);

// ===== SIGNATURE PAD (Wacom + touch + mouse) =====
function SignaturePad(props){
  var canvasRef=useRef(null);
  var drawing=useRef(false);
  var lastPt=useRef(null);
  var _hist=useState([]),history=_hist[0],setHistory=_hist[1];
  var _empty=useState(!props.value),isEmpty=_empty[0],setIsEmpty=_empty[1];

  useEffect(function(){
    if(!canvasRef.current)return;
    var c=canvasRef.current;
    var ratio=window.devicePixelRatio||1;
    var w=c.offsetWidth,h=c.offsetHeight||180;
    c.width=w*ratio;c.height=h*ratio;
    var ctx=c.getContext('2d');
    ctx.scale(ratio,ratio);
    ctx.fillStyle='#fafafa';ctx.fillRect(0,0,w,h);
    if(props.value){var img=new Image();img.onload=function(){ctx.drawImage(img,0,0,w,h);};img.src=props.value;}
  },[]);

  function getPos(ev,c){
    var r=c.getBoundingClientRect(),ratio=window.devicePixelRatio||1;
    var src=ev.touches?ev.touches[0]:ev;
    return {x:(src.clientX-r.left),y:(src.clientY-r.top)};
  }

  function startDraw(ev){
    ev.preventDefault();
    var c=canvasRef.current;if(!c)return;
    drawing.current=true;
    var pt=getPos(ev,c);lastPt.current=pt;
    var ctx=c.getContext('2d');
    ctx.beginPath();ctx.arc(pt.x,pt.y,ev.pressure?Math.max(1,ev.pressure*3):1.2,0,Math.PI*2);
    ctx.fillStyle='#111';ctx.fill();
    setIsEmpty(false);
  }
  function moveDraw(ev){
    ev.preventDefault();
    if(!drawing.current||!canvasRef.current)return;
    var c=canvasRef.current,ctx=c.getContext('2d');
    var pt=getPos(ev,c),lp=lastPt.current;
    var pressure=ev.pressure!==undefined?ev.pressure:0.5;
    ctx.beginPath();ctx.moveTo(lp.x,lp.y);ctx.lineTo(pt.x,pt.y);
    ctx.strokeStyle='#111';ctx.lineWidth=Math.max(0.8,pressure*4);
    ctx.lineCap='round';ctx.lineJoin='round';ctx.stroke();
    lastPt.current=pt;
  }
  function endDraw(ev){
    if(!drawing.current)return;
    drawing.current=false;
    if(canvasRef.current){
      var snap=canvasRef.current.toDataURL('image/png');
      setHistory(function(h){return h.concat([snap]);});
      if(props.onChange)props.onChange(snap);
    }
  }

  function clearSig(){
    var c=canvasRef.current;if(!c)return;
    var ctx=c.getContext('2d');
    ctx.fillStyle='#fafafa';ctx.fillRect(0,0,c.width,c.height);
    setIsEmpty(true);setHistory([]);
    if(props.onChange)props.onChange(null);
  }
  function undoSig(){
    if(history.length<2)return clearSig();
    var prev=history[history.length-2];
    var c=canvasRef.current;if(!c)return;
    var img=new Image();
    img.onload=function(){var ctx=c.getContext('2d');ctx.fillStyle='#fafafa';ctx.fillRect(0,0,c.width,c.height);ctx.drawImage(img,0,0,c.offsetWidth,c.offsetHeight);};
    img.src=prev;
    setHistory(function(h){return h.slice(0,-1);});
    if(props.onChange)props.onChange(prev);
  }

  return e('div',null,
    e('div',{className:'sig-canvas-wrap'+(isEmpty?'':' has-sig')},
      e('canvas',{ref:canvasRef,style:{height:180},
        onPointerDown:startDraw,onPointerMove:moveDraw,onPointerUp:endDraw,onPointerLeave:endDraw,
        onTouchStart:startDraw,onTouchMove:moveDraw,onTouchEnd:endDraw,
        onMouseDown:startDraw,onMouseMove:moveDraw,onMouseUp:endDraw,onMouseLeave:endDraw
      })
    ),
    e('div',{className:'sig-toolbar'},
      e('button',{className:'btn btn-sm btn-outline',onClick:undoSig,disabled:history.length===0},'↩ Deshacer'),
      e('button',{className:'btn btn-sm btn-outline',style:{color:'var(--danger)'},onClick:clearSig},'🗑 Borrar'),
      isEmpty?null:e('button',{className:'btn btn-sm btn-primary',onClick:function(){
        if(canvasRef.current&&props.onSave)props.onSave(canvasRef.current.toDataURL('image/png'));
      }},'💾 Guardar firma'),
      e('span',{className:'sig-hint'},'Compatible con Wacom · ratón · pantalla táctil')
    )
  );
}

    offset+=dash;

// ==================== SCANNER HELPERS ====================
var AMB_SQ_KEY=_csKey('sq');
function _parseMRZ(lines){
  var l1=lines[0]||'',l2=lines[1]||'';
  if(l2.length<44) return null;
  var docNum=l2.substring(0,9).replace(/</g,'');
  var dob=l2.substring(13,19);
  var nat=l2.substring(10,13).replace(/</g,'');
  var namePart=l1.substring(5).replace(/</g,' ').trim();
  var nameSplit=namePart.split('  ');
  var surname=(nameSplit[0]||'').trim();
  var firstname=(nameSplit[1]||'').trim();
  var yy=parseInt(dob.substring(0,2),10);
  var year=(yy>25?1900:2000)+yy;
  var birthDate=year+'-'+dob.substring(2,4)+'-'+dob.substring(4,6);
  var docType=l2.charAt(0)==='P'?'Pasaporte':'DNI';
  return{name:firstname,surname:surname,idDoc:docNum,nationality:nat,birthDate:birthDate,docType:docType};
}
function _getAgeFromBirth(bd){
  if(!bd) return null;
  var d=new Date(bd),now=new Date();
  var age=now.getFullYear()-d.getFullYear();
  if(now.getMonth()<d.getMonth()||(now.getMonth()===d.getMonth()&&now.getDate()<d.getDate())) age--;
  return age;
}
function _loadScanQueue(){try{var q=JSON.parse(localStorage.getItem(AMB_SQ_KEY));if(q)return q;}catch(e2){}return [];}
function _saveScanQueue(q){localStorage.setItem(AMB_SQ_KEY,JSON.stringify(q));}

// ==================== ESCANER TAB (inside ficha) ====================
function EscanerTab(props){
  var g=props.guest,setGuests=props.setGuests,showToast=props.showToast;
  var adults=g.adults||1;
  var scans=g.dniScans||[];
  var _ai=useState(0),activeIdx=_ai[0],setActiveIdx=_ai[1];
  var _mrz=useState(''),mrzText=_mrz[0],setMrzText=_mrz[1];
  var _nm=useState(''),scanName=_nm[0],setScanName=_nm[1];
  var _nid=useState(''),scanId=_nid[0],setScanId=_nid[1];
  var _phF=useState(null),scanPhotoF=_phF[0],setScanPhotoF=_phF[1];
  var _phB=useState(null),scanPhotoB=_phB[0],setScanPhotoB=_phB[1];
  var _mode=useState('photo'),scanMode=_mode[0],setScanMode=_mode[1];

  useEffect(function(){
    var existing=scans.find(function(s){return s.idx===activeIdx;})||null;
    if(existing){
      setScanName(existing.name||'');setScanId(existing.idDoc||'');
      setScanPhotoF(existing.photoFront||existing.photo||null);
      setScanPhotoB(existing.photoBack||null);
    } else {
      setScanName('');setScanId('');setScanPhotoF(null);setScanPhotoB(null);setMrzText('');
    }
  },[activeIdx,g.id]);

  function makePhotoReader(setter){
    return function(ev){
      var file=ev.target.files[0];if(!file)return;
      var rd=new FileReader();
      rd.onload=function(e2){setter(e2.target.result);};
      rd.readAsDataURL(file);
    };
  }
  function parseMRZ(){
    var lines=mrzText.split('\n').map(function(l){return l.trim();}).filter(Boolean);
    var res=_parseMRZ(lines);
    if(!res){showToast('MRZ no reconocido. Verifica el formato.','error');return;}
    setScanName(res.name+' '+res.surname);
    setScanId(res.idDoc);
    showToast('MRZ leído: '+res.name+' '+res.surname,'success');
  }
  function saveScan(){
    if(!scanName.trim()&&!scanId.trim()&&!scanPhotoF){showToast('Añade al menos el nombre, documento o cara frontal','error');return;}
    if(!scanPhotoB){showToast('Falta la cara trasera del documento (obligatoria)','warn');}
    var newScan={idx:activeIdx,name:scanName.trim(),idDoc:scanId.trim(),
      photoFront:scanPhotoF,photoBack:scanPhotoB,photo:scanPhotoF,scannedAt:new Date().toISOString()};
    var newScans=scans.filter(function(s){return s.idx!==activeIdx;}).concat([newScan]);
    setGuests(function(prev){return prev.map(function(x){return x.id===g.id?Object.assign({},x,{dniScans:newScans}):x;});});
    showToast('Escáner adulto '+(activeIdx+1)+' guardado','success');
  }
  function deleteScan(idx){
    var newScans=scans.filter(function(s){return s.idx!==idx;});
    setGuests(function(prev){return prev.map(function(x){return x.id===g.id?Object.assign({},x,{dniScans:newScans}):x;});});
    if(idx===activeIdx){setScanName('');setScanId('');setScanPhoto(null);setMrzText('');}
    showToast('Escáner eliminado','success');
  }

  // Check scan queue for pending scans from reservas-online
  var queue=_loadScanQueue();
  var pendingForGuest=queue.filter(function(q2){
    var nm=((g.name||'')+' '+(g.surname||'')).toLowerCase();
    return (q2.guestName&&(g.surname||'')&&q2.guestName.toLowerCase().indexOf((g.surname||'').toLowerCase())>=0)||
           (q2.bookCode&&g.bookCode&&q2.bookCode===g.bookCode);
  });

  function importQueueScan(qItem){
    var nextIdx=scans.length;
    var newScan={idx:nextIdx,name:qItem.guestName||'',idDoc:qItem.idDoc||'',photo:qItem.photo||null,scannedAt:qItem.ts,fromWeb:true};
    var newScans=scans.concat([newScan]);
    setGuests(function(prev){return prev.map(function(x){return x.id===g.id?Object.assign({},x,{dniScans:newScans}):x;});});
    var newQueue=queue.filter(function(q2){return q2.id!==qItem.id;});
    _saveScanQueue(newQueue);
    showToast('Escáner de la web incorporado','success');
  }

  var adultSlots=Array.from({length:adults},function(_,i){return i;});

  return e('div',null,
    adults>1?e('div',{className:'scan-warn-banner'},
      '⚠️ Esta reserva tiene ',e('strong',null,adults+' adultos'),'. Cada uno debe tener su documento escaneado (',scans.length,'/',adults,' completados)'
    ):null,
    pendingForGuest.length>0?e('div',{className:'scan-queue-banner',onClick:function(){importQueueScan(pendingForGuest[0]);}},
      '📥 Hay ',e('strong',null,pendingForGuest.length),
      ' escaner(es) enviado(s) desde la web de reservas. Haz clic para incorporar.'
    ):null,

function ReservationDetailModal(props){
  var t=props.t,g=props.guest,pitches=props.pitches,allGuests=props.allGuests;
  var onMove=props.onMove,onExtend=props.onExtend,onClose=props.onClose,showToast=props.showToast;
  var invoices=props.invoices||[],setInvoices=props.setInvoices||function(){};
  var setGuests=props.setGuests||function(){};
  var logActionDM=props.logAction||function(){};
  var _tab=useState('summary'),tab=_tab[0],setTab=_tab[1];
  var _np=useState(null),chosenPitch=_np[0],setChosenPitch=_np[1];
  var _nd=useState(g.dateOut),newDateOut=_nd[0],setNewDateOut=_nd[1];
  var _spD=useState(''),spDate=_spD[0],setSpDate=_spD[1];
  var _spP=useState(''),spPitch=_spP[0],setSpPitch=_spP[1];
  var _pay=useState('card'),payMethod=_pay[0],setPayMethod=_pay[1];
  var _ca=useState(''),cardAmount=_ca[0],setCardAmount=_ca[1];
  var _csh=useState(''),cashAmount=_csh[0],setCashAmount=_csh[1];
  // === C5 secret trigger ===
  var _lc5=useState({n:0,t:0}),lc5=_lc5[0],setLc5=_lc5[1];
  var _sc5a=useState(false),showC5A=_sc5a[0],setShowC5A=_sc5a[1];
  var _c5pin=useState(''),c5pin=_c5pin[0],setC5pin=_c5pin[1];
  var _c5err=useState(''),c5err=_c5err[0],setC5err=_c5err[1];
  var _showC5P=useState(false),showC5Pay=_showC5P[0],setShowC5Pay=_showC5P[1];
  var _c5pm=useState('cash'),c5pm=_c5pm[0],setC5pm=_c5pm[1];

  var prices=props.prices||PITCH_PRICE;
  var nights=Math.max(1,Math.round((new Date(g.dateOut)-new Date(g.dateIn))/86400000));
  var base=prices[g.vehicleType]||PITCH_PRICE[g.vehicleType]||16;

  // find invoice for this guest
  var guestInvoice=invoices.find(function(i){return i.guestId===g.id&&i.type==='invoice'})||null;
  var guestCredit=invoices.find(function(i){return i.guestId===g.id&&i.type==='credit'})||null;

  function pitchConflict(code,din,dout,excludeId){
    return allGuests.find(function(x){
      if(x.id===excludeId||x.status==='checkedOut'||x.status==='cancelled') return false;
      var segs = x.segments || [{pitchCode:x.pitchCode, dateIn:x.dateIn, dateOut:x.dateOut}];
      return segs.some(function(s){ return s.pitchCode===code && s.dateIn<dout && s.dateOut>din; });
    })||null;
  }

  var pitchList=pitches.map(function(p){
    var isCurrent=p.code===g.pitchCode;
    var conflict=!isCurrent?pitchConflict(p.code,g.dateIn,g.dateOut,g.id):null;
    return {p:p,isCurrent:isCurrent,conflict:conflict};
  });

  var extNights=Math.max(1,Math.round((new Date(newDateOut)-new Date(g.dateIn))/86400000));
  var extTotal=extNights*base;
  var extConflict=newDateOut>g.dateOut?pitchConflict(g.pitchCode,g.dateOut,newDateOut,g.id):null;
  var maxExtDate=null;
  if(extConflict){var d=new Date(extConflict.dateIn);d.setDate(d.getDate()-1);maxExtDate=d.toISOString().split('T')[0];}

  function handleMove(){
    if(!chosenPitch){showToast('Selecciona una parcela','error');return;}
    onMove(g,chosenPitch);onClose();
  }
  function handleExtend(){
    if(newDateOut<=g.dateOut){showToast('La nueva fecha debe ser posterior a la actual','error');return;}
    if(extConflict&&newDateOut>maxExtDate){showToast('Fecha bloqueada por otra reserva','error');return;}
    onExtend(g,newDateOut,extTotal);onClose();
  }

  function fmtDate(d){if(!d)return '\u2014';var p=d.split('-');return p[2]+'/'+p[1]+'/'+p[0]}
  var diffDays=Math.round((new Date(g.dateOut)-new Date())/86400000);

  // ---- DNI PHOTO ----
  function handleDniPhoto(ev){
    var file=ev.target.files[0];if(!file)return;
    var reader=new FileReader();
    reader.onload=function(e2){
      setGuests(function(prev){return prev.map(function(x){return x.id===g.id?Object.assign({},x,{dniPhoto:e2.target.result}):x})});
      showToast('Foto DNI guardada','success');
    };
    reader.readAsDataURL(file);
  }

  // ---- C5 SECRET COBRO ----
  function handleLogoC5(){
    var now=Date.now();
    var n=now-lc5.t<3000?lc5.n+1:1;
    if(n>=5){setLc5({n:0,t:0});setShowC5A(true);setC5pin('');setC5err('');}
    else setLc5({n:n,t:now});
  }
  function tryC5Auth(){
    var c5data=_loadC5();

    else{setC5err('PIN incorrecto');setC5pin('');}
  }
  var tabTotal=(g.tabItems||[]).reduce(function(s,t){return s+t.total},0);
  var grandTotal=Math.round(g.priceTotal*1.1)+tabTotal;

  function handleC5Cobro(){
    var c5data=_loadC5();
    var entry={id:Date.now(),ts:new Date().toISOString(),type:'in',amount:grandTotal,
      note:'Parcela '+g.pitchCode+' \u2014 '+nights+' noches + Tienda \u2014 '+g.name+' '+g.surname,

  // ---- CREATE INVOICE ----
  function handleCreateInvoice(){
    if(guestInvoice){showToast('Ya existe una factura para este hu\u00e9sped','error');return;}
    var nextNum=invoices.filter(function(i){return i.type==='invoice'}).length+1;
    var baseT=g.priceTotal+(tabTotal/1.1);
    var ivaT=grandTotal-baseT;
    var invId='F-2026-'+String(nextNum).padStart(4,'0');
    var invDate=new Date().toISOString().split('T')[0];
    var prevInv=invoices.length>0?invoices[invoices.length-1]:null;

      iva:ivaT,total:grandTotal,

    setInvoices(function(prev){return prev.concat([inv])});
    setGuests(function(prev){return prev.map(function(x){return x.id===g.id?Object.assign({},x,{paid:true}):x})});
    logActionDM('invoice',inv.id+' — '+g.name+' '+g.surname+' — €'+inv.total+' ('+inv.payMethod+')');

function ScannerPage(props){
  var showToast=props.showToast,setGuests=props.setGuests,pitches=props.pitches,setPitches=props.setPitches;
  var _mode=useState('camera'),mode=_mode[0],setMode=_mode[1];
  var _mrz=useState(''),mrzLine=_mrz[0],setMrzLine=_mrz[1];
  var _parsed=useState(null),parsed=_parsed[0],setParsed=_parsed[1];
  var _form=useState(null),form=_form[0],setForm=_form[1];

  function parseMRZ(lines){
    var l1=lines[0]||'',l2=lines[1]||'';
    if(l2.length<44) return null;
    var docNum=l2.substring(0,9).replace(/</g,'');
    var dob=l2.substring(13,19);
    var sex=l2.charAt(20);
    var exp=l2.substring(21,27);
    var nat=l2.substring(10,13).replace(/</g,'');
    var namePart=l1.substring(5).replace(/</g,' ').trim();
    var nameSplit=namePart.split('  ');
    var surname=(nameSplit[0]||'').trim();
    var firstname=(nameSplit[1]||'').trim();
    var yy=parseInt(dob.substring(0,2),10);
    var year=(yy>25?1900:2000)+yy;
    var birthDate=year+'-'+dob.substring(2,4)+'-'+dob.substring(4,6);
    var docType=l2.charAt(0)==='P'?'Pasaporte':'DNI';
    return{name:firstname,surname:surname,idDoc:docNum,nationality:nat,birthDate:birthDate,sex:sex,docType:docType};
  }

  function handleMRZInput(){
    var lines=mrzLine.split('\n').map(function(l){return l.trim()}).filter(Boolean);
    var result=parseMRZ(lines);
    if(!result){showToast('MRZ no reconocido. Verifica el formato.','error');return;}
    setParsed(result);
    var freePitch=(pitches.find(function(p){return p.status==='free'})||{}).code||'';
    var today=new Date().toISOString().split('T')[0];
    var checkout=new Date();checkout.setDate(checkout.getDate()+1);
    setForm({name:result.name,surname:result.surname,idDoc:result.idDoc,nationality:getNationality(result.nationality),
      vehicleType:'motorhome',plate:'',pitchCode:freePitch,
      dateIn:today,dateOut:checkout.toISOString().split('T')[0],
      adults:1,children:0,pets:0,notes:'',priceTotal:0,paid:false,nights:1,email:'',phone:''});
  }

  function getNationality(code){
    var map={ESP:'Espana',DEU:'Alemania',FRA:'Francia',GBR:'Reino Unido',NLD:'Paises Bajos',ITA:'Italia',PRT:'Portugal',BEL:'Belgica',CHE:'Suiza',DNK:'Dinamarca',SWE:'Suecia',NOR:'Noruega',AUT:'Austria',POL:'Polonia',IRL:'Irlanda',USA:'USA',CAN:'Canada',AUS:'Australia'};
    return map[code]||code;
  }

  function handleSaveCheckin(){
    if(!form||!form.pitchCode){showToast('Selecciona una parcela','error');return;}
    var fp=pitches.find(function(p){return p.code===form.pitchCode&&p.status==='free'});
    if(fp) setPitches(function(prev){return prev.map(function(p){return p.id===fp.id?Object.assign({},p,{status:'occupied'}):p})});
    setGuests(function(prev){
      var maxId=prev.reduce(function(m,g){return Math.max(m,g.id)},0);
      return prev.concat([Object.assign({},form,{id:maxId+1,status:'checkedIn'})]);
    });
    showToast('Check-in registrado: '+form.name+' '+form.surname,'success');
    setParsed(null);setForm(null);setMrzLine('');

function PinLoginScreen(props){
  var users=props.users,onLogin=props.onLogin;

  var _pin=useState(''),pin=_pin[0],setPin=_pin[1];

  function addDigit(d){if(pin.length<4)setPin(pin+d);setErr('');}
  function delDigit(){setPin(pin.slice(0,-1));setErr('');}
  function tryLogin(){
    if(!selUser){setErr('Selecciona tu usuario');return;}
    if(selUser.pin===pin){onLogin(selUser);setPin('');}
    else{setErr('PIN incorrecto');setPin('');}
  }
  function handleKey(ev){
    if(!selUser) return;
    if(ev.key>='0'&&ev.key<='9') addDigit(ev.key);
    else if(ev.key==='Backspace') delDigit();
    else if(ev.key==='Enter') tryLogin();
  }

  useEffect(function(){document.addEventListener('keydown',handleKey);return function(){document.removeEventListener('keydown',handleKey);}});

  var dots=Array.from({length:4},function(_,i){return pin.length>i?'●':'○';}).join(' ');

        users.map(function(u){
          return e('div',{key:u.id,className:'pin-user-btn'+(selUser&&selUser.id===u.id?' selected':''),
            onClick:function(){setSelUser(u);setPin('');setErr('');}},
            e('div',null,(u.role==='admin'?'👑 ':'👤 ')+u.name),
            e('div',{className:'pin-role'},u.role==='admin'?'Admin':'Recepción')
          );
        })
      ),
      selUser?e('div',null,
        e('div',{className:'pin-display'},dots),
        e('div',{className:'pin-numpad'},
          ['1','2','3','4','5','6','7','8','9','','0','⌫'].map(function(k,i){
            if(k==='')return e('div',{key:i,className:'pin-btn pin-empty'});
            if(k==='⌫')return e('button',{key:i,className:'pin-btn pin-del',onClick:delDigit},'⌫');

          })

        e('div',{className:'pin-err'},err)
      ):e('div',{style:{color:'#bbb',fontSize:'.82rem',padding:'8px 0'}},'← Selecciona un usuario para continuar')
    ),
    e('div',{className:'pin-ver'},'v1.0 · 2026')
  );

function UserManagementModal(props){
  var users=props.users,setUsers=props.setUsers,onClose=props.onClose,currentUser=props.currentUser;
  var _eu=useState(null),editUser=_eu[0],setEditUser=_eu[1];
  var _np=useState(''),newPin=_np[0],setNewPin=_np[1];
  var _nn=useState(''),newName=_nn[0],setNewName=_nn[1];
  var _nr=useState('staff'),newRole=_nr[0],setNewRole=_nr[1];
  var _err=useState(''),err=_err[0],setErr=_err[1];

  function saveEdit(){
    if(!newPin||newPin.length<4){setErr('El PIN debe tener 4 dígitos');return;}
    if(!newName.trim()){setErr('Introduce un nombre');return;}
    if(editUser==='new'){
      var nu={id:Date.now(),name:newName.trim(),role:newRole,pin:newPin};
      var updated=users.concat([nu]);
      setUsers(updated);_saveUsers(updated);
    } else {
      var updated2=users.map(function(u){return u.id===editUser.id?Object.assign({},u,{name:newName.trim(),pin:newPin,role:newRole}):u;});
      setUsers(updated2);_saveUsers(updated2);
    }
    setEditUser(null);setNewPin('');setNewName('');setNewRole('staff');setErr('');
  }
  function deleteUser(u){
    if(u.id===currentUser.id){setErr('No puedes eliminar tu propio usuario');return;}
    var upd=users.filter(function(x){return x.id!==u.id;});
    setUsers(upd);_saveUsers(upd);
  }
  function startEdit(u){setEditUser(u);setNewName(u.name);setNewPin(u.pin);setNewRole(u.role);setErr('');}
  function startNew(){setEditUser('new');setNewName('');setNewPin('');setNewRole('staff');setErr('');}

  return e(Modal,{title:'👥 Gestión de Usuarios',onClose:onClose},
    editUser?e('div',null,
      e('h4',{style:{marginBottom:12}},editUser==='new'?'Nuevo usuario':'Editar: '+editUser.name),
      e('div',{className:'form-group'},e('label',{className:'form-label'},'Nombre'),
        e('input',{className:'form-input',value:newName,onChange:function(ev){setNewName(ev.target.value);}})),
      e('div',{className:'form-group'},e('label',{className:'form-label'},'Rol'),
        e('select',{className:'form-input',value:newRole,onChange:function(ev){setNewRole(ev.target.value);}},
          e('option',{value:'staff'},'Recepción'),e('option',{value:'admin'},'Administrador'))),
      e('div',{className:'form-group'},e('label',{className:'form-label'},'PIN (4 dígitos)'),
        e('input',{className:'form-input',type:'password',maxLength:4,inputMode:'numeric',pattern:'[0-9]*',
          value:newPin,onChange:function(ev){setNewPin(ev.target.value.replace(/\D/g,'').slice(0,4));}})),
      e('div',{style:{color:'var(--danger)',fontSize:'.8rem',minHeight:16}},err),
      e('div',{style:{display:'flex',gap:8,marginTop:8}},
        e('button',{className:'btn btn-primary',onClick:saveEdit},'Guardar'),
        e('button',{className:'btn btn-outline',onClick:function(){setEditUser(null);setErr('');}},'Cancelar'))
    ):e('div',null,
      e('div',null,users.map(function(u){
        return e('div',{key:u.id,className:'user-row'},
          e('div',{style:{flex:1}},
            e('span',{style:{fontWeight:600}},u.name),' ',
            e('span',{className:'user-badge-role '+(u.role==='admin'?'admin':'')},u.role==='admin'?'Admin':'Recepción'),
            e('div',{style:{fontSize:'.75rem',color:'var(--text-secondary)',marginTop:2}},'PIN: '+('*'.repeat(u.pin.length)))
          ),
          e('button',{className:'btn btn-sm btn-outline',onClick:function(){startEdit(u);}},'✏️'),
          u.id!==currentUser.id?e('button',{className:'btn btn-sm btn-outline',style:{color:'var(--danger)'},
            onClick:function(){if(confirm('¿Eliminar usuario '+u.name+'?'))deleteUser(u);}},'🗑️'):null
        );
      })),
      e('div',{style:{color:'var(--danger)',fontSize:'.8rem',minHeight:16}},err),
      e('button',{className:'btn btn-primary',style:{marginTop:12},onClick:startNew},'+ Nuevo usuario')
    )
  );
}

// ==================== HOJA DE CAJA DIARIA ====================
function CajaDiariaPage(props){
  var invoices=props.invoices||[],showToast=props.showToast,currentUser=props.currentUser;
  var today=new Date().toISOString().split('T')[0];
  var _date=useState(today),selDate=_date[0],setSelDate=_date[1];
  var _caja=useState(_loadCaja()),cajaData=_caja[0],setCajaData=_caja[1];
  var _ndesc=useState(''),ndesc=_ndesc[0],setNdesc=_ndesc[1];
  var _namt=useState(''),namt=_namt[0],setNamt=_namt[1];
  var _ntype=useState('in'),ntype=_ntype[0],setNtype=_ntype[1];
  var _notes=useState(''),notes=_notes[0],setNotes=_notes[1];
  var _fondo=useState(''),fondo=_fondo[0],setFondo=_fondo[1];
  var _provs=useState(_loadProv),provs=_provs[0];
  var _selProv=useState(''),selProv=_selProv[0],setSelProv=_selProv[1];

  useEffect(function(){
    var d=_loadCaja();
    var dd=d[selDate]||{manualEntries:[],notes:'',fondo:'',cajaClose:null,turnoClose:null};
    setNotes(dd.notes||'');
    setFondo(dd.fondo!=null?String(dd.fondo):'');
    setCajaData(d);
  },[selDate]);

  var dayData=cajaData[selDate]||{manualEntries:[],notes:''};
  var manualEntries=dayData.manualEntries||[];

  // Invoice data for selected date
  var dayInvoices=invoices.filter(function(i){return i.type==='invoice'&&i.date===selDate});
  var dayCredits=invoices.filter(function(i){return i.type==='credit'&&i.date===selDate});

  var alojTotal=dayInvoices.reduce(function(s,i){return s+i.total;},0);
  var alojCash=dayInvoices.filter(function(i){return i.payMethod==='cash';}).reduce(function(s,i){return s+i.total;},0)
    +dayInvoices.filter(function(i){return i.payMethod==='mixed';}).reduce(function(s,i){return s+(i.cashAmount||0);},0);
  var alojCard=dayInvoices.filter(function(i){return i.payMethod==='card';}).reduce(function(s,i){return s+i.total;},0)
    +dayInvoices.filter(function(i){return i.payMethod==='mixed';}).reduce(function(s,i){return s+(i.cardAmount||0);},0);
  var creditTotal=dayCredits.reduce(function(s,i){return s+Math.abs(i.total);},0);

  var manualIn=manualEntries.filter(function(m){return m.type==='in';}).reduce(function(s,m){return s+m.amount;},0);
  var manualOut=manualEntries.filter(function(m){return m.type==='out';}).reduce(function(s,m){return s+m.amount;},0);

  var totalEfectivo=alojCash+manualIn-manualOut;
  var totalTarjeta=alojCard;
  var totalCreditos=creditTotal;
  var saldoFinal=alojTotal-creditTotal+manualIn-manualOut;

  function addEntry(){
    var v=parseFloat(namt);
    var descFinal=ndesc.trim();
    if(!v||v<=0){showToast('Introduce un importe válido','error');return;}
    if(ntype==='out'&&selProv){
      var pObj=provs.find(function(p){return String(p.id)===selProv;});
      if(pObj&&!descFinal) descFinal='Pago a '+pObj.name;
      else if(pObj) descFinal=descFinal+' — '+pObj.name;
    }
    if(!descFinal){showToast('Rellena el concepto','error');return;}
    var entry={id:Date.now(),type:ntype,amount:v,desc:descFinal,
      provId:ntype==='out'?selProv||null:null,
      ts:new Date().toISOString()};
    var newDay=Object.assign({},dayData,{manualEntries:manualEntries.concat([entry])});
    var newCaja=Object.assign({},cajaData);newCaja[selDate]=newDay;
    setCajaData(newCaja);_saveCaja(newCaja);setNdesc('');setNamt('');setSelProv('');
    showToast('Movimiento añadido','success');
  }
  function removeEntry(id){
    var newDay=Object.assign({},dayData,{manualEntries:manualEntries.filter(function(m){return m.id!==id;})});
    var newCaja=Object.assign({},cajaData);newCaja[selDate]=newDay;
    setCajaData(newCaja);_saveCaja(newCaja);
  }
  function saveNotes(val){
    setNotes(val);
    var newDay=Object.assign({},dayData,{notes:val});
    var newCaja=Object.assign({},cajaData);newCaja[selDate]=newDay;
    _saveCaja(newCaja);
  }
  function saveFondo(val){
    setFondo(val);
    var newDay=Object.assign({},dayData,{fondo:val});
    var newCaja=Object.assign({},cajaData);newCaja[selDate]=newDay;
    setCajaData(newCaja);_saveCaja(newCaja);
  }
  function _buildPrintData(){
    var fondoNum=parseFloat(fondo)||0;
    var efectivoRetirar=Math.max(0,totalEfectivo-fondoNum);
    return {fondoNum:fondoNum,efectivoRetirar:efectivoRetirar};
  }
  function cerrarCaja(){
    if(!confirm('¿Confirmar cierre de caja para el '+selDate+'?\nSe imprimirá el informe de cierre.')) return;

// ==================== WELCOME / GOODBYE OVERLAY ====================
function WelcomeOverlay(props){
  var user=props.user,type=props.type,onDone=props.onDone;
  var now=new Date();
  var h=now.getHours();
  var greeting=h<12?'Buenos días':h<20?'Buenas tardes':'Buenas noches';
  var timeStr=now.toLocaleTimeString('es-ES',{hour:'2-digit',minute:'2-digit'});
  var isWelcome=type==='welcome';

  useEffect(function(){
    var t=setTimeout(onDone,isWelcome?3200:3800);
    return function(){clearTimeout(t);};
  },[]);

  return e('div',{className:'wc-overlay '+(isWelcome?'welcome':'goodbye'),onClick:onDone},
    e('div',{className:'wc-card'},
      e('img',{src:_csLogo(),className:'wc-logo',alt:''}),
      e('div',{className:'wc-greeting'},isWelcome?greeting:'¡Hasta pronto!'),
      e('div',{className:'wc-name '+(isWelcome?'green':'blue')},user.name),
      e('div',{className:'wc-role'},(user.role==='admin'?'👑 Administrador':'👤 Recepción')),
      isWelcome?e('div',{className:'wc-time-chip green'},'🟢 Turno iniciado · '+timeStr)
               :e('div',{className:'wc-time-chip blue'},'🔵 Turno cerrado · '+timeStr),
      !isWelcome?e('div',{className:'wc-warn-box'},
        '⚠️ Recuerda cerrar sesión en el navegador si es un equipo compartido con otros usuarios'
      ):null
    ),
    e('div',{className:'wc-hint'},'Toca para continuar')
  );
}

// ==================== LISTADOS PAGE ====================
// ====================================================================
// PLANNING PAGE — Vista Gantt de Parcelas y Estancias
// ====================================================================
function PlanningPage(props){
  var guests=props.guests||[],pitches=props.pitches||[];
  var setGlobalDetailGuest=props.setGlobalDetailGuest||function(){};
  var showToast=props.showToast||function(){};
  var setPage=props.setPage||function(){};

  var CELL_W=54,ROW_H=44,LABEL_W=82;
  var DAY_NAMES=['Do','Lu','Ma','Mi','Ju','Vi','Sa'];
  var MON_NAMES=['Ene','Feb','Mar','Abr','May','Jun','Jul','Ago','Sep','Oct','Nov','Dic'];

  var _vd=useState(90),viewDays=_vd[0],setViewDays=_vd[1];
  var _zone=useState('all'),zoneFilter=_zone[0],setZoneFilter=_zone[1];
  var _drag=useState(null),dragSeg=_drag[0],setDragSeg=_drag[1];
  var _availF=useState('all'),availFilter=_availF[0],setAvailFilter=_availF[1];
  var _newRes=useState(null),newResData=_newRes[0],setNewResData=_newRes[1];
  var _start=useState(function(){var d=new Date();d.setHours(0,0,0,0);d.setDate(d.getDate()-1);return d;}),startDate=_start[0],setStartDate=_start[1];

  var todayMs=new Date().setHours(0,0,0,0);
  var todayStr=new Date(todayMs).toISOString().slice(0,10);

  function prevP(){var d=new Date(startDate);d.setDate(d.getDate()-viewDays);setStartDate(d);}
  function nextP(){var d=new Date(startDate);d.setDate(d.getDate()+viewDays);setStartDate(d);}
  function goToday(){var d=new Date();d.setHours(0,0,0,0);d.setDate(d.getDate()-1);setStartDate(d);}

  var dates=[];
  for(var i=0;i<viewDays;i++){var dd=new Date(startDate);dd.setDate(dd.getDate()+i);dates.push(new Date(dd));}
  var endDate=dates[dates.length-1];

  var filteredPitches=pitches.filter(function(p){return zoneFilter==='all'||p.zone===zoneFilter;})
    .sort(function(a,b){if(a.zone!==b.zone)return a.zone<b.zone?-1:1;return a.code<b.code?-1:1;});

  var todayArr=guests.filter(function(g){return g.dateIn===todayStr&&g.status!=='cancelled';});
  var todayDep=guests.filter(function(g){return g.dateOut===todayStr&&g.status!=='cancelled';});

  var FLAGS={España:'🇪🇸',Alemania:'🇩🇪',Germany:'🇩🇪',Francia:'🇫🇷',France:'🇫🇷',UK:'🇬🇧',
    Holanda:'🇳🇱',Netherlands:'🇳🇱',Bélgica:'🇧🇪',Belgium:'🇧🇪',Italia:'🇮🇹',Italy:'🇮🇹',
    Portugal:'🇵🇹',Suiza:'🇨🇭',Switzerland:'🇨🇭',Austria:'🇦🇹',Polonia:'🇵🇱',Poland:'🇵🇱',
    Suecia:'🇸🇪',Sweden:'🇸🇪',Noruega:'🇳🇴',Norway:'🇳🇴',USA:'🇺🇸',Dinamarca:'🇩🇰'};
  var VICONS={motorhome:'🚐',camper:'🚌',autocaravana:'🚐',caravan:'🚛',caravana:'🚛',van:'🚐',furgoneta:'🚐'};
  var SCOL={checkedIn:'var(--primary)',confirmed:'#2e7d32',pending:'#f57f17',checkedOut:'#757575',cancelled:'#212121'};
  var SBGC={checkedIn:'var(--primary-light)',confirmed:'#e8f5e9',pending:'#fffcc8',checkedOut:'#f5f5f5',cancelled:'#e0e0e0'};
  var SLBL={checkedIn:'Alojado',confirmed:'Confirmada',pending:'Pendiente',checkedOut:'Checkout',cancelled:'Cancelada'};

  function dtMs(s){return new Date(s).setHours(0,0,0,0);}
  function pitchConflictLocal(code,din,dout,excludeId){
    return guests.find(function(x){
      if(x.id===excludeId||x.status==='checkedOut'||x.status==='cancelled') return false;
      var segs = x.segments || [{pitchCode:x.pitchCode, dateIn:x.dateIn, dateOut:x.dateOut}];
      return segs.some(function(s){ return s.pitchCode===code && s.dateIn<dout && s.dateOut>din; });
    })||null;
  }

  function getBand(obj){
    var gIn=dtMs(obj.dateIn),gOut=dtMs(obj.dateOut);
    var rStart=startDate.getTime(),rEnd=endDate.getTime()+86400000;
    if(gOut<=rStart||gIn>=rEnd)return null;
    var visStart=Math.max(gIn,rStart),visEnd=Math.min(gOut,rEnd);
    var off=(visStart-rStart)/86400000,span=(visEnd-visStart)/86400000;
    return{left:off*CELL_W+2,width:span*CELL_W-4};
  }

  // Group pitches: zone headers + pitch rows
  var rows=[],curZ=null;
  filteredPitches.forEach(function(p){
    if(p.zone!==curZ){rows.push({t:'z',z:p.zone});curZ=p.zone;}
    rows.push({t:'p',p:p});
  });

  var totalW=viewDays*CELL_W;

  // Occupancy today
  var occToday=guests.filter(function(g){return g.status==='checkedIn';}).length;
  var occPct=pitches.length>0?Math.round(occToday/pitches.length*100):0;

  return e('div',{style:{fontFamily:'inherit',paddingBottom:20}},

    // === TOP BAR ===
    e('div',{style:{display:'flex',alignItems:'center',gap:8,marginBottom:12,flexWrap:'wrap'}},
      e('span',{style:{fontWeight:700,fontSize:'1.05rem'}},'📅 Planning de Estancias'),
      e('span',{style:{background:'var(--primary)',color:'#fff',borderRadius:20,padding:'2px 10px',fontSize:'.72rem',fontWeight:700}},
        occToday+' alojados ('+occPct+'%)'),

      // Zone filter
      e('div',{style:{display:'flex',gap:3,marginLeft:8}},
        ['all','A','B','C','D','E','TRÁNSITO','PARKING'].map(function(z){
          var active=zoneFilter===z;
          return e('button',{key:z,onClick:function(){setZoneFilter(z);},
            style:{padding:'4px 9px',border:'1.5px solid '+(active?'var(--primary)':'var(--border)'),
              borderRadius:16,fontSize:'.7rem',fontWeight:700,cursor:'pointer',
              background:active?'var(--primary)':'white',color:active?'white':'var(--text-secondary)'}},
            z==='all'?'Todas':(z==='TRÁNSITO'||z==='PARKING')?z:'Z-'+z);
        })
      ),

      // Availability Filter
      e('div',{style:{marginLeft:8}},
        e('select',{className:'form-input',style:{padding:'4px 8px',fontSize:'.75rem',height:'28px',background:'white'},
          value:availFilter,onChange:function(ev){setAvailFilter(ev.target.value)}},
          e('option',{value:'all'},'Estado: Todas'),
          e('option',{value:'free'},'Estado: Sólo Libres'),
          e('option',{value:'occ'},'Estado: Sólo Ocupadas')
        )
      ),

      // Day views
      e('div',{style:{display:'flex',border:'1px solid var(--border)',borderRadius:6,overflow:'hidden',marginLeft:4}},
        [14,30,90,180,365].map(function(d){
          var active=viewDays===d;
          return e('button',{key:d,onClick:function(){setViewDays(d);},
            style:{padding:'4px 11px',border:'none',cursor:'pointer',fontSize:'.73rem',fontWeight:700,
              background:active?'var(--primary)':'white',color:active?'white':'var(--text-secondary)'}},d===365?'1A':(d===180?'6M':d+'d'));
        })
      ),

      // Nav
      e('div',{style:{display:'flex',gap:4,marginLeft:4}},
        e('button',{onClick:prevP,style:{padding:'4px 10px',border:'1px solid var(--border)',borderRadius:6,cursor:'pointer',fontSize:'.85rem',background:'white'}},'◀'),
        e('button',{onClick:goToday,style:{padding:'4px 12px',border:'1px solid var(--primary)',borderRadius:6,cursor:'pointer',fontSize:'.72rem',fontWeight:700,background:'var(--primary)',color:'white'}},'Hoy'),
        e('button',{onClick:nextP,style:{padding:'4px 10px',border:'1px solid var(--border)',borderRadius:6,cursor:'pointer',fontSize:'.85rem',background:'white'}},'▶')
      ),

      e('div',{style:{display:'flex',alignItems:'center',gap:6,marginLeft:'auto'}},
        e('span',{style:{fontSize:'.76rem',color:'var(--text-secondary)',fontWeight:600}},'Saltar a:'),
        e('input',{type:'date',className:'form-input',
          style:{padding:'2px 8px',fontSize:'.75rem',height:'28px'},
          value:startDate.toISOString().split('T')[0],
          onChange:function(ev){if(ev.target.value){setStartDate(new Date(ev.target.value));}}
        })
      )
    ),

    // === ARRIVALS / DEPARTURES STRIP ===
    (todayArr.length+todayDep.length>0)?e('div',{style:{
        background:'linear-gradient(90deg,#e8f5e9 0%,#e3f2fd 100%)',
        border:'1px solid var(--border)',borderRadius:8,padding:'8px 16px',
        marginBottom:10,display:'flex',gap:20,flexWrap:'wrap',fontSize:'.8rem',alignItems:'center'}},
      e('strong',{style:{color:'var(--primary)',fontSize:'.82rem'}},'📆 Hoy '+todayStr),
      e('span',null,'✈️ ',e('strong',null,todayArr.length+' llegada'+(todayArr.length!==1?'s':'')),
        '  '+todayArr.slice(0,3).map(function(g){return (g.name||'')+ ' '+(g.surname||'').charAt(0)+'. ('+(g.pitchCode||'')+')';}).join(' · ')+(todayArr.length>3?' +más':'')),
      e('span',null,'🚪 ',e('strong',null,todayDep.length+' salida'+(todayDep.length!==1?'s':'')),
        '  '+todayDep.slice(0,3).map(function(g){return (g.name||'')+' '+(g.surname||'').charAt(0)+'. ('+(g.pitchCode||'')+')';}).join(' · ')+(todayDep.length>3?' +más':''))
    ):null,

    // === LEGEND ===
    e('div',{style:{display:'flex',gap:10,marginBottom:10,flexWrap:'wrap',alignItems:'center'}},
      e('span',{style:{fontSize:'.7rem',color:'var(--text-tertiary)',fontWeight:600}},'LEYENDA:'),
      Object.keys(SCOL).map(function(st){
        return e('div',{key:st,style:{display:'flex',alignItems:'center',gap:4,fontSize:'.7rem'}},
          e('div',{style:{width:22,height:11,borderRadius:3,background:SBGC[st],border:'2px solid '+SCOL[st]}}),
          e('span',{style:{color:'var(--text-secondary)'}},(SLBL[st]||st)));
      }),
      e('span',{style:{fontSize:'.7rem',color:'var(--text-tertiary)',marginLeft:8}},'💡 Clic en banda = abrir ficha · Clic en celda vacía = nueva reserva')
    ),

    // === MAIN GANTT GRID ===
    e('div',{style:{overflowX:'auto',overflowY:'auto',maxHeight:'calc(100vh - 180px)',border:'1px solid var(--border)',borderRadius:8,boxShadow:'var(--shadow-sm)'}},
      e('div',{style:{minWidth:LABEL_W+totalW+'px'}},

        // DATE HEADER ROW
        e('div',{style:{display:'flex',position:'sticky',top:0,zIndex:20,background:'#fff',borderBottom:'2px solid #ddd'}},
          e('div',{style:{width:LABEL_W,flexShrink:0,padding:'6px 10px',fontSize:'.68rem',fontWeight:700,
            color:'var(--text-secondary)',background:'#f5f5f3',borderRight:'2px solid #ddd',
            display:'flex',alignItems:'center'}},'Parcela'),
          e('div',{style:{display:'flex',flex:1}},
            dates.map(function(d,idx){
              var isToday=d.getTime()===todayMs;
              var isSun=d.getDay()===0,isSat=d.getDay()===6;
              return e('div',{key:idx,style:{width:CELL_W,flexShrink:0,textAlign:'center',
                  padding:'3px 0',boxSizing:'border-box',
                  background:isToday?'#fff9c4':(isSat||isSun)?'#f7f7f7':'white',
                  borderLeft:'1px solid #eee',
                  borderBottom:isToday?'3px solid #f9a825':'1px solid transparent'}},
                e('div',{style:{fontSize:'.58rem',color:isToday?'#e65100':'#aaa',fontWeight:isToday?700:400}},
                  DAY_NAMES[d.getDay()]),
                e('div',{style:{fontSize:'.78rem',fontWeight:isToday?800:600,
                    color:isToday?'#e65100':'var(--text)'}},d.getDate()),
                (idx===0||d.getDate()===1)?e('div',{style:{fontSize:'.55rem',color:'#bbb'}},
                  MON_NAMES[d.getMonth()]):null
              );
            })
          )
        ),

        // PITCH ROWS
        rows.map(function(row,ri){
          // ZONE SEPARATOR
          if(row.t==='z'){
            return e('div',{key:'z'+row.z+ri,style:{
                display:'flex',alignItems:'center',
                background:'linear-gradient(90deg,var(--primary) 0%,var(--primary-hover) 60%,var(--primary) 100%)',
                color:'#fff',padding:'5px 0',borderTop:'1px solid var(--primary-hover)'}},
              e('div',{style:{width:LABEL_W,flexShrink:0,padding:'0 10px',fontWeight:800,
                fontSize:'.75rem',letterSpacing:'.8px',display:'flex',alignItems:'center',gap:6}},
                '📍 ZONA '+row.z,
                e('span',{style:{fontWeight:400,fontSize:'.65rem',opacity:.8}},
                  '('+pitches.filter(function(p){return p.zone===row.z;}).length+' parcelas)')),
              e('div',{style:{flex:1,height:2}})
            );
          }

          // PITCH ROW (MULTI-SEGMENT SUPPORT)
          var p=row.p;
          var pitchSegments=[];
          guests.forEach(function(g){
            if(g.status==='cancelled') return;
            var segs = g.segments || [{pitchCode:g.pitchCode, dateIn:g.dateIn, dateOut:g.dateOut}];
            segs.forEach(function(seg, sIdx){
              if(seg.pitchCode === p.code){
                var startMs=dtMs(seg.dateIn), endMs=dtMs(seg.dateOut);
                var rS=startDate.getTime(),rE=endDate.getTime()+86400000;
                if(endMs>rS && startMs<rE) {
                  pitchSegments.push({ g:g, seg:seg, sIdx:sIdx, totalSegs:segs.length });
                }
              }
            });
          });
          var isOcc=pitchSegments.some(function(ps){return ps.g.status==='checkedIn'&&dtMs(ps.seg.dateIn)<=todayMs&&dtMs(ps.seg.dateOut)>todayMs;});
          
          if(availFilter==='free' && pitchSegments.length>0) return null;
          if(availFilter==='occ' && pitchSegments.length===0) return null;

          var rowBg=ri%2===0?'#fafafa':'#fff';

          return e('div',{key:p.id,
              onDragOver:function(ev){ev.preventDefault();ev.dataTransfer.dropEffect='move';},
              onDrop:function(ev){
                ev.preventDefault();
                if(!dragSeg)return;
                var tg=dragSeg.g, ts=dragSeg.seg, sIdx=dragSeg.sIdx;
                if(ts.pitchCode===p.code){setDragSeg(null);return;}
                var conflict=pitchConflictLocal(p.code, ts.dateIn, ts.dateOut, tg.id);
                if(conflict){showToast('\u26a0\ufe0f Solapamiento: '+p.code+' ya está ocupada en esas fechas','error');setDragSeg(null);return;}
                var cloneSegs=(tg.segments||[{pitchCode:tg.pitchCode,dateIn:tg.dateIn,dateOut:tg.dateOut}]).slice();
                cloneSegs[sIdx]=Object.assign({},cloneSegs[sIdx],{pitchCode:p.code});
                props.setGuests(function(prev){return prev.map(function(x){
                  if(x.id===tg.id){
                    var ng=Object.assign({},x,{segments:cloneSegs});
                    if(sIdx===0) ng.pitchCode=p.code;
                    return ng;
                  }
                  return x;
                })});
                showToast('Mudanza rápida: '+ts.pitchCode+' \u2192 '+p.code,'success');
                setDragSeg(null);
              },
              style:{display:'flex',borderBottom:'1px solid #f0f0f0',
              height:ROW_H,background:rowBg,position:'relative'}},

            // PITCH LABEL (sticky left)
            e('div',{style:{width:LABEL_W,flexShrink:0,borderRight:'2px solid #e8e8e8',
                display:'flex',flexDirection:'column',justifyContent:'center',padding:'0 8px',
                background:'#f8f7f4',position:'sticky',left:0,zIndex:5}},
              e('div',{style:{display:'flex',alignItems:'center',gap:5}},
                e('span',{style:{fontWeight:800,fontSize:'.8rem',
                    color:isOcc?'var(--primary)':'var(--text)',letterSpacing:'.3px'}},p.code),
                p.electricity?e('span',{style:{fontSize:'.65rem',color:'#f57f17'}},'⚡'):null
              ),
              e('div',{style:{fontSize:'.58rem',color:'var(--text-tertiary)'}},
                p.size||'Estándar')
            ),

            // DAY CELLS + BANDS
            e('div',{style:{display:'flex',flex:1,position:'relative',overflow:'hidden'}},

              // Background day columns
              dates.map(function(d,di){
                var isToday=d.getTime()===todayMs;
                var isSun=d.getDay()===0,isSat=d.getDay()===6;
                return e('div',{key:di,
                  style:{width:CELL_W,height:ROW_H,flexShrink:0,boxSizing:'border-box',
                    background:isToday?'rgba(249,168,37,.08)':(isSat||isSun)?'rgba(0,0,0,.018)':'transparent',
                    borderLeft:'1px solid '+(isToday?'rgba(249,168,37,.4)':'#f0f0f0'),
                    cursor:'pointer'},
                  onClick:function(){
                    var busy=pitchSegments.some(function(ps){
                      return dtMs(ps.seg.dateIn)<=d.getTime()&&dtMs(ps.seg.dateOut)>d.getTime();
                    });
                    if(!busy)setNewResData({code:p.code,dateIn:d.toISOString().slice(0,10)});
                  }
                });
              }),

              // RESERVATION BANDS (SEGMENTS)
              pitchSegments.map(function(ps){
                var g = ps.g, seg = ps.seg;
                var bp=getBand(seg);if(!bp)return null;

                // Solid Pill Pseudo-3D Design
                var col = SCOL[g.status]||'#888';
                // Adjust gradients for state
                var gradient = g.status==='pending' ? 'repeating-linear-gradient(45deg, rgba(230,81,0,0.1), rgba(230,81,0,0.1) 10px, rgba(230,81,0,0.2) 10px, rgba(230,81,0,0.2) 20px)' : ('linear-gradient(180deg, '+SBGC[g.status]+' 0%, rgba(255,255,255,0.7) 100%)');
                
                // MULTI-SEGMENT STAYS: Special Color Override (Purple/Pinkish)
                if (ps.totalSegs > 1) {
                  col = '#6a1b9a'; // Deep violet border
                  gradient = 'linear-gradient(180deg, #f3e5f5 0%, rgba(255,255,255,0.7) 100%)'; // Soft violet gradient
                }

                var flag=FLAGS[g.nationality]||'';
                var icon=VICONS[(g.vehicleType||'').toLowerCase()]||'🚐';
                var nights=Math.round((dtMs(seg.dateOut)-dtMs(seg.dateIn))/86400000);
                var lbl=g.surname+(g.name?' '+g.name.charAt(0)+'.':'');
                
                var hasPrev = ps.sIdx > 0;
                var hasNext = ps.sIdx < (ps.totalSegs - 1);
                var isDragging = dragSeg&&dragSeg.g.id===g.id&&dragSeg.sIdx===ps.sIdx;

                return e('div',{key:g.id+'_'+ps.sIdx,
                  draggable:true,
                  onDragStart:function(ev){ 
                    ev.dataTransfer.effectAllowed='move';
                    ev.dataTransfer.setData('text/plain', g.id); // For Firefox
                    setDragSeg({g:g, seg:seg, sIdx:ps.sIdx});
                  },
                  onDragEnd:function(){ setDragSeg(null); },
                  title:g.name+' '+g.surname+' · '+seg.pitchCode+' · '+seg.dateIn+' → '+seg.dateOut+' ('+nights+' noches) · TRAMO '+(ps.sIdx+1)+'/'+ps.totalSegs,
                  style:{position:'absolute',top:6,height:ROW_H-14,
                    left:bp.left,width:bp.width,
                    background: SBGC[g.status], backgroundImage: gradient,
                    border:'1.5px solid '+col, 
                    borderLeftWidth: hasPrev ? '0' : '1.5px',
                    borderRightWidth: hasNext ? '0' : '1.5px',
                    borderRadius: (hasPrev?0:5)+'px '+(hasNext?0:5)+'px '+(hasNext?0:5)+'px '+(hasPrev?0:5)+'px',
                    cursor:'grab',overflow:'hidden',display:'flex',alignItems:'center',
                    padding:'0 5px',gap:3,boxSizing:'border-box',zIndex:isDragging?50:3,
                    boxShadow:'0 3px 6px rgba(0,0,0,.15)',transition:'transform .1s',
                    opacity: (g.status==='cancelled'||isDragging)?0.4:1
                  },
                  onClick:function(ev){ev.stopPropagation();setGlobalDetailGuest(g);},
                  onMouseEnter:function(ev){ev.currentTarget.style.transform='translateY(-1px)';ev.currentTarget.style.zIndex='10';ev.currentTarget.style.boxShadow='0 5px 12px rgba(0,0,0,.25)';},
                  onMouseLeave:function(ev){ev.currentTarget.style.transform='none';ev.currentTarget.style.zIndex='3';ev.currentTarget.style.boxShadow='0 3px 6px rgba(0,0,0,.15)';}},
                  
                  // Content
                  hasPrev ? e('span',{style:{fontSize:'.7rem', color:col, margin:'0 -2px 0 -4px'}},'↪') : null,
                  bp.width>28 ? e('span',{style:{fontSize:'.62rem',flexShrink:0}},icon) : null,
                  bp.width>50 ? e('span',{style:{fontSize:'.66rem',fontWeight:800,color:col,
                      whiteSpace:'nowrap',overflow:'hidden',textOverflow:'ellipsis',flex:1, textShadow:'0 1px 0 rgba(255,255,255,0.7)'}},
                    (bp.width>80?flag+' ':'')+lbl) : null,
                  bp.width>130 ? e('span',{style:{fontSize:'.58rem',color:col,opacity:.9,flexShrink:0, fontWeight:700}},
                    nights+'n') : null,
                  hasNext ? e('span',{style:{fontSize:'.7rem', color:col, margin:'0 -4px 0 -2px'}},'↪') : null
                );

              })
            )
          );
        })
      )
    ),

    // === NEW RESERVATION QUICK MODAL ===
    newResData?e('div',{className:'modal-overlay',onClick:function(){setNewResData(null);}},
      e('div',{className:'modal',onClick:function(ev){ev.stopPropagation();},style:{maxWidth:380}},

function ListadosPage(props){
  var guests=props.guests||[];
  var invoices=props.invoices||[];
  var setGuests=props.setGuests||function(){};
  var setPitches=props.setPitches||function(){};
  var pitches=props.pitches||[];
  var showToast=props.showToast||function(){};
  var logAction=props.logAction||function(){};
  var t=props.t||{};
  var _tab=useState('guests'),tab=_tab[0],setTab=_tab[1];
  var _q=useState(''),q=_q[0],setQ=_q[1];
  var _statusF=useState('all'),statusF=_statusF[0],setStatusF=_statusF[1];
  var _dateF=useState(''),dateF=_dateF[0],setDateF=_dateF[1];
  var _dg=useState(null),detailGuest=_dg[0],setDetailGuest=_dg[1];

  function doMove(g,newCode){
    var oldCode=g.pitchCode;
    setGuests(function(prev){return prev.map(function(x){return x.id===g.id?Object.assign({},x,{pitchCode:newCode}):x})});
    setPitches(function(prev){return prev.map(function(p){
      if(p.code===oldCode) return Object.assign({},p,{status:'free'});
      if(p.code===newCode) return Object.assign({},p,{status:g.status==='checkedIn'?'occupied':'reserved'});
      return p;
    })});
    logAction('move',g.name+' '+g.surname+' \u2014 '+oldCode+' \u2192 '+newCode);
    showToast('Reserva movida a parcela '+newCode,'success');
  }
  function doExtend(g,newDateOut,newTotal){
    var extraNights=Math.round((new Date(newDateOut)-new Date(g.dateOut))/86400000);
    setGuests(function(prev){return prev.map(function(x){
      return x.id===g.id?Object.assign({},x,{dateOut:newDateOut,nights:x.nights+extraNights,priceTotal:newTotal}):x;
    })});
    logAction('extend',g.name+' '+g.surname+' \u2014 hasta '+newDateOut);
    showToast('Estancia ampliada hasta el '+newDateOut,'success');
  }

  var storeProds=useMemo(function(){
    try{return JSON.parse(localStorage.getItem(_csKey('store_prods')))||INIT_PRODUCTS;}
    catch(ex){return INIT_PRODUCTS;}
  },[tab]);

  var ql=q.toLowerCase();
  var statusLabels={all:'Todos',confirmed:'Confirmados',checkedIn:'Alojados',checkedOut:'Check-out',pending:'Pendientes',cancelled:'Cancelados'};
  var statusColor={confirmed:'#1565c0',checkedIn:'#2e7d32',checkedOut:'#888',pending:'#e65100',cancelled:'#c62828'};
  var statusLabel={confirmed:'Confirmado',checkedIn:'Alojado',checkedOut:'Check-out',pending:'Pendiente',cancelled:'Cancelado'};

  var filteredGuests=guests.filter(function(g){
    if(statusF!=='all'&&g.status!==statusF) return false;
    if(!ql) return true;
    return [g.name,g.surname,g.idDoc,g.nationality,g.plate,g.email,g.phone,g.pitchCode,g.vehicleType].some(function(v){return v&&String(v).toLowerCase().indexOf(ql)>=0;});
  });

  var filteredReservations=guests.filter(function(g){
    if(statusF!=='all'&&g.status!==statusF) return false;
    if(dateF&&!(g.dateIn<=dateF&&g.dateOut>=dateF)) return false;
    if(!ql) return true;
    return [g.name,g.surname,g.idDoc,g.plate,g.pitchCode,g.dateIn,g.dateOut,g.vehicleType].some(function(v){return v&&String(v).toLowerCase().indexOf(ql)>=0;});
  });

  var filteredInvoices=invoices.filter(function(inv){
    if(!ql) return true;
    return [inv.id,inv.name,inv.idDoc,inv.pitchCode,inv.date].some(function(v){return v&&String(v).toLowerCase().indexOf(ql)>=0;});
  });

  var filteredProds=storeProds.filter(function(p){
    if(!ql) return true;

// ==================== RESERVAS ONLINE — PANEL DE INGRESOS ====================
function ReservasOnlinePage(props){
  var guests=props.guests||[],t=props.t||{};
  var _tab=useState('dashboard'),tab=_tab[0],setTab=_tab[1];
  var _sq=useState(''),searchQ=_sq[0],setSearchQ=_sq[1];

  // Filtrar solo reservas que vienen del motor online
  var onlineBookings=guests.filter(function(g){return g.paidMethod==='redsys_tpv'||g.bookCode});
  var today=new Date().toISOString().split('T')[0];

  // Stats
  var totalPaid=onlineBookings.filter(function(b){return b.paid}).reduce(function(s,b){return s+(b.priceTotal||0)},0);
  var totalPending=onlineBookings.filter(function(b){return !b.paid&&b.status!=='cancelled'}).reduce(function(s,b){return s+(b.priceTotal||0)},0);
  var countPaid=onlineBookings.filter(function(b){return b.paid}).length;
  var countPending=onlineBookings.filter(function(b){return !b.paid&&b.status!=='cancelled'}).length;
  var depositsHeld=onlineBookings.filter(function(b){return b.depositHeld&&b.depositStatus==='held'});
  var depositTotal=depositsHeld.reduce(function(s,b){return s+(b.depositAmount||0)},0);
  var todayBookings=onlineBookings.filter(function(b){return (b.createdTs||'').indexOf(today)===0||(b.dateIn||'')===today});

  // Ingresos por día (últimos 7 días)
  var days=[];
  for(var d=6;d>=0;d--){
    var dt=new Date();dt.setDate(dt.getDate()-d);
    var ds=dt.toISOString().split('T')[0];
    var dayLabel=dt.toLocaleDateString('es-ES',{weekday:'short',day:'numeric'});
    var dayTotal=onlineBookings.filter(function(b){return b.paid&&(b.paidTimestamp||b.createdTs||'').indexOf(ds)===0}).reduce(function(s,b){return s+(b.priceTotal||0)},0);
    days.push({label:dayLabel,value:dayTotal});
  }
  var maxDay=Math.max.apply(null,days.map(function(d){return d.value}))||1;

  return e('div',null,

function simHash(str){var h1=0xdeadbeef^0,h2=0x41c6ce57^0;for(var i=0,ch;i<str.length;i++){ch=str.charCodeAt(i);h1=Math.imul(h1^ch,2654435761);h2=Math.imul(h2^ch,1597334677);}h1=Math.imul(h1^(h1>>>16),2246822507)^Math.imul(h2^(h2>>>13),3266489909);h2=Math.imul(h2^(h2>>>16),2246822507)^Math.imul(h1^(h1>>>13),3266489909);return(4294967296*(2097151&h2)+(h1>>>0)).toString(16).padStart(16,'0')+Date.now().toString(16)+(str.length*13).toString(16).padStart(32,'0');}
