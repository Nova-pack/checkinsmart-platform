<html lang="es">
<head>
<meta charset="UTF-8">

<title>CheckingSmart — Sistema de Gestión</title>
<!-- PWA — installable as desktop/mobile app -->

<script src="/assets/config.js?v=20260506-powernet-fix"></script>
<!-- Firebase SDK (compat) -->
<script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-auth-compat.js"></script>
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>

<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f8f7f4;--surface:#fff;--surface-alt:#f1f0ec;
  --text:#1a1a1a;--text-secondary:#6b6b6b;--text-tertiary:#999;
  --primary:var(--cs-primario,#0288d1);--primary-light:#e1f5fe;--primary-hover:var(--cs-primario-dark,#0277bd);
  --accent:var(--cs-secundario,#e67e22);--accent-light:#fef3e2;
  --danger:#c0392b;--danger-light:#fdecea;
  --info:#2980b9;--info-light:#e3f2fd;
  --border:#e5e3de;--border-focus:#0288d1;
  --shadow-sm:0 1px 2px rgba(0,0,0,.05);
  --shadow-md:0 4px 12px rgba(0,0,0,.08);
  --shadow-lg:0 8px 30px rgba(0,0,0,.12);
  --radius:6px;--radius-lg:10px;
}
html{font-size:14px}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','DM Sans',system-ui,sans-serif;background:var(--bg);color:var(--text);line-height:1.5;-webkit-font-smoothing:antialiased;-moz-osx-font-smoothing:grayscale;text-rendering:auto}
h1,h2,h3,h4{font-family:'Space Grotesk','DM Sans',sans-serif;font-weight:600}

.app{display:flex;min-height:100vh}
.sidebar{width:240px;background:var(--primary);color:#fff;display:flex;flex-direction:column;position:fixed;top:0;left:0;bottom:0;z-index:100;transition:transform .2s}
.sidebar-header{padding:16px 20px;border-bottom:1px solid rgba(255,255,255,.15);display:flex;align-items:center;gap:12px}
.sidebar-logo{width:44px;height:44px;border-radius:50%;object-fit:cover;border:2px solid rgba(255,255,255,.3);flex-shrink:0}
.sidebar-header h1{font-size:1rem;letter-spacing:.5px}
.sidebar-header small{opacity:.7;font-size:.75rem}
.sidebar-nav{flex:1;padding:12px 0;overflow-y:auto}
.nav-section{padding:0 12px;margin-bottom:8px}
.nav-section-title{font-size:.65rem;text-transform:uppercase;letter-spacing:1.5px;opacity:.5;padding:8px 12px 4px}
.nav-item{display:flex;align-items:center;gap:10px;padding:9px 12px;border-radius:var(--radius);cursor:pointer;font-size:.85rem;transition:background .15s;color:rgba(255,255,255,.8)}
.nav-item:hover{background:rgba(255,255,255,.1);color:#fff}
.nav-item.active{background:rgba(255,255,255,.15);color:#fff;font-weight:500}
.nav-item svg{width:18px;height:18px;flex-shrink:0}
.nav-badge{margin-left:auto;background:var(--accent);color:#fff;font-size:.65rem;padding:1px 7px;border-radius:10px;font-weight:600}
.sidebar-footer{padding:16px 20px;border-top:1px solid rgba(255,255,255,.15);font-size:.75rem}
.sidebar-link{color:rgba(255,255,255,.55);text-decoration:none;font-size:.73rem;padding:3px 0;display:flex;align-items:center;gap:6px;transition:color .15s}
.sidebar-link:hover{color:#fff}

.main{margin-left:240px;flex:1;min-width:0}
.topbar{height:56px;background:var(--surface);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;padding:0 24px;position:sticky;top:0;z-index:50}
.topbar-left{display:flex;align-items:center;gap:16px}
.topbar-left h2{font-size:1.1rem}
.topbar-right{display:flex;align-items:center;gap:8px}
.lang-btn{padding:4px 10px;border:1px solid var(--border);border-radius:var(--radius);background:var(--surface);font-size:.75rem;cursor:pointer;font-family:inherit}
.lang-btn.active{background:var(--primary);color:#fff;border-color:var(--primary)}
.content{padding:24px}

.stat-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:16px;margin-bottom:24px}
.stat-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:20px;transition:box-shadow .15s}
.stat-card:hover{box-shadow:var(--shadow-md)}
.stat-label{font-size:.75rem;color:var(--text-secondary);margin-bottom:4px}
.stat-value{font-size:1.8rem;font-weight:700;font-family:'Space Grotesk',sans-serif}
.stat-change{font-size:.7rem;margin-top:4px}
.stat-change.up{color:var(--primary)}

.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);overflow:hidden;margin-bottom:16px}
.card-header{padding:16px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.card-header h3{font-size:.95rem}
.card-body{padding:20px}

.table-wrapper{overflow-x:auto}
table{width:100%;border-collapse:collapse}
th{text-align:left;padding:10px 16px;font-size:.7rem;text-transform:uppercase;letter-spacing:.8px;color:var(--text-secondary);border-bottom:2px solid var(--border);font-weight:600}
td{padding:12px 16px;border-bottom:1px solid var(--border);font-size:.85rem;vertical-align:middle;font-weight:600}
tr:hover td{background:var(--surface-alt)}
.badge{display:inline-block;padding:3px 11px;border-radius:20px;font-size:.72rem;font-weight:700}
.badge-green{background:#c8e6c9;color:#1b5e20}
.badge-orange{background:#ffe0b2;color:#bf360c}
.badge-red{background:#ffcdd2;color:#b71c1c}
.badge-blue{background:#bbdefb;color:#0d47a1}
.badge-gray{background:#cfd8dc;color:#37474f}
.badge-teal{background:#b2dfdb;color:#00695c}
.badge-purple{background:#e8d5f5;color:#6a1b9a}

.btn{display:inline-flex;align-items:center;gap:6px;padding:8px 16px;border-radius:var(--radius);font-size:.8rem;font-weight:500;cursor:pointer;border:1px solid transparent;font-family:inherit;transition:all .15s}
.btn-primary{background:var(--primary);color:#fff;border-color:var(--primary)}
.btn-primary:hover{background:var(--primary-hover)}
.btn-outline{background:transparent;color:var(--text);border-color:var(--border)}
.btn-outline:hover{background:var(--surface-alt)}
.btn-danger{background:var(--danger);color:#fff}
.btn-sm{padding:5px 10px;font-size:.75rem}
.btn-icon{width:32px;height:32px;padding:0;display:inline-flex;align-items:center;justify-content:center;border-radius:var(--radius);border:1px solid var(--border);background:var(--surface);cursor:pointer}

.form-group{margin-bottom:16px}
.form-label{display:block;font-size:.75rem;font-weight:500;margin-bottom:4px;color:var(--text-secondary)}
.form-input{width:100%;padding:8px 12px;border:1px solid var(--border);border-radius:var(--radius);font-size:.85rem;font-family:inherit;background:var(--surface);transition:border-color .15s}
.form-input:focus{outline:none;border-color:var(--border-focus);box-shadow:0 0 0 3px rgba(15,81,50,.1)}
select.form-input{appearance:auto}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.form-row-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px}

.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.4);display:flex;align-items:center;justify-content:center;z-index:200;animation:fadeIn .15s}
.modal{background:var(--surface);border-radius:var(--radius-lg);width:90%;max-width:600px;max-height:85vh;overflow-y:auto;box-shadow:var(--shadow-lg);animation:slideUp .2s}
.modal-wide{max-width:min(96vw,1200px)!important;width:96%!important;max-height:92vh!important}
.modal-wide .modal-header h3{font-size:1.1rem}
.modal-wide .modal-body{padding:24px}
.modal-wide .stay-summary{grid-template-columns:repeat(5,1fr)}
.modal-wide .detail-tabs{display:flex;gap:4px;margin-bottom:20px}
.modal-wide .detail-tab{flex:1;text-align:center;padding:10px 8px;font-size:.9rem}
/* ===== PIN LOGIN ===== */
.pin-overlay{position:fixed;inset:0;background:linear-gradient(135deg,var(--primary-hover) 0%,var(--primary) 100%);display:flex;align-items:center;justify-content:center;z-index:9999;flex-direction:column;gap:24px}
.pin-card{background:white;border-radius:20px;padding:40px 36px;width:360px;box-shadow:0 24px 80px rgba(0,0,0,.4);text-align:center}
.pin-card h2{color:var(--primary);margin-bottom:4px;font-size:1.4rem}
.pin-card .pin-sub{color:#888;font-size:.82rem;margin-bottom:20px}
.pin-user-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(120px,1fr));gap:10px;margin-bottom:20px}
.pin-user-btn{padding:14px 10px;border:2px solid #e0e0e0;border-radius:12px;cursor:pointer;background:white;text-align:center;font-size:.88rem;font-weight:600;transition:all .15s;line-height:1.3}
.pin-user-btn:hover{border-color:var(--primary);background:var(--primary-light)}
.pin-user-btn.selected{border-color:var(--primary);background:var(--primary-light)}
.pin-user-btn .pin-role{font-size:.65rem;color:#aaa;text-transform:uppercase;margin-top:3px;font-weight:400}
.pin-display{font-size:2.2rem;letter-spacing:12px;height:60px;display:flex;align-items:center;justify-content:center;background:#f7f7f7;border-radius:10px;margin:0 0 16px;font-family:monospace;border:2px solid #e8e8e8;color:#222;min-height:60px}
.pin-numpad{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;max-width:230px;margin:0 auto}
.pin-btn{height:58px;font-size:1.3rem;font-weight:700;border:none;border-radius:12px;cursor:pointer;background:#f2f2f2;color:#222;transition:all .12s;outline:none}
.pin-btn:hover{background:#e0e0e0;transform:scale(1.04)}
.pin-btn:active{transform:scale(.95);background:#d0d0d0}
.pin-btn.pin-del{background:#fff0f0;color:#c62828;font-size:1rem}
.pin-btn.pin-ok{background:#e8f5e9;color:#2e7d32;font-size:.95rem;font-weight:700}
.pin-btn.pin-empty{background:transparent;cursor:default;pointer-events:none}
.pin-err{color:#c62828;font-size:.82rem;min-height:18px;margin-top:6px;font-weight:600}
.pin-ver{color:rgba(255,255,255,.45);font-size:.7rem;text-align:center}
/* ===== USER MANAGEMENT ===== */
.user-row{display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid var(--border)}
.user-row:last-child{border-bottom:none}
.user-badge-role{font-size:.65rem;font-weight:700;padding:2px 7px;border-radius:8px;text-transform:uppercase;background:#e8f5e9;color:#2e7d32}
.user-badge-role.admin{background:#e3f2fd;color:#1565c0}
/* ===== TURNO ACTIVO (topbar) ===== */
.turno-chip{display:flex;align-items:center;gap:6px;background:var(--primary);color:white;border-radius:20px;padding:4px 12px;font-size:.8rem;font-weight:600;cursor:pointer;border:none;white-space:nowrap}
.turno-chip:hover{background:#0a3d26}
/* ===== WELCOME / GOODBYE ANIMATIONS ===== */
@keyframes wc-in{from{opacity:0;transform:scale(.72) translateY(24px)}to{opacity:1;transform:scale(1) translateY(0)}}
@keyframes wc-bg{from{opacity:0}to{opacity:1}}
@keyframes wc-pulse{0%,100%{opacity:.7;transform:scale(1)}50%{opacity:1;transform:scale(1.04)}}
.wc-overlay{position:fixed;inset:0;z-index:10000;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:20px;animation:wc-bg .4s ease both}
.wc-overlay.welcome{background:linear-gradient(145deg,var(--primary-hover) 0%,var(--primary) 55%,var(--primary-hover) 100%)}
.wc-overlay.goodbye{background:linear-gradient(145deg,#1a237e 0%,#283593 55%,#0d47a1 100%)}
.wc-card{background:rgba(255,255,255,.97);border-radius:28px;padding:52px 68px;text-align:center;box-shadow:0 28px 90px rgba(0,0,0,.55);animation:wc-in .65s cubic-bezier(.34,1.56,.64,1) both;max-width:460px;width:90%}
.wc-logo{height:76px;border-radius:12px;margin-bottom:18px;box-shadow:0 6px 24px rgba(0,0,0,.18);animation:wc-pulse 2.5s ease-in-out infinite}
.wc-greeting{font-size:.8rem;color:#aaa;text-transform:uppercase;letter-spacing:3px;margin-bottom:6px}
.wc-name{font-size:2.6rem;font-weight:900;line-height:1.1;margin-bottom:8px}
.wc-name.green{background:linear-gradient(135deg,var(--primary),var(--primary-hover));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.wc-name.blue{background:linear-gradient(135deg,#1565c0,#283593);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.wc-role{font-size:.85rem;color:#888;margin-bottom:18px}
.wc-time-chip{display:inline-flex;align-items:center;gap:8px;border-radius:24px;padding:7px 18px;font-size:.85rem;font-weight:700}
.wc-time-chip.green{background:var(--primary-light);color:var(--primary);border:1px solid var(--border-focus)}
.wc-time-chip.blue{background:#e3f2fd;color:#1565c0;border:1px solid #90caf9}
.wc-warn-box{background:#fff8e1;border:1px solid #ffe082;border-radius:12px;padding:10px 18px;font-size:.82rem;color:#e65100;margin-top:14px;line-height:1.5}
.wc-hint{color:rgba(255,255,255,.4);font-size:.72rem;letter-spacing:1px;cursor:pointer;margin-top:4px}
.wc-hint:hover{color:rgba(255,255,255,.7)}
/* ===== SIGNAGE / CARTELERÍA ===== */
.cartel-templates{display:grid;grid-template-columns:repeat(auto-fill,minmax(130px,1fr));gap:10px;margin-bottom:16px}
.cartel-tpl-btn{border-radius:12px;padding:14px 10px;border:2px solid var(--border);cursor:pointer;text-align:center;font-size:.82rem;font-weight:600;background:white;transition:all .15s;line-height:1.4}
.cartel-tpl-btn:hover{border-color:var(--primary);background:var(--surface-alt)}
.cartel-tpl-btn.active{border-color:var(--primary);background:#e8f5e9}
.cartel-preview-wrap{border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;box-shadow:var(--shadow);background:white;aspect-ratio:1/1.414;position:relative;max-width:320px;margin:0 auto}
/* ===== ESCANER EN FICHA ===== */
.scan-adult-tabs{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:14px}
.scan-adult-btn{padding:6px 12px;border:2px solid var(--border);border-radius:20px;cursor:pointer;font-size:.8rem;font-weight:600;background:white;transition:all .15s}
.scan-adult-btn:hover{border-color:var(--primary)}
.scan-adult-btn.done{border-color:var(--primary);background:#e8f5e9;color:var(--primary)}
.scan-adult-btn.active{border-color:var(--primary);background:var(--primary);color:white}
.scan-adult-btn.warn{border-color:var(--accent);background:#fff8e1}
.scan-preview{width:100%;max-width:200px;border:1px solid var(--border);border-radius:var(--radius);display:block;margin-top:8px}
.scan-slot{background:var(--surface-alt);border:2px dashed var(--border);border-radius:var(--radius);padding:14px;text-align:center;font-size:.8rem;color:var(--text-tertiary);margin-top:8px;cursor:pointer}
.scan-slot:hover{border-color:var(--primary);color:var(--primary)}
.scan-warn-banner{background:#fff8e1;border:1px solid #ffe082;border-radius:var(--radius);padding:10px 14px;font-size:.82rem;color:#e65100;margin-bottom:12px;display:flex;align-items:center;gap:8px}
.scan-queue-banner{background:#e3f2fd;border:1px solid #90caf9;border-radius:var(--radius);padding:10px 14px;font-size:.82rem;color:#1565c0;margin-bottom:12px;display:flex;align-items:center;gap:8px;cursor:pointer}
/* === C5 guest row === */
tr.c5-row{background:#f3e5f5!important}
tr.c5-row td{border-bottom:1px solid #ce93d8!important}
tr.c5-row td:first-child{box-shadow:inset 4px 0 0 #7b1fa2}
.c5-badge{display:inline-block;width:8px;height:8px;border-radius:50%;background:#7b1fa2;margin-left:5px;vertical-align:middle;title:'cobro especial'}
/* === C5 cobro overlay inside modal === */
.c5-overlay{position:absolute;inset:0;background:rgba(255,255,255,.97);z-index:10;display:flex;align-items:center;justify-content:center;border-radius:var(--radius);padding:32px}
.c5-auth-box{background:white;border-radius:16px;padding:28px 24px;width:300px;text-align:center;box-shadow:0 8px 32px rgba(123,31,162,.2);border:2px solid #e1bee7}
.modal-body{position:relative}
/* ===== SHIFT LOG ===== */
.slog-entry{display:flex;gap:10px;padding:6px 0;border-bottom:1px solid var(--border);font-size:.82rem;align-items:flex-start}
.slog-ts{color:var(--text-tertiary);white-space:nowrap;font-family:monospace;font-size:.78rem;min-width:80px}
.slog-action{font-weight:700;min-width:80px;font-size:.78rem}
.slog-details{color:var(--text-secondary)}
.modal-header{padding:20px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.modal-header h3{font-size:1rem}
.modal-body{padding:20px}
.modal-footer{padding:16px 20px;border-top:1px solid var(--border);display:flex;justify-content:flex-end;gap:8px}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes slideUp{from{transform:translateY(20px);opacity:0}to{transform:translateY(0);opacity:1}}

.pitch-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(64px,1fr));gap:6px}
.pitch-cell{aspect-ratio:1;border-radius:var(--radius);display:flex;flex-direction:column;align-items:center;justify-content:center;font-size:.65rem;font-weight:600;cursor:pointer;border:2px solid transparent;transition:all .15s}
.pitch-cell.free{background:#e8f5e9;color:#2e7d32;border-color:#c8e6c9}
.pitch-cell.free:hover{border-color:#2e7d32;box-shadow:var(--shadow-sm)}
.pitch-cell.occupied{background:#ffebee;color:#c62828;border-color:#ffcdd2}
.pitch-cell.reserved{background:#fff3e0;color:#e65100;border-color:#ffe0b2}
.pitch-cell.maintenance{background:#eceff1;color:#546e6a;border-color:#cfd8dc}
.pitch-cell-num{font-size:.8rem;font-weight:700}
.pitch-cell-type{font-size:.5rem;opacity:.8}
.pitch-cell.inamovible{background-image:repeating-linear-gradient(45deg,rgba(198,40,40,.18),rgba(198,40,40,.18) 3px,transparent 3px,transparent 9px)!important;border-color:#c62828!important;box-shadow:inset 0 0 0 2px rgba(198,40,40,.3);}

.service-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:12px}
.service-card{padding:16px;border-radius:var(--radius);border:1px solid var(--border);background:var(--surface)}
.service-icon{font-size:1.5rem;margin-bottom:8px}
.service-name{font-size:.85rem;font-weight:600;margin-bottom:4px}

/* CSS Bar Chart */
.bar-chart{display:flex;align-items:flex-end;gap:8px;height:180px;padding:0 4px}
.bar-col{flex:1;display:flex;flex-direction:column;align-items:center;gap:4px}
.bar-fill{width:100%;border-radius:4px 4px 0 0;transition:height .4s ease;min-width:24px}
.bar-label{font-size:.65rem;color:var(--text-secondary)}
.bar-value{font-size:.65rem;font-weight:600}

/* CSS Pie/Donut */
.donut-chart{position:relative;width:180px;height:180px;margin:0 auto}
.donut-center{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;flex-direction:column}
.donut-center-value{font-size:1.4rem;font-weight:700;font-family:'Space Grotesk',sans-serif}
.donut-center-label{font-size:.65rem;color:var(--text-secondary)}
.legend{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;margin-top:12px}
.legend-item{display:flex;align-items:center;gap:4px;font-size:.7rem}
.legend-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}

.progress-bar-h{height:8px;background:var(--border);border-radius:4px;overflow:hidden}
.progress-bar-h-fill{height:100%;border-radius:4px;transition:width .3s}

.tabs{display:flex;gap:2px;border-bottom:2px solid var(--border);margin-bottom:20px}
.tab{padding:10px 16px;font-size:.8rem;cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-2px;color:var(--text-secondary);font-weight:500;transition:all .15s}
.tab.active{color:var(--primary);border-bottom-color:var(--primary)}
.tab:hover{color:var(--text)}

.toast{position:fixed;bottom:24px;right:24px;background:#333;color:#fff;padding:12px 20px;border-radius:var(--radius);font-size:.8rem;z-index:99999;animation:slideUp .3s;box-shadow:var(--shadow-lg)}
.toast.success{background:var(--primary)}
.toast.error{background:var(--danger)}
.detail-tabs{display:flex;gap:0;border-bottom:2px solid var(--border);margin-bottom:20px}
.detail-tab{padding:10px 18px;font-size:.82rem;font-weight:500;cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-2px;color:var(--text-secondary);transition:all .15s}
.detail-tab.active{color:var(--primary);border-bottom-color:var(--primary);font-weight:600}
.detail-tab:hover{color:var(--text)}
.stay-summary{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:16px}
.stay-box{background:var(--surface-alt);border-radius:var(--radius);padding:14px;text-align:center}
.stay-box-label{font-size:.7rem;text-transform:uppercase;letter-spacing:1px;color:var(--text-secondary);margin-bottom:4px}
.stay-box-val{font-size:1.25rem;font-weight:700;font-family:'Space Grotesk',sans-serif}
.move-pitch-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(70px,1fr));gap:6px;max-height:220px;overflow-y:auto;border:1px solid var(--border);border-radius:var(--radius);padding:10px;margin:12px 0}
.move-pitch-cell{border-radius:var(--radius);padding:8px 4px;text-align:center;font-size:.7rem;font-weight:600;cursor:pointer;border:2px solid transparent;transition:all .15s}
.move-pitch-cell.avail{background:#e8f5e9;color:#2e7d32;border-color:#c8e6c9}
.move-pitch-cell.avail:hover{border-color:#2e7d32;transform:scale(1.05)}
.move-pitch-cell.conflict{background:#ffebee;color:#c62828;border-color:#ffcdd2;cursor:default;opacity:.6}
.move-pitch-cell.current{background:var(--primary);color:#fff;border-color:var(--primary);cursor:default}
.move-pitch-cell.chosen{background:var(--accent);color:#fff;border-color:var(--accent)}
.alert-box{padding:10px 14px;border-radius:var(--radius);font-size:.82rem;margin:10px 0;display:flex;align-items:flex-start;gap:8px}
.alert-box.warn{background:#fff3e0;color:#e65100;border:1px solid #ffe0b2}
.alert-box.ok{background:#e8f5e9;color:#1b5e20;border:1px solid #c8e6c9}
.alert-box.info{background:#e3f2fd;color:#0d47a1;border:1px solid #bbdefb}


.store-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:14px;margin-top:16px}
.prod-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);overflow:hidden;transition:box-shadow .15s;cursor:pointer}
.prod-card:hover{box-shadow:var(--shadow-md)}
.prod-card.thetford{border-top:3px solid #0071CE}
.prod-img{height:120px;display:flex;align-items:center;justify-content:center;background:var(--surface-alt);font-size:3rem;position:relative;overflow:hidden}
.prod-img img{width:100%;height:100%;object-fit:contain;padding:8px}
.prod-body{padding:12px}
.prod-name{font-size:.85rem;font-weight:600;margin-bottom:4px;line-height:1.3}
.prod-cat{font-size:.65rem;text-transform:uppercase;letter-spacing:1px;color:var(--text-secondary);margin-bottom:8px}
.prod-prices{display:flex;justify-content:space-between;align-items:center;margin-top:6px}
.prod-cost{font-size:.7rem;color:var(--text-secondary)}
.prod-pvp{font-size:1rem;font-weight:700;color:var(--primary);font-family:'Space Grotesk',sans-serif}
.prod-stock{font-size:.7rem;margin-top:4px}
.prod-stock.low{color:var(--danger)}
.prod-stock.ok{color:var(--primary)}
.sale-panel{display:grid;grid-template-columns:1fr 380px;gap:16px;align-items:start}
.sale-products{overflow-y:auto;max-height:calc(100vh - 260px)}
.sale-cart{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:16px;position:sticky;top:80px}
.cart-title{font-size:1rem;font-weight:600;margin-bottom:14px;padding-bottom:10px;border-bottom:1px solid var(--border)}
.cart-items{max-height:280px;overflow-y:auto;margin-bottom:12px}
.cart-item{display:flex;align-items:center;gap:8px;padding:7px 0;border-bottom:1px solid var(--border);font-size:.82rem}
.cart-item-name{flex:1;font-weight:500}
.cart-qty-ctrl{display:flex;align-items:center;gap:6px}
.cart-qty-btn{width:22px;height:22px;border-radius:50%;border:1px solid var(--border);background:var(--surface);cursor:pointer;font-size:.9rem;display:flex;align-items:center;justify-content:center}
.cart-qty{font-weight:700;min-width:16px;text-align:center}
.cart-subtotal{font-weight:600;min-width:50px;text-align:right;color:var(--primary)}
.cart-remove{color:var(--danger);cursor:pointer;font-size:.9rem;padding:2px 4px}
.cart-total-row{display:flex;justify-content:space-between;padding:10px 0 6px;font-size:1.1rem;font-weight:700;border-top:2px solid var(--border)}
.cart-total-val{color:var(--primary);font-family:'Space Grotesk',sans-serif}
.pay-btns{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:10px}
.shift-table{width:100%;border-collapse:collapse;font-size:.85rem}
.shift-table th{text-align:left;padding:8px 10px;border-bottom:2px solid var(--border);font-size:.75rem;text-transform:uppercase;color:var(--text-secondary)}
.shift-table td{padding:8px 10px;border-bottom:1px solid var(--border);vertical-align:middle}
.shift-total-row td{font-weight:700;font-size:.95rem;color:var(--primary);border-top:2px solid var(--primary)}
.closed-tag{display:inline-block;background:#e8f5e9;color:#1b5e20;padding:2px 10px;border-radius:12px;font-size:.75rem;font-weight:600}
.open-tag{display:inline-block;background:#fff3e0;color:#e65100;padding:2px 10px;border-radius:12px;font-size:.75rem;font-weight:600}

@media(max-width:768px){
  .sidebar{transform:translateX(-100%)}
  .sidebar.open{transform:translateX(0)}
  .main{margin-left:0}
  .form-row,.form-row-3{grid-template-columns:1fr}
  .stat-grid{grid-template-columns:1fr 1fr}
  .pitch-grid{grid-template-columns:repeat(auto-fill,minmax(50px,1fr))}
  .two-col{grid-template-columns:1fr !important}
}
.menu-toggle{display:none;background:none;border:none;cursor:pointer;color:var(--text)}
@media(max-width:768px){.menu-toggle{display:block}}
.mobile-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.3);z-index:99}
@media(max-width:768px){.mobile-overlay.show{display:block}}
/* ===== FIRMA WACOM ===== */
.sig-canvas-wrap{border:2px dashed var(--border);border-radius:var(--radius);background:#fafafa;position:relative;overflow:hidden;touch-action:none;cursor:crosshair}
.sig-canvas-wrap.has-sig{border-color:var(--primary);background:#f0f7f4}
.sig-canvas-wrap canvas{display:block;width:100%;height:180px}
.sig-toolbar{display:flex;gap:8px;margin-top:8px;flex-wrap:wrap;align-items:center}
.sig-hint{font-size:.72rem;color:var(--text-tertiary);margin-left:auto}
.sig-saved{display:flex;align-items:center;gap:8px;background:var(--primary-light);border:1px solid var(--primary);border-radius:var(--radius);padding:8px 12px;font-size:.82rem;color:var(--primary);font-weight:600}
/* ===== NOTEBOOK ===== */
.nb-wrap{max-width:900px}
.nb-topbar{display:flex;gap:10px;align-items:center;margin-bottom:18px;flex-wrap:wrap}
.nb-filter-btn{padding:5px 14px;border-radius:20px;font-size:.75rem;font-weight:600;cursor:pointer;border:1.5px solid var(--border);background:var(--surface);color:var(--text-secondary);transition:.15s}
.nb-filter-btn.active{background:var(--primary);color:#fff;border-color:var(--primary)}
.nb-filter-btn.alarm-active{background:#c62828;color:#fff;border-color:#c62828}
.nb-new-btn{margin-left:auto}
.nb-note{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:16px 18px;margin-bottom:12px;transition:box-shadow .15s;position:relative}
.nb-note:hover{box-shadow:var(--shadow-md)}
.nb-note.urgent{border-left:4px solid #e65100;background:#fffbf7}
.nb-note.alarm{border-left:4px solid #c62828;background:#fff5f5}
.nb-note.alarm.fired{border-left-color:#c62828;animation:nb-pulse 1s ease-in-out 3}
@keyframes nb-pulse{0%,100%{background:#fff5f5}50%{background:#ffebee}}
.nb-note.done{opacity:.55}
.nb-note-header{display:flex;align-items:flex-start;gap:10px;margin-bottom:8px}
.nb-priority-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0;margin-top:4px}
.nb-priority-dot.normal{background:#aaa}
.nb-priority-dot.urgent{background:#e65100}
.nb-priority-dot.alarm{background:#c62828}
.nb-meta{flex:1;min-width:0}
.nb-author{font-size:.75rem;color:var(--text-secondary)}
.nb-time{font-size:.72rem;color:var(--text-tertiary);margin-top:1px}
.nb-badge{font-size:.68rem;font-weight:700;padding:2px 8px;border-radius:10px;white-space:nowrap}
.nb-badge.read{background:var(--primary-light);color:var(--primary)}
.nb-badge.unread{background:#fff3e0;color:#e65100}
.nb-badge.alarm{background:#fdecea;color:#c62828}
.nb-badge.done{background:#f5f5f5;color:#aaa}
.nb-body{font-size:.88rem;line-height:1.6;margin-bottom:10px;word-break:break-word}
.nb-guest-link{display:inline-flex;align-items:center;gap:5px;background:var(--info-light);color:var(--info);border-radius:20px;padding:3px 10px;font-size:.75rem;font-weight:600;cursor:pointer;border:none;font-family:inherit;transition:.15s;margin-top:4px}
.nb-guest-link:hover{background:var(--info);color:#fff}
.nb-alarm-box{display:flex;align-items:center;gap:6px;background:#fdecea;border:1px solid #ef9a9a;border-radius:var(--radius);padding:6px 10px;font-size:.75rem;color:#c62828;font-weight:600;margin-top:8px}
.nb-actions{display:flex;gap:6px;flex-wrap:wrap}
.nb-compose{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:20px;margin-bottom:20px}
.nb-compose h4{font-size:.9rem;margin-bottom:14px;color:var(--text)}
.nb-alarm-notif{position:fixed;top:70px;right:20px;background:#c62828;color:#fff;border-radius:var(--radius-lg);padding:16px 20px;z-index:9999;box-shadow:0 8px 32px rgba(0,0,0,.25);max-width:340px;animation:slideInRight .3s}
@keyframes slideInRight{from{transform:translateX(120%)}to{transform:translateX(0)}}
.nb-badge-count{background:#c62828;color:#fff;font-size:.6rem;font-weight:700;border-radius:50%;width:16px;height:16px;display:flex;align-items:center;justify-content:center;margin-left:auto}

/* ═══ FICHA FULLSCREEN ═══ */
.ffs{position:fixed;inset:0;z-index:9998;background:var(--bg);display:grid;grid-template-columns:300px 1fr;grid-template-rows:56px 1fr 52px;grid-template-areas:"ffs-top ffs-top" "ffs-aside ffs-main" "ffs-aside ffs-foot";overflow:hidden}
.ffs-top{grid-area:ffs-top;background:linear-gradient(135deg,var(--primary-hover) 0%,var(--primary) 60%);color:#fff;display:flex;align-items:center;justify-content:space-between;padding:0 20px;box-shadow:0 2px 8px rgba(0,0,0,.12);z-index:2}
.ffs-top-left{display:flex;align-items:center;gap:12px;min-width:0;flex:1}
.ffs-top-name{font-size:16px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ffs-ref{display:inline-flex;align-items:center;gap:3px;background:rgba(255,255,255,.14);padding:2px 8px;border-radius:20px;font-family:monospace;font-size:11px;font-weight:600;letter-spacing:.03em;white-space:nowrap}
.ffs-chip{display:inline-flex;align-items:center;gap:4px;padding:2px 8px;border-radius:20px;font-size:10.5px;font-weight:600}
.ffs-chip-warn{background:#FFEBEE;color:#C62828}
.ffs-chip-ok{background:#C8E6C9;color:#1B5E20}
.ffs-chip-bad{background:#fee2e2;color:#dc2626}
.ffs-chip-info{background:rgba(255,255,255,.18);color:#fff;border:1px solid rgba(255,255,255,.2)}
.ffs-tabs{display:flex;gap:4px;margin-left:20px}
.ffs-tab{padding:7px 14px;border-radius:7px;cursor:pointer;font-weight:600;font-size:12px;color:rgba(255,255,255,.7);display:flex;align-items:center;gap:6px;transition:all .15s}
.ffs-tab:hover{color:#fff;background:rgba(255,255,255,.1)}
.ffs-tab.active{background:rgba(255,255,255,.18);color:#fff}
.ffs-tab .ffs-tbdg{background:#C62828;color:#fff;font-size:9.5px;padding:1px 6px;border-radius:20px;font-weight:700}
.ffs-top-actions{display:flex;gap:6px;flex-shrink:0}
.ffs-top-actions button{width:34px;height:34px;border-radius:8px;border:1px solid rgba(255,255,255,.15);background:rgba(255,255,255,.1);color:#fff;cursor:pointer;font-size:14px;display:flex;align-items:center;justify-content:center;transition:background .12s}
.ffs-top-actions button:hover{background:rgba(255,255,255,.22)}

.ffs-aside{grid-area:ffs-aside;background:#fff;border-right:1px solid var(--border);overflow-y:auto;display:flex;flex-direction:column}
.ffs-av{text-align:center;padding:22px 18px 14px;border-bottom:1px solid var(--border);background:linear-gradient(180deg,var(--surface-alt),#fff)}
.ffs-av-circle{width:76px;height:76px;border-radius:50%;background:linear-gradient(135deg,var(--primary),var(--primary-hover));color:#fff;display:flex;align-items:center;justify-content:center;font-size:26px;font-weight:800;margin:0 auto 10px;box-shadow:0 4px 16px rgba(0,0,0,.2)}
.ffs-av-name{font-size:16px;font-weight:700;letter-spacing:-.01em;margin-bottom:2px}
.ffs-av-sub{font-size:12px;color:var(--text-secondary);margin-bottom:6px}
.ffs-av-refs{display:flex;gap:5px;justify-content:center;flex-wrap:wrap}
.ffs-av-ref{background:var(--primary-light,#e8f0fe);color:var(--primary);padding:2px 8px;border-radius:20px;font-size:10.5px;font-family:monospace;font-weight:600;letter-spacing:.03em}

.ffs-kpis{padding:12px 16px;border-bottom:1px solid var(--border);display:flex;flex-direction:column;gap:7px}
.ffs-kpi{display:flex;align-items:center;justify-content:space-between;padding:7px 10px;background:var(--surface-alt);border-radius:7px;border-left:3px solid var(--primary)}
.ffs-kpi.red{border-left-color:var(--danger)}
.ffs-kpi.grn{border-left-color:var(--primary)}
.ffs-kpi .kl{font-size:11px;color:var(--text-secondary);font-weight:600}
.ffs-kpi .kv{font-size:14px;font-weight:700}
.ffs-kpi .kv.red{color:var(--danger)}

.ffs-contact{padding:12px 16px;border-bottom:1px solid var(--border);display:flex;flex-direction:column;gap:7px;font-size:12.5px}
.ffs-contact .cl{font-size:10px;color:var(--text-tertiary);font-weight:700;text-transform:uppercase;letter-spacing:.06em;margin-bottom:3px}
.ffs-contact .cr{display:flex;gap:8px;align-items:center;overflow:hidden}
.ffs-contact .cr .ci{width:24px;height:24px;border-radius:6px;background:var(--primary-light,#e8f0fe);color:var(--primary);display:flex;align-items:center;justify-content:center;font-size:11px;flex-shrink:0}
.ffs-contact .cr .ct{overflow:hidden;text-overflow:ellipsis;white-space:nowrap}

.ffs-parcela{padding:14px 16px;background:linear-gradient(135deg,var(--primary-light,#e8f0fe),var(--surface-alt));text-align:center}
.ffs-parcela .pp{font-size:40px;font-weight:800;color:var(--primary);line-height:1;letter-spacing:-.04em}
.ffs-parcela .pl{font-size:10px;color:var(--text-secondary);font-weight:600;text-transform:uppercase;letter-spacing:.06em;margin-top:2px}
.ffs-parcela-grid{display:grid;grid-template-columns:1fr 1fr;gap:5px;margin-top:10px}
.ffs-parcela-grid .pm{background:#fff;border-radius:7px;padding:6px 8px;text-align:center;border:1px solid var(--border)}
.ffs-parcela-grid .pm .pml{font-size:9.5px;color:var(--text-tertiary);font-weight:600;text-transform:uppercase}
.ffs-parcela-grid .pm .pmv{font-size:12.5px;font-weight:700}

.ffs-main{grid-area:ffs-main;overflow:auto;padding:16px}
.ffs-cols{display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px}
.ffs-col{display:flex;flex-direction:column;gap:14px;min-width:0}
.ffs-card{background:#fff;border:1px solid var(--border);border-radius:var(--radius);box-shadow:0 1px 3px rgba(0,0,0,.04)}
.ffs-card-h{padding:10px 14px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border)}
.ffs-card-t{font-size:12px;font-weight:700;display:flex;align-items:center;gap:6px;text-transform:uppercase;letter-spacing:.01em}
.ffs-card-a{font-size:11px;color:var(--primary);font-weight:600;cursor:pointer}
.ffs-card-b{padding:12px 14px}
.ffs-fields{display:grid;grid-template-columns:1fr 1fr;gap:8px 16px}
.ffs-fl{font-size:10px;color:var(--text-tertiary);font-weight:600;text-transform:uppercase;letter-spacing:.05em}
.ffs-fv{font-size:12.5px;font-weight:500;overflow:hidden;text-overflow:ellipsis}

/* Companions chip */
.ffs-comp-chip{display:inline-flex;align-items:center;gap:4px;background:var(--primary-light,#e8f0fe);color:var(--primary);padding:2px 8px;border-radius:20px;font-size:10.5px;font-weight:600;cursor:pointer;border:1px solid rgba(0,0,0,.06);margin-left:6px;text-transform:none;letter-spacing:0}
.ffs-comp-chip:hover{background:var(--primary);color:#fff}
.ffs-comp-panel{margin-top:12px;border-top:1px dashed var(--border);padding-top:10px}
.ffs-comp-row{display:flex;gap:8px;align-items:center;padding:6px 8px;background:var(--surface-alt);border:1px solid var(--border);border-radius:6px;font-size:12px;margin-bottom:5px}
.ffs-comp-row:hover{background:#fff;border-color:var(--primary-light,#e8f0fe)}

/* Vehicles list */
.ffs-veh{display:flex;gap:8px;align-items:center;padding:6px 8px;background:var(--surface-alt);border:1px solid var(--border);border-radius:6px;margin-bottom:5px}
.ffs-veh-plate{display:inline-block;background:#fff;border:2px solid var(--primary-hover);color:var(--primary-hover);padding:2px 8px;border-radius:3px;font-family:monospace;font-weight:700;font-size:12px;letter-spacing:.04em}

/* Sub-tabs for acciones/docs */
.ffs-subtabs{display:flex;gap:4px;margin-bottom:14px;flex-wrap:wrap}
.ffs-stab{padding:6px 14px;border-radius:7px;font-size:12px;font-weight:600;cursor:pointer;border:1px solid var(--border);background:#fff;color:var(--text-secondary)}
.ffs-stab:hover{background:var(--surface-alt);border-color:var(--primary-light,#e8f0fe)}
.ffs-stab.active{background:var(--primary);color:#fff;border-color:var(--primary)}
/* Inline edit inputs inside cards */
.ffs-input-edit{width:100%;padding:3px 6px;border:1px solid var(--border);border-radius:4px;font-size:.82rem;font-family:inherit;background:white;outline:none;transition:border-color .15s}
.ffs-input-edit:focus{border-color:var(--primary);box-shadow:0 0 0 2px rgba(66,133,244,.15)}
/* Quick-action bar (bottom of Ficha 360°) */
.ffs-quick-bar{display:flex;gap:6px;flex-wrap:wrap;padding:10px 16px;border-top:2px dashed var(--border);margin-top:4px;background:var(--surface-alt,#f7f8fa);border-radius:0 0 0 0}
.ffs-qbtn{padding:6px 13px;border:1px solid var(--border);border-radius:20px;background:white;cursor:pointer;font-size:.78rem;font-family:inherit;display:inline-flex;align-items:center;gap:5px;font-weight:600;transition:all .15s;color:var(--text-secondary)}
.ffs-qbtn:hover{background:var(--primary-light,#e8f0fe);border-color:var(--primary);color:var(--primary)}
.ffs-qbtn.active{background:var(--primary);color:white;border-color:var(--primary)}
/* Inline action panel */
.ffs-inline-panel{border:1px solid var(--border);border-top:3px solid var(--primary);border-radius:0 0 10px 10px;padding:16px 18px;background:white;margin-top:0}
.ffs-inline-panel-h{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;padding-bottom:8px;border-bottom:1px solid var(--border)}
.ffs-inline-panel-title{font-size:.88rem;font-weight:700;color:var(--text-primary)}
/* ── Sistema CLIENTE NO BIENVENIDO ── */
.ban-banner{background:#b71c1c;color:#fff;padding:12px 18px;border-radius:var(--radius,8px);margin-bottom:14px;display:flex;align-items:center;gap:12px;animation:banPulse 2s infinite}
@keyframes banPulse{0%,100%{box-shadow:0 0 0 0 rgba(183,28,28,.4)}50%{box-shadow:0 0 0 6px rgba(183,28,28,0)}}
.ban-banner-icon{font-size:1.8rem;flex-shrink:0}
.ban-banner-text{flex:1}
.ban-banner-title{font-weight:800;font-size:.95rem;letter-spacing:.5px;text-transform:uppercase}
.ban-banner-sub{font-size:.78rem;opacity:.87;margin-top:2px}
.ban-sidebar{margin-top:10px;padding:10px;border-radius:8px;font-size:.78rem}
.ban-sidebar.active{background:#ffebee;border:2px solid #c62828;color:#b71c1c}
.ban-sidebar.inactive{background:transparent}
.ban-sidebar-badge{font-weight:800;letter-spacing:.5px;display:flex;align-items:center;gap:6px;margin-bottom:6px;font-size:.82rem}
.ban-btn{width:100%;padding:8px 12px;border-radius:20px;font-size:.78rem;font-weight:600;font-family:inherit;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:6px;transition:all .15s;border:1px solid}
.ban-btn-activate{background:#fff5f5;border-color:#ffcdd2;color:#c62828}
.ban-btn-activate:hover{background:#ffebee;border-color:#c62828}

<body>

<!-- ── Pantalla de carga: visible hasta que Firestore complete el pull ── -->
<div id="cs-loading" style="
  position:fixed;inset:0;z-index:99999;
  background:var(--bg,#f8f7f4);
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:20px;font-family:'DM Sans',sans-serif;">
  <div style="font-family:'Space Grotesk',sans-serif;font-size:1.6rem;font-weight:700;
    color:var(--cs-primario,#0288d1);letter-spacing:-.5px">
    Checking<span style="color:var(--cs-secundario,#e67e22)">Smart</span>
  </div>
  <div style="display:flex;gap:8px">
    <span class="cs-dot"></span>
    <span class="cs-dot" style="animation-delay:.18s"></span>
    <span class="cs-dot" style="animation-delay:.36s"></span>
  </div>
  <p style="font-size:.85rem;color:#888;margin:0">Cargando datos...</p>
</div>
<style>
.cs-dot{display:inline-block;width:10px;height:10px;border-radius:50%;
  background:var(--cs-primario,#0288d1);
  animation:csDot .8s ease-in-out infinite alternate}
@keyframes csDot{from{opacity:.2;transform:scale(.7)}to{opacity:1;transform:scale(1)}}
</style>

<div id="root"></div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js" integrity="sha384-tMH8h3BGESGckSAVGZ82T9n90ztNXxvdwvdM6UoR56cYcf+0iGXBliJ29D+wZ/x8" crossorigin="anonymous"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js" integrity="sha384-bm7MnzvK++ykSwVJ2tynSE5TRdN+xL418osEVF2DE/L/gfWHj91J2Sphe582B1Bh" crossorigin="anonymous"></script>
<script>
// ─── CheckingSmart — helpers de tenant ────────────────────────────────────────
function _csConfig(){
  var base=(window.Checksmart&&window.Checksmart.config)||{};
  try{
    var tid=base.tenantId||(function(){try{return sessionStorage.getItem('cs_tenant');}catch(ex){return null;}}())||(function(){try{return localStorage.getItem('cs_active_tenant');}catch(ex){return null;}}())||'cs';
    var ov=JSON.parse(localStorage.getItem(tid+'_tenant_cfg'));
    if(ov&&typeof ov==='object')return Object.assign({},base,ov);
  }catch(e){}
  return base;
}
function _csNombre(){ return _csConfig().nombre || 'Mi Área'; }
function _csLogo(){ return _csConfig().logo || '/assets/logos/demo-logo.jpg'; }
function _csEmail(){ return _csConfig().email || 'info@checkingsmart.com'; }
function _csCIF(){ return _csConfig().cif || ''; }
function _csTel(){ return _csConfig().telefono || ''; }
function _csDominio(){ return _csConfig().dominio || 'checkingsmart.com'; }
function _csColor(k){ return getComputedStyle(document.documentElement).getPropertyValue('--cs-'+k).trim() || '#0288d1'; }
function _csTenantId(){
  return (_csConfig().tenantId)
    || (function(){try{return sessionStorage.getItem('cs_tenant');}catch(e){return null;}}())
    || (function(){try{return localStorage.getItem('cs_active_tenant');}catch(e){return null;}}())
    || 'cs';
}
// Tenants que tienen plano interactivo configurado en /mapa/. Cuando se añada
// un nuevo cliente con plano, basta con incluirlo aquí Y en TENANT_CONFIGS de
// /mapa/index.html. Centralizar el gating evita ramas hardcoded por toda la app.
function _csHasPlano(tid){
  var t = tid || _csTenantId();
  return t === 'camperpark-roquetas' || t === 'area-malaga-beach';
}
// Feature flag por tenant. Lee config.features[flag]; si no está definido, usa defaultVal.
// Ejemplo: _csFeature('tiposPlaza', false) → false para Roquetas, true para AMB.
function _csFeature(flag, defaultVal){
  var f = (_csConfig() && _csConfig().features) || {};
  return (flag in f) ? !!f[flag] : !!defaultVal;
}
// Base URL de Cloud Functions — dinámica según el proyecto Firebase activo
// (firestore-db.js expone window.Checksmart.firebaseProjectId)
function _csFnBase(){
  var pid = (window.Checksmart && window.Checksmart.firebaseProjectId) || 'checkingsmart-564a0';
  return 'https://europe-west1-' + pid + '.cloudfunctions.net';
}
// Prefijo localStorage por tenant (evita colisiones entre clientes)
function _csKey(k){
  var tid = (_csConfig().tenantId)
    || (function(){try{return sessionStorage.getItem('cs_tenant');}catch(e){return null;}}())
    || (function(){try{return localStorage.getItem('cs_active_tenant');}catch(e){return null;}}())
    || 'cs';
  return tid+'_'+k;
}

// ── Helper: quién puede borrar cosas críticas ───────────────────────────────
// Por defecto SOLO admin o isMaster. Staff (recepción) nunca. El sync layer
// ya registra _changedBy en cada write, pero la política de borrado es una
// capa adicional de prevención — la recepción no debería poder eliminar
// reservas ni movimientos de caja bajo ninguna circunstancia.
function _csAutoStatus(g){
  if(!g) return 'prereserva';
  // Estados finales o de sistema — NO recalcular
  var _keepAs=['checkedOut','cancelled','checkedIn','pending_payment','checkout'];
  if(_keepAs.indexOf(g.status)>=0) return g.status;
  // Estados ya gestionados por el sistema (no sobrescribir manualmente si ya está bien)
  var _managed=['presente','reserva','prereserva','confirmed','pending'];
  if(_managed.indexOf(g.status)<0 && g.status) return g.status; // status personalizado → no tocar
  var today=new Date().toISOString().split('T')[0];
  if((g.dateIn||'')<=today) return 'presente';
  return (g.paid)?'reserva':'prereserva';
}
function _csCanDelete(user){
  if(!user) return false;
  return !!(user.isMaster || user.role==='admin');
}

// ── Helper: badge "✏ Última modificación por X · [fecha]" ──────────────────
// Red de seguridad visual. Si el doc tiene _changedBy y/o _updatedAt escritos
// por el sync layer, mostramos quién tocó qué y cuándo. Da tranquilidad a la
// recepción — "si toco esto, queda registrado quién fui".
function _csParseTs(v){
  if(!v) return null;
  try{
    if(typeof v === 'string') return new Date(v);
    if(typeof v.toDate === 'function') return v.toDate();
    if(v.seconds) return new Date(v.seconds*1000 + Math.floor((v.nanoseconds||0)/1e6));
    if(v instanceof Date) return v;
  }catch(e){}
  return null;
}
function _csFormatDT(d){
  if(!d || isNaN(d.getTime())) return '';
  try{
    return d.toLocaleString('es-ES',{day:'2-digit',month:'2-digit',year:'2-digit',hour:'2-digit',minute:'2-digit'});
  }catch(e){ return d.toISOString().slice(0,16).replace('T',' '); }
}
// Devuelve un elemento React (span) o null si no hay info de auditoría.
// Uso: e(React.Fragment,null, _csLastEditBadge(g), ...)
function _csLastEditBadge(doc, opts){
  if(!doc) return null;
  var who = doc._changedBy;
  var when = _csParseTs(doc._updatedAt);
  if(!who && !when) return null;
  opts = opts || {};
  var style = Object.assign({
    display:'inline-flex', alignItems:'center', gap:4,
    fontSize:'11px', fontWeight:500, color:'rgba(255,255,255,.75)',
    background:'rgba(255,255,255,.10)', border:'1px solid rgba(255,255,255,.18)',
    padding:'2px 8px', borderRadius:12, whiteSpace:'nowrap', letterSpacing:'.01em'
  }, opts.style || {});
  var text = '\u270F\uFE0F ' + (who || '—') + (when ? ' \u00B7 ' + _csFormatDT(when) : '');
  return React.createElement('span', {
    className: 'cs-last-edit' + (opts.className ? ' '+opts.className : ''),
    title: 'Última modificación — quién y cuándo (auditoría)',
    style: style
  }, text);
}
// ─── Universal export helpers (CSV + Excel via SheetJS) ───
function csExportCSV(rows, filename){
  if(!rows||!rows.length) return;
  var headers=Object.keys(rows[0]);
  var csv=[headers.join(';')].concat(rows.map(function(r){
    return headers.map(function(h){
      var v=r[h]==null?'':String(r[h]);
      return '"'+v.replace(/"/g,'""')+'"';
    }).join(';');
  })).join('\n');
  var blob=new Blob(['\uFEFF'+csv],{type:'text/csv;charset=utf-8'});
  var url=URL.createObjectURL(blob);
  var a=document.createElement('a');a.href=url;a.download=(filename||'export')+'.csv';a.click();
  URL.revokeObjectURL(url);
}
function csExportXLSX(rows, filename, sheetName){
  if(!rows||!rows.length) return;
  if(typeof XLSX==='undefined'){ csExportCSV(rows,filename); return; }
  var ws=XLSX.utils.json_to_sheet(rows);
  var wb=XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb,ws,sheetName||'Hoja1');
  XLSX.writeFile(wb,(filename||'export')+'.xlsx');
}
function csExportButton(rows, filename, sheetName){
  // Returns a dropdown element with CSV + Excel options
  return React.createElement('div',{className:'cs-export-dd',style:{position:'relative',display:'inline-block'}},
    React.createElement('button',{className:'btn btn-sm btn-outline',onClick:function(ev){
      var dd=ev.currentTarget.nextSibling;
      dd.style.display=dd.style.display==='block'?'none':'block';
      setTimeout(function(){
        var handler=function(e){if(!dd.contains(e.target)){dd.style.display='none';document.removeEventListener('click',handler);}};
        document.addEventListener('click',handler);
      },50);
    }},'📥 Exportar ▾'),
    React.createElement('div',{style:{display:'none',position:'absolute',top:'100%',right:0,background:'#fff',border:'1px solid var(--border)',borderRadius:8,boxShadow:'0 4px 12px rgba(0,0,0,.1)',zIndex:100,minWidth:160,marginTop:4}},
      React.createElement('button',{className:'btn',style:{display:'block',width:'100%',textAlign:'left',padding:'10px 14px',background:'none',border:'none',cursor:'pointer'},onClick:function(){csExportCSV(rows,filename);}},'📄 CSV'),
      React.createElement('button',{className:'btn',style:{display:'block',width:'100%',textAlign:'left',padding:'10px 14px',background:'none',border:'none',cursor:'pointer'},onClick:function(){csExportXLSX(rows,filename,sheetName);}},'📊 Excel (.xlsx)')
    )
  );
}

function elecIcon(v){return v==='10amp'?'⚡⚡⚡':v==='6amp'?'⚡⚡':v==='4amp'?'⚡':'';}
function elecLabel(v){return v==='10amp'?'⚡⚡⚡ 10 Amp':v==='6amp'?'⚡⚡ 6 Amp':v==='4amp'?'⚡ 4 Amp':'Sin electricidad';}

// ── Tarifas AMB ─────────────────────────────────────────────────────────────
var TIPOS_PLAZA_AMB=[
  {value:'1linea',    label:'1ª Línea Playa',          ampFixed:'6amp'},
  {value:'otras',     label:'2ª–7ª Línea',             ampFixed:null},
  {value:'longbody8', label:'Long Body +8m / Remolque', ampFixed:null},
  {value:'longbody12',label:'Long Body +12m',           ampFixed:null},
  {value:'xxl',       label:'Plaza XXL',               ampFixed:'10amp'}
];
var DEFAULT_TIPOS_AMB={
  '1linea_6amp':25, 'otras_4amp':22, 'otras_6amp':23,
  'longbody8_4amp':25,'longbody8_6amp':26,
  'longbody12_4amp':34,'longbody12_6amp':35,
  'xxl_10amp':45
};
var DEFAULT_EXTRAS_AMB={duchas:1,lavadora:5,secadora:5,adultoExtra:4,personaExtra:12,parkingCoche:11,parkingAutocaravana:16,descargaAguas:11};
function getPrecioAMB(tipo,elec,prices){
  // Si el tenant no tiene feature tiposPlaza activa, precio plano pernocta.
  if(!_csFeature('tiposPlaza', true)){
    return (prices && (prices.pernocta||prices.pernoctaBase)) || 19;
  }
  var t2=TIPOS_PLAZA_AMB.find(function(x){return x.value===tipo;})||{};
  var amp=t2.ampFixed||elec||'4amp';
  var key=(tipo||'otras')+'_'+amp;
  // Solo caemos a DEFAULT_TIPOS_AMB cuando el tenant sí tiene feature pero Firestore
  // está vacío (primera configuración). Roquetas nunca cae aquí porque feature=false.
  var mat=(prices&&prices.tiposAMB&&Object.keys(prices.tiposAMB).length)?prices.tiposAMB:DEFAULT_TIPOS_AMB;
  return mat[key]||mat['otras_4amp']||22;
}
function getAmpForTipo(tipo,currentElec){
  var t2=TIPOS_PLAZA_AMB.find(function(x){return x.value===tipo;})||{};
  if(t2.ampFixed) return t2.ampFixed;
  return currentElec||'4amp';
}
function _getTiposPlaza(prices){
  // Tenants sin feature tiposPlaza (ej. Roquetas) no tienen lista de tipos.
  // Devolvemos [] para que la UI no muestre selector ni tabla.
  if(!_csFeature('tiposPlaza', true)) return [];
  // Si la propiedad ya está persistida (aunque sea []), se respeta.
  // Solo usamos los defaults cuando NUNCA se ha configurado (primera vez).
  return (prices&&Array.isArray(prices.tiposPlazaList))?prices.tiposPlazaList:TIPOS_PLAZA_AMB;

function _getTarifaActiva(dateIn,tipoPlaza,prices){
  // Devuelve la temporada activa para una fecha y tipo de plaza.
  // dateIn: "2026-07-15" → mmdd: "07-15"
  // tipoPlaza: 'otras'|'1linea'|'longbody8'|...
  var temporadas=(prices&&Array.isArray(prices.temporadas))?prices.temporadas:[];
  if(!temporadas.length) return null;
  var mmdd=(dateIn||'').slice(5);
  if(!mmdd||mmdd.length<5) return null;
  var matching=temporadas.filter(function(t){
    if(t.active===false) return false;
    if(!t.dateFrom||!t.dateTo) return false;
    var inRange=(t.dateFrom<=t.dateTo)
      ?(mmdd>=t.dateFrom&&mmdd<=t.dateTo)
      :(mmdd>=t.dateFrom||mmdd<=t.dateTo);
    if(!inRange) return false;
    if(t.tiposPlaza&&t.tiposPlaza.length>0){

    return true;
  }).sort(function(a,b){return (b.priority||0)-(a.priority||0);});

// ─── Counter atomico de facturas y abonos (Fix #1 audit 06/05/2026) ──────────
// Antes: nextNum = invoices.filter(...).length + 1. Patron vulnerable a:
//   a) Race entre PCs (dos recepciones crean factura a la vez → mismo numero)
//   b) Si una factura se borra del array → siguiente reutiliza numero
//   c) Año hardcoded "2026" → en 2027 las facturas siguen siendo F-2026-XXXX
// Ahora: Firestore transaction sobre tenants/{tid}/config/counters incrementa
// atomicamente el contador del año en curso. Cero race, cero reutilizacion.
//
// Uso:
//   var n = await _csNextDocNumber(2026, 'invoice');  // 1, 2, 3, ...
//   var id = 'F-2026-' + String(n).padStart(4, '0');
async function _csNextDocNumber(year, type){
  if(!window.firebase || !window.firebase.firestore){
    throw new Error('Firebase Firestore no disponible');
  }
  var tid = (window.Checksmart && window.Checksmart.tenantId) || _csTenantId();
  if(!tid || tid === 'cs'){
    throw new Error('tenantId no resuelto al pedir numero de factura');
  }
  if(['invoice','credit'].indexOf(type) < 0){
    throw new Error('type debe ser "invoice" o "credit", recibido: ' + type);
  }
  var db = (window.Checksmart && window.Checksmart.db) || firebase.firestore();
  var counterRef = db.collection('tenants').doc(tid).collection('config').doc('counters');
  var key = type + '_' + year;
  return await db.runTransaction(async function(tx){
    var snap = await tx.get(counterRef);
    var data = snap.exists ? (snap.data() || {}) : {};
    var next = (typeof data[key] === 'number' ? data[key] : 0) + 1;
    var update = {};
    update[key] = next;
    update._updatedAt = firebase.firestore.FieldValue.serverTimestamp();
    update._lastChangedBy = (window.Checksmart && window.Checksmart.currentUser && window.Checksmart.currentUser.name) || null;
    tx.set(counterRef, update, { merge: true });
    return next;
  });
}

// ===== SIGNATURE PAD (Wacom + touch + mouse) =====
function SignaturePad(props){
  var canvasRef=useRef(null);
  var drawing=useRef(false);
  var lastPt=useRef(null);
  var _hist=useState([]),history=_hist[0],setHistory=_hist[1];
  var _empty=useState(!props.value),isEmpty=_empty[0],setIsEmpty=_empty[1];

  useEffect(function(){
    if(!canvasRef.current)return;
    var c=canvasRef.current;
    var ratio=window.devicePixelRatio||1;
    var w=c.offsetWidth,h=c.offsetHeight||180;
    c.width=w*ratio;c.height=h*ratio;
    var ctx=c.getContext('2d');
    ctx.scale(ratio,ratio);
    ctx.fillStyle='#fafafa';ctx.fillRect(0,0,w,h);
    if(props.value){var img=new Image();img.onload=function(){ctx.drawImage(img,0,0,w,h);};img.src=props.value;}
  },[]);

  function getPos(ev,c){
    var r=c.getBoundingClientRect(),ratio=window.devicePixelRatio||1;
    var src=ev.touches?ev.touches[0]:ev;
    return {x:(src.clientX-r.left),y:(src.clientY-r.top)};
  }

  function startDraw(ev){
    ev.preventDefault();
    var c=canvasRef.current;if(!c)return;
    drawing.current=true;
    var pt=getPos(ev,c);lastPt.current=pt;
    var ctx=c.getContext('2d');
    ctx.beginPath();ctx.arc(pt.x,pt.y,ev.pressure?Math.max(1,ev.pressure*3):1.2,0,Math.PI*2);
    ctx.fillStyle='#111';ctx.fill();
    setIsEmpty(false);
  }
  function moveDraw(ev){
    ev.preventDefault();
    if(!drawing.current||!canvasRef.current)return;
    var c=canvasRef.current,ctx=c.getContext('2d');
    var pt=getPos(ev,c),lp=lastPt.current;
    var pressure=ev.pressure!==undefined?ev.pressure:0.5;
    ctx.beginPath();ctx.moveTo(lp.x,lp.y);ctx.lineTo(pt.x,pt.y);
    ctx.strokeStyle='#111';ctx.lineWidth=Math.max(0.8,pressure*4);
    ctx.lineCap='round';ctx.lineJoin='round';ctx.stroke();
    lastPt.current=pt;
  }
  function endDraw(ev){
    if(!drawing.current)return;
    drawing.current=false;
    if(canvasRef.current){
      var snap=canvasRef.current.toDataURL('image/png');
      setHistory(function(h){return h.concat([snap]);});
      if(props.onChange)props.onChange(snap);
    }
  }

  function clearSig(){
    var c=canvasRef.current;if(!c)return;
    var ctx=c.getContext('2d');
    ctx.fillStyle='#fafafa';ctx.fillRect(0,0,c.width,c.height);
    setIsEmpty(true);setHistory([]);
    if(props.onChange)props.onChange(null);
  }
  function undoSig(){
    if(history.length<2)return clearSig();
    var prev=history[history.length-2];
    var c=canvasRef.current;if(!c)return;
    var img=new Image();
    img.onload=function(){var ctx=c.getContext('2d');ctx.fillStyle='#fafafa';ctx.fillRect(0,0,c.width,c.height);ctx.drawImage(img,0,0,c.offsetWidth,c.offsetHeight);};
    img.src=prev;
    setHistory(function(h){return h.slice(0,-1);});
    if(props.onChange)props.onChange(prev);
  }

  return e('div',null,
    e('div',{className:'sig-canvas-wrap'+(isEmpty?'':' has-sig')},
      e('canvas',{ref:canvasRef,style:{height:180},
        onPointerDown:startDraw,onPointerMove:moveDraw,onPointerUp:endDraw,onPointerLeave:endDraw,
        onTouchStart:startDraw,onTouchMove:moveDraw,onTouchEnd:endDraw,
        onMouseDown:startDraw,onMouseMove:moveDraw,onMouseUp:endDraw,onMouseLeave:endDraw
      })
    ),
    e('div',{className:'sig-toolbar'},
      e('button',{className:'btn btn-sm btn-outline',onClick:undoSig,disabled:history.length===0},'↩ Deshacer'),
      e('button',{className:'btn btn-sm btn-outline',style:{color:'var(--danger)'},onClick:clearSig},'🗑 Borrar'),
      isEmpty?null:e('button',{className:'btn btn-sm btn-primary',onClick:function(){
        if(canvasRef.current&&props.onSave)props.onSave(canvasRef.current.toDataURL('image/png'));
      }},'💾 Guardar firma'),
      e('span',{className:'sig-hint'},'Compatible con Wacom · ratón · pantalla táctil')
    )
  );
}

// Donut Chart (SVG)
function DonutChart(props){
  var data=props.data,colors=props.colors||PIE_COLORS,size=props.size||180,r=70,cx=size/2,cy=size/2,sw=22;
  var total=data.reduce(function(s,d){return s+d.value},0);
  var circ=2*Math.PI*r, offset=0;
  var segments=data.map(function(d,i){
    var pct=d.value/total;
    var dash=pct*circ;
    var seg=e('circle',{key:i,cx:cx,cy:cy,r:r,fill:'none',stroke:colors[i%colors.length],strokeWidth:sw,
      strokeDasharray:dash+' '+(circ-dash),strokeDashoffset:-offset,transform:'rotate(-90 '+cx+' '+cy+')'});
    offset+=dash;
    return seg;
  });
  return e('div',{style:{textAlign:'center'}},
    e('div',{className:'donut-chart',style:{width:size,height:size}},
      e('svg',{width:size,height:size},segments),
      props.centerLabel?e('div',{className:'donut-center'},
        e('div',{className:'donut-center-value'},props.centerValue),
        e('div',{className:'donut-center-label'},props.centerLabel)
      ):null
    ),
    e('div',{className:'legend'},data.map(function(d,i){
      return e('div',{className:'legend-item',key:i},
        e('div',{className:'legend-dot',style:{background:colors[i%colors.length]}}),
        d.name+': '+d.value
      );
    }))
  );
}

  var today=new Date().toISOString().split('T')[0];
  var arrivalsToday=guests.filter(function(g){return g.dateIn===today}).length;
  var revenueToday=Math.round(occupied*16.5);
  var occupancyRate=Math.round((occupied/pitches.length)*100);

  var natCounts={};
  guests.filter(function(g){return g.status==='checkedIn'}).forEach(function(g){natCounts[g.nationality]=(natCounts[g.nationality]||0)+1});
  var pieData=Object.keys(natCounts).map(function(k){return{name:k,value:natCounts[k]}}).sort(function(a,b){return b.value-a.value}).slice(0,6);

  var barData=weeklyData.map(function(d){return{label:d.day,value:d.revenue}});
  // Actividad reciente (29/04/2026): antes era `guests.slice(-5).reverse()` —
  // mostraba las últimas 5 del array (incluyendo basura antigua si los IDs
  // grandes eran de tests). Ahora:
  //   1. Filtra por fecha real: _updatedAt o dateIn en ventana de 14 días.
  //   2. Excluye _deleted y status==='cancelled'.
  //   3. Respeta marca "Limpiar" del usuario (timestamp en localStorage).
  //   4. Ordena por fecha descendente y coge top 5.
  var _recentClearKey = _csKey('recent_activity_clear_at');
  var _recentClearAt = 0;
  try { _recentClearAt = parseInt(localStorage.getItem(_recentClearKey),10) || 0; } catch(e){}
  var _recentNow = Date.now();
  var _recentWindow = 14 * 86400000;
  function _recentTs(g){
    if (g._updatedAt){
      var t = (typeof g._updatedAt==='string') ? Date.parse(g._updatedAt) : (g._updatedAt && g._updatedAt.toDate ? g._updatedAt.toDate().getTime() : null);
      if (t) return t;
    }
    if (g.dateIn){ var d = Date.parse(g.dateIn); if (!isNaN(d)) return d; }
    return 0;
  }
  var recent = (guests || [])
    .filter(function(g){
      if (!g || g._deleted || g.status==='cancelled') return false;
      var ts = _recentTs(g);
      if (ts <= _recentClearAt) return false;
      if (_recentNow - ts > _recentWindow) return false;
      return true;
    })
    .sort(function(a,b){ return _recentTs(b) - _recentTs(a); })
    .slice(0,5);
  // Releer marca de limpieza cuando clearTick cambia (truco para invalidar el filtro)
  void clearTick;
  function _clearRecent(){

    try { localStorage.setItem(_recentClearKey, String(Date.now())); } catch(e){}
    setClearTick(function(x){return x+1;});  // fuerza re-render del Dashboard
    showToast('Actividad reciente limpiada','success');
  }

  return e('div',null,
    e('div',{className:'stat-grid'},
      e('div',{className:'stat-card'},e('div',{className:'stat-label'},t.totalPitches),e('div',{className:'stat-value'},pitches.length)),

      e('div',{className:'stat-card'},e('div',{className:'stat-label'},t.available),e('div',{className:'stat-value',style:{color:'var(--primary)'}},free)),
      e('div',{className:'stat-card'},e('div',{className:'stat-label'},t.reserved),e('div',{className:'stat-value',style:{color:'var(--accent)'}},reserved)),
      e('div',{className:'stat-card'},e('div',{className:'stat-label'},t.arrivals),e('div',{className:'stat-value'},arrivalsToday))
    ),
    e('div',{className:'card',style:{marginBottom:16}},
      e('div',{className:'card-header'},e('h3',null,t.guestsByNationality)),
      e('div',{className:'card-body'},e(DonutChart,{data:pieData,centerValue:occupancyRate+'%',centerLabel:t.occupancy}))
    ),
    e('div',{className:'card'},
      e('div',{className:'card-header',style:{display:'flex',justifyContent:'space-between',alignItems:'center'}},
        e('h3',null,t.recentActivity),
        // Botón Limpiar: solo admin. Oculta entradas anteriores hasta que haya nueva actividad.
        _csCanDelete(props && props.currentUser ? props.currentUser : (window.Checksmart && window.Checksmart.currentUser))
          ? e('button',{className:'btn btn-sm btn-outline',style:{fontSize:'.72rem',padding:'4px 10px'},

// ==================== SCANNER HELPERS ====================
var AMB_SQ_KEY=_csKey('sq');
function _parseMRZ(lines){
  var l1=lines[0]||'',l2=lines[1]||'';
  if(l2.length<44) return null;
  var docNum=l2.substring(0,9).replace(/</g,'');
  var dob=l2.substring(13,19);
  var nat=l2.substring(10,13).replace(/</g,'');
  var namePart=l1.substring(5).replace(/</g,' ').trim();
  var nameSplit=namePart.split('  ');
  var surname=(nameSplit[0]||'').trim();
  var firstname=(nameSplit[1]||'').trim();
  var yy=parseInt(dob.substring(0,2),10);
  var year=(yy>25?1900:2000)+yy;
  var birthDate=year+'-'+dob.substring(2,4)+'-'+dob.substring(4,6);
  var docType=l2.charAt(0)==='P'?'Pasaporte':'DNI';
  return{name:firstname,surname:surname,idDoc:docNum,nationality:nat,birthDate:birthDate,docType:docType};
}
function _getAgeFromBirth(bd){
  if(!bd) return null;
  var d=new Date(bd),now=new Date();
  var age=now.getFullYear()-d.getFullYear();
  if(now.getMonth()<d.getMonth()||(now.getMonth()===d.getMonth()&&now.getDate()<d.getDate())) age--;
  return age;
}
function _loadScanQueue(){try{var q=JSON.parse(localStorage.getItem(AMB_SQ_KEY));if(q)return q;}catch(e2){}return [];}
function _saveScanQueue(q){localStorage.setItem(AMB_SQ_KEY,JSON.stringify(q));}

        try{var raw=localStorage.getItem('cs:inbox');setAll(raw?JSON.parse(raw):[]);}catch(e){}
      }

    window.addEventListener('cs:data-updated',onUpd);
    return function(){window.removeEventListener('cs:data-updated',onUpd);};

// Utilidad global: ¿cuántos correos previos hay de este remitente?

  // ---- CREATE INVOICE ----
  // ASYNC desde 06/05/2026: el numero correlativo se reserva con transaction
  // Firestore (counter atomico) en vez del antiguo "filter().length+1".
  async function handleCreateInvoice(){
    if(guestInvoice){showToast('Ya existe una factura para este huésped','error');return;}
    var year = new Date().getFullYear();
    var nextNum;
    try{
      nextNum = await _csNextDocNumber(year, 'invoice');
    }catch(e){
      console.error('[invoice] error reservando numero:', e);
      showToast('Error reservando numero de factura: '+(e.message||e)+' — reintenta','error');
      return;
    }
    // IVA ya incluido en priceTotal y tabTotal (con IVA) → base = total/1.1
    var baseT=Math.round(((g.priceTotal+tabTotal)/1.1)*100)/100;
    var ivaT=Math.round((grandTotal-baseT)*100)/100;
    var invId='F-'+year+'-'+String(nextNum).padStart(4,'0');
    var invDate=new Date().toISOString().split('T')[0];
    // Hash chain: ordenar por fecha+id para que prevInv sea determinista
    // (no depender del orden del array que cambia con cada onSnapshot).
    var sortedInvs = invoices.slice().sort(function(a,b){
      var da=(a.fechaHoraExpedicion||a.date||'')+a.id;
      var dbb=(b.fechaHoraExpedicion||b.date||'')+b.id;
      return da<dbb?-1:(da>dbb?1:0);
    });
    var prevInv = sortedInvs.length>0 ? sortedInvs[sortedInvs.length-1] : null;
    var prevHash=prevInv?(prevInv.hash||'00000000000000000000000000000000'):'00000000000000000000000000000000';
    var hashStr='B12345678|'+invId+'|'+invDate+'|'+grandTotal+'|'+prevHash;
    var invHash=simHash(hashStr);
    var vfEnabled=!!(_loadVerifactu().enabled);
    var inv={id:invId,guestId:g.id,
      name:g.name+' '+g.surname,idDoc:g.idDoc,email:g.email||'',
      pitchCode:g.pitchCode,dateIn:g.dateIn,dateOut:g.dateOut,nights:nights,
      vehicleType:g.vehicleType,baseAmount:baseT, baseAlojamiento:g.priceTotal, tabItems:g.tabItems||[],
      iva:ivaT,total:grandTotal,
      status:'issued',type:'invoice',date:invDate,hash:invHash,
      creditNote:null,payMethod:payMethod,
      cardAmount:payMethod==='mixed'?parseFloat(cardAmount)||0:null,
      cashAmount:payMethod==='mixed'?parseFloat(cashAmount)||0:null,
      // Campos reglamentarios Verifactu (solo si activo)
      verifactu:vfEnabled||undefined,
      tipoFactura:vfEnabled?'F1':undefined,
      fechaHoraExpedicion:vfEnabled?new Date().toISOString():undefined,
      huellaSHA256:vfEnabled?invHash:undefined,
      sistemaInformatico:vfEnabled?'CheckingSmart':undefined,
      versionSI:vfEnabled?'1.0':undefined};
    setInvoices(function(prev){return prev.concat([inv])});
    setGuests(function(prev){return prev.map(function(x){if(x.id!==g.id)return x;var _upd=Object.assign({},x,{paid:true});_upd.status=_csAutoStatus(_upd);return _upd;})});
    logActionDM('invoice',inv.id+' — '+g.name+' '+g.surname+' — €'+inv.total+' ('+inv.payMethod+')');
    showToast('Factura '+inv.id+' emitida','success');
    setTimeout(function(){printInvoice(inv);},300);
  }

  // ── Transferir reserva completa (o campos selectivos) a otro huésped ──
  // Caso de uso: la recepcionista vinculó la reserva al huésped equivocado.
  // Pulsa Transferir, elige qué datos mover y al huésped correcto.
  // El origen mantiene su ficha (aunque quede sin esa reserva).
  function handleTransferGuest(){
    if(!trTarget) return;
    var now=new Date().toISOString();
    var srcName=(g.name||'')+' '+(g.surname||'');
    var dstName=(trTarget.name||'')+' '+(trTarget.surname||'');
    var srcRef=g.bookCode||('R-'+g.id);

    // Campos del origen que se copian al destino (y se vacían en origen), según checklist
    var toMove={}, toClear={};
    if(trFields.personales){
      ['name','surname','idDoc','nationality'].forEach(function(k){ toMove[k]=g[k]; toClear[k]=''; });
    }
    if(trFields.contacto){
      ['email','phone'].forEach(function(k){ toMove[k]=g[k]; toClear[k]=''; });
    }
    if(trFields.vehiculo){
      ['vehicleType','plate','vehicles'].forEach(function(k){ if(g[k]!==undefined){toMove[k]=g[k]; toClear[k]=(k==='vehicles'?[]:'');} });
    }
    if(trFields.fechas){
      ['dateIn','dateOut','nights'].forEach(function(k){ toMove[k]=g[k]; });
      // No vaciamos fechas en origen si hay otras cosas (la reserva dejaría de existir lógicamente).
      // Si se mueve TODO el grupo reserva, marcamos el origen como cancelled para que no cuente en ocupación.
    }
    if(trFields.parcela){
      ['pitchCode','pitchId','tipoPlaza','electricidad'].forEach(function(k){ if(g[k]!==undefined){toMove[k]=g[k]; toClear[k]=(k==='pitchId'?null:'');} });
    }
    if(trFields.ocupacion){
      ['adults','children','pets'].forEach(function(k){ toMove[k]=g[k]; toClear[k]=(k==='adults'?1:0); });
    }
    if(trFields.economico){
      ['priceTotal','paid','senal','pendiente','pagaSenal','paidMethod','c5'].forEach(function(k){ if(g[k]!==undefined){toMove[k]=g[k]; toClear[k]=(typeof g[k]==='boolean'?false:0);} });
    }
    if(trFields.documentos){
      toMove.scannedDocs = g.scannedDocs || [];
      toClear.scannedDocs = [];
    }
    if(trFields.firma){
      toMove.signature = g.signature || null;
      toClear.signature = null;
    }
    if(trFields.notas){
      toMove.notes = g.notes || '';
      toClear.notes = '';
    }
    if(trFields.consumos){
      toMove.tabItems = g.tabItems || [];
      toClear.tabItems = [];
    }

    // Si se mueve fechas/parcela/ocupación/económico a la vez → el origen queda sin reserva efectiva
    var fullTransfer = trFields.fechas && trFields.parcela && trFields.economico;

    // 1. Aplicar cambios en guests
    setGuests(function(prev){return prev.map(function(x){
      if(x.id===g.id){
        var updated = Object.assign({}, x, toClear, {
          _transferredTo: { guestId: trTarget.id, name: dstName, at: now },
          _updatedAt: new Date()
        });
        if (fullTransfer){ updated.status='cancelled'; updated._transferReason='error-asignacion'; }
        return updated;
      }
      if(x.id===trTarget.id){
        return Object.assign({}, x, toMove, {
          _transferredFrom: { guestId: g.id, name: srcName, bookCode: srcRef, at: now },
          _updatedAt: new Date()
        });
      }
      return x;
    });});

    // 2. Si se transfiere factura y existe → re-adjudicar guestId/customerName al destino
    //    MANTIENE el ID correlativo (no rompe numeración Hacienda)
    if(trFields.factura && guestInvoice){
      setInvoices(function(prev){return prev.map(function(i){
        if(i.id===guestInvoice.id){
          return Object.assign({},i,{
            guestId: trTarget.id,
            guestName: dstName,
            name: trTarget.name||'',
            surname: trTarget.surname||'',
            idDoc: trTarget.idDoc||'',
            nationality: trTarget.nationality||'',
            _transferredFrom: { guestId: g.id, name: srcName, at: now },
            _transferNote: 'Re-adjudicada por error de asignación — ID correlativo mantenido'
          });
        }
        return i;
      });});
    }

    // 3. Log operación
    var fieldsLog = Object.keys(trFields).filter(function(k){return trFields[k];}).join(',');
    logActionDM('transfer-guest','\u21c6 Reserva '+srcRef+' transferida: '+srcName+' \u2192 '+dstName+' · campos: ['+fieldsLog+']'+(guestInvoice&&trFields.factura?' · factura '+guestInvoice.id+' re-adjudicada':''));

    setShowTransferModal(false); setTrSearch(''); setTrTarget(null); _trReset();
    showToast('Transferido a '+dstName,'success');
  }

function DailyBriefing(props){
  var guests=props.guests,currentUser=props.currentUser,setFilter=props.setFilter,pitches=props.pitches||[],showToast=props.showToast||function(){};
  var now=new Date();
  var today=now.toISOString().split('T')[0];
  var h=now.getHours();
  var greeting=h<12?'Buenos días':h<20?'Buenas tardes':'Buenas noches';
  var turno=h<14?'☀️ Turno Mañana':'🌆 Turno Tarde';
  var dateStr=now.toLocaleDateString('es-ES',{weekday:'long',day:'numeric',month:'long',year:'numeric'});
  dateStr=dateStr.charAt(0).toUpperCase()+dateStr.slice(1);

  var tom=new Date(now);tom.setDate(tom.getDate()+1);
  var tomorrow=tom.toISOString().split('T')[0];

  var todayArrivals=guests.filter(function(g){return g.dateIn===today&&g.status!=='cancelled';});
  var arrDone=todayArrivals.filter(function(g){return g.status==='checkedIn'||g.status==='checkedOut';}).length;
  var arrWaiting=todayArrivals.filter(function(g){return g.status==='confirmed'||g.status==='pending';}).length;
  var arrPaid=todayArrivals.filter(function(g){return g.paid;}).length;
  var arrUnpaid=todayArrivals.length-arrPaid;

  var todayDep=guests.filter(function(g){return g.dateOut===today&&g.status!=='cancelled';});
  var depDone=todayDep.filter(function(g){return g.status==='checkedOut';}).length;
  var depPending=todayDep.filter(function(g){return g.status==='checkedIn';}).length;
  var depPaid=todayDep.filter(function(g){return g.paid;}).length;
  var depUnpaid=todayDep.length-depPaid;

  var alojados=guests.filter(function(g){return g.status==='checkedIn';}).length;
  var confirmadas=guests.filter(function(g){return g.status==='confirmed';}).length;
  var tomArr=guests.filter(function(g){return g.dateIn===tomorrow&&g.status!=='cancelled';}).length;
  var tomDep=guests.filter(function(g){return g.dateOut===tomorrow&&g.status!=='cancelled';}).length;

      onClick:onClick||function(){},

        display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',

  var sectionLabel=function(icon,text){
    return e('div',{style:{
      fontSize:'.72rem',fontWeight:700,textTransform:'uppercase',letterSpacing:1.2,
      color:'rgba(255,255,255,.7)',marginBottom:8,display:'flex',alignItems:'center',gap:5

  return e('div',{style:{
    background:'linear-gradient(135deg,#01579b 0%,#0288d1 55%,#0277bd 100%)',

    boxShadow:'0 6px 24px rgba(2,136,209,.35)'

    // Header row
    e('div',{style:{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:16,flexWrap:'wrap',gap:8}},

        ),

          turno,' · ',dateStr)
      ),
      e('div',{style:{
        background:'rgba(255,255,255,.12)',borderRadius:10,padding:'8px 14px',
        fontSize:'.78rem',color:'rgba(255,255,255,.8)',textAlign:'right',lineHeight:1.6
      }},
        e('div',null,'📅 Mañana: ',
          e('strong',{style:{color:'white'}},tomArr),' entradas · ',
          e('strong',{style:{color:'white'}},tomDep),' salidas')

// ── BackupCard component ─────────────────────────────────────────────────────
function BackupCard(props){
  var showToast=props.showToast;
  var CS_BACKUP_KEYS=['global_database','pitches','users','slog','notebook','waitlist','tarifas','priv5','store_prods','store_sales','prices','prov','sq'];

  function handleExport(){
    var tid=_csConfig().tenantId||'cs';
    var payload={tenant:tid,exportedAt:new Date().toISOString(),version:'1.0',data:{}};
    CS_BACKUP_KEYS.forEach(function(k){
      var raw=localStorage.getItem(tid+'_'+k);
      if(raw){try{payload.data[k]=JSON.parse(raw);}catch(e){payload.data[k]=raw;}}
    });
    var blob=new Blob([JSON.stringify(payload,null,2)],{type:'application/json'});
    var url=URL.createObjectURL(blob);
    var a=document.createElement('a');
    a.href=url;
    a.download=tid+'_backup_'+new Date().toISOString().split('T')[0]+'.json';
    document.body.appendChild(a);a.click();document.body.removeChild(a);
    URL.revokeObjectURL(url);
    showToast('Copia de seguridad exportada correctamente','success');
  }

  function handleImport(ev){
    var file=ev.target.files&&ev.target.files[0];
    ev.target.value='';
    if(!file)return;
    var reader=new FileReader();
    reader.onload=function(e){
      try{
        var payload=JSON.parse(e.target.result);
        if(!payload||!payload.data)throw new Error('Formato de archivo no válido');
        var tid=_csConfig().tenantId||'cs';
        if(payload.tenant&&payload.tenant!==tid){
          if(!confirm('⚠️ La copia pertenece al tenant "'+payload.tenant+'" y el tenant actual es "'+tid+'". ¿Continuar igualmente?'))return;
        }
        var restored=0;
        Object.keys(payload.data).forEach(function(k){
          if(CS_BACKUP_KEYS.indexOf(k)>=0){
            localStorage.setItem(tid+'_'+k,JSON.stringify(payload.data[k]));
            restored++;
          }
        });
        showToast(restored+' conjuntos de datos restaurados — recarga la página para aplicar','success');
      }catch(err){
        showToast('Error al importar: '+err.message,'error');
      }
    };
    reader.readAsText(file);
  }

  function handleReset(){
    if(!confirm('⚠️ ATENCIÓN\n\nEsto eliminará TODOS los huéspedes, reservas y parcelas del sistema.\n\nLos usuarios y tarifas configurados se conservan.\n\n¿Estás seguro?'))return;
    if(!confirm('🔴 ÚLTIMA CONFIRMACIÓN\n\nSe borrarán permanentemente todos los datos de clientes y parcelas. Esta acción no se puede deshacer.\n\n¿Confirmas el borrado total?'))return;
    var tid=_csConfig().tenantId||'cs';
    // 1. Limpiar localStorage (valores vacíos + removeItem)
    localStorage.setItem(tid+'_global_database', JSON.stringify({bookings:[]}));
    localStorage.setItem(tid+'_pitches', JSON.stringify([]));
    localStorage.setItem(tid+'_slog', JSON.stringify([]));
    localStorage.setItem(tid+'_notebook', JSON.stringify([]));
    localStorage.setItem(tid+'_waitlist', JSON.stringify([]));
    localStorage.setItem(tid+'_store_sales', JSON.stringify([]));
    localStorage.removeItem(tid+'_caja');
    localStorage.removeItem(tid+'_voiceServices');
    localStorage.removeItem(tid+'_sq');
    // 2. Borrar documentos en Firestore (syncCollection omite arrays vacíos, necesita delete explícito)
    var fsReset = (window.Checksmart && window.Checksmart.resetTenant)
      ? window.Checksmart.resetTenant(tid)
      : Promise.resolve();
    showToast('Borrando datos en la nube…','success');
    fsReset.then(function(){
      showToast('Datos borrados — recargando…','success');
      setTimeout(function(){window.location.reload();},1200);
    }).catch(function(err){
      console.error('[Reset] Error Firestore:', err);
      showToast('Datos locales borrados — recargando…','success');
      setTimeout(function(){window.location.reload();},1200);
    });
  }

  return e('div',{className:'card',style:{marginBottom:16}},
    e('div',{className:'card-header'},e('h3',null,'💾 Copias de Seguridad')),
    e('div',{className:'card-body'},
      e('p',{style:{fontSize:'.85rem',color:'var(--text-secondary)',marginBottom:14}},
        'Los datos se sincronizan automáticamente con la nube (Firebase). Usa estas opciones para descargar una copia local o restaurar desde un archivo previo.'
      ),
      e('div',{style:{display:'flex',gap:12,flexWrap:'wrap'}},
        e('button',{className:'btn btn-primary',onClick:handleExport},

    var nextNum=1;
    while(usedNums[nextNum]) nextNum++;
    var newCode=pref+'-'+String(nextNum).padStart(2,'0');
    // Si aun hay colisión de code completo (distintos prefijos), seguir subiendo

  function _bulkApply(mapFn,msg){
    if(!selPitches.length){showToast("Selecciona al menos una plaza","error");return;}

  function bulkDelete(){
