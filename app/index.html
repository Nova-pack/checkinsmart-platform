  function prevP(){var d=new Date(startDate);d.setDate(d.getDate()-viewDays);setStartDate(d);}
  function nextP(){var d=new Date(startDate);d.setDate(d.getDate()+viewDays);setStartDate(d);}
  function goToday(){var d=new Date();d.setHours(0,0,0,0);d.setDate(d.getDate()-1);setStartDate(d);}

  var dates=[];
  for(var i=0;i<viewDays;i++){var dd=new Date(startDate);dd.setDate(dd.getDate()+i);dates.push(new Date(dd));}
  var endDate=dates[dates.length-1];

  var filteredPitches=pitches.filter(function(p){return zoneFilter==='all'||p.zone===zoneFilter;})
    .sort(function(a,b){if(a.zone!==b.zone)return a.zone<b.zone?-1:1;return a.code<b.code?-1:1;});

  var todayArr=guests.filter(function(g){return g.dateIn===todayStr&&g.status!=='cancelled';});
  var todayDep=guests.filter(function(g){return g.dateOut===todayStr&&g.status!=='cancelled';});

  var FLAGS={España:'🇪🇸',Alemania:'🇩🇪',Germany:'🇩🇪',Francia:'🇫🇷',France:'🇫🇷',UK:'🇬🇧',
    Holanda:'🇳🇱',Netherlands:'🇳🇱',Bélgica:'🇧🇪',Belgium:'🇧🇪',Italia:'🇮🇹',Italy:'🇮🇹',
    Portugal:'🇵🇹',Suiza:'🇨🇭',Switzerland:'🇨🇭',Austria:'🇦🇹',Polonia:'🇵🇱',Poland:'🇵🇱',
    Suecia:'🇸🇪',Sweden:'🇸🇪',Noruega:'🇳🇴',Norway:'🇳🇴',USA:'🇺🇸',Dinamarca:'🇩🇰'};
  var VICONS={motorhome:'🚐',camper:'🚌',autocaravana:'🚐',caravan:'🚛',caravana:'🚛',van:'🚐',furgoneta:'🚐'};
  var SCOL={checkedIn:'var(--primary)',confirmed:'#2e7d32',pending:'#f57f17',checkedOut:'#757575',cancelled:'#212121'};
  var SBGC={checkedIn:'#4fc3f7',confirmed:'#81c784',pending:'#ffb74d',checkedOut:'#b0bec5',cancelled:'#9e9e9e'};
  var SLBL={checkedIn:'Alojado',confirmed:'Confirmada',pending:'Pendiente',checkedOut:'Checkout',cancelled:'Cancelada'};

  function dtMs(s){return new Date(s).setHours(0,0,0,0);}
  function pitchConflictLocal(code,din,dout,excludeId){
    return guests.find(function(x){
      if(x.id===excludeId||x.status==='checkedOut'||x.status==='cancelled') return false;
      var segs = x.segments || [{pitchCode:x.pitchCode, dateIn:x.dateIn, dateOut:x.dateOut}];
      return segs.some(function(s){ return s.pitchCode===code && s.dateIn<dout && s.dateOut>din; });
    })||null;
  }

  function getBand(obj){
    var gIn=dtMs(obj.dateIn),gOut=dtMs(obj.dateOut);
    var rStart=startDate.getTime(),rEnd=endDate.getTime()+86400000;
    if(gOut<=rStart||gIn>=rEnd)return null;
    var visStart=Math.max(gIn,rStart),visEnd=Math.min(gOut,rEnd);
    var off=(visStart-rStart)/86400000,span=(visEnd-visStart)/86400000;
    return{left:off*CELL_W+2,width:span*CELL_W-4};
  }

  // Group pitches: zone headers + pitch rows
  var rows=[],curZ=null;
  filteredPitches.forEach(function(p){
    if(p.zone!==curZ){rows.push({t:'z',z:p.zone});curZ=p.zone;}
    rows.push({t:'p',p:p});
  });

  var totalW=viewDays*CELL_W;

  // Occupancy today
  var occToday=guests.filter(function(g){return g.status==='checkedIn';}).length;
  var occPct=pitches.length>0?Math.round(occToday/pitches.length*100):0;

  return e('div',{style:{fontFamily:'inherit',paddingBottom:20}},

    // === TOP BAR ===

      e('span',{style:{background:'var(--primary)',color:'#fff',borderRadius:20,padding:'2px 10px',fontSize:'.72rem',fontWeight:700}},
        occToday+' alojados ('+occPct+'%)'),

      // Zone filter
      e('div',{style:{display:'flex',gap:3,marginLeft:8}},
        ['all','A','B','C','D','E','TRÁNSITO','PARKING'].map(function(z){
          var active=zoneFilter===z;

            style:{padding:'4px 9px',border:'1.5px solid '+(active?'var(--primary)':'var(--border)'),
              borderRadius:16,fontSize:'.7rem',fontWeight:700,cursor:'pointer',
              background:active?'var(--primary)':'white',color:active?'white':'var(--text-secondary)'}},
            z==='all'?'Todas':(z==='TRÁNSITO'||z==='PARKING')?z:'Z-'+z);
        })

      // Availability Filter
      e('div',{style:{marginLeft:8}},
        e('select',{className:'form-input',style:{padding:'4px 8px',fontSize:'.75rem',height:'28px',background:'white'},
          value:availFilter,onChange:function(ev){setAvailFilter(ev.target.value)}},
          e('option',{value:'all'},'Estado: Todas'),
          e('option',{value:'free'},'Estado: Sólo Libres'),
          e('option',{value:'occ'},'Estado: Sólo Ocupadas')
        )
      ),

      // Day views
      e('div',{style:{display:'flex',border:'1px solid var(--border)',borderRadius:6,overflow:'hidden',marginLeft:4}},
        [14,30,90,180,365].map(function(d){
          var active=viewDays===d;
          return e('button',{key:d,onClick:function(){setViewDays(d);},
            style:{padding:'4px 11px',border:'none',cursor:'pointer',fontSize:'.73rem',fontWeight:700,
              background:active?'var(--primary)':'white',color:active?'white':'var(--text-secondary)'}},d===365?'1A':(d===180?'6M':d+'d'));
        })
      ),

      // Nav
      e('div',{style:{display:'flex',gap:4,marginLeft:4}},
        e('button',{onClick:prevP,style:{padding:'4px 10px',border:'1px solid var(--border)',borderRadius:6,cursor:'pointer',fontSize:'.85rem',background:'white'}},'◀'),
        e('button',{onClick:goToday,style:{padding:'4px 12px',border:'1px solid var(--primary)',borderRadius:6,cursor:'pointer',fontSize:'.72rem',fontWeight:700,background:'var(--primary)',color:'white'}},'Hoy'),
        e('button',{onClick:nextP,style:{padding:'4px 10px',border:'1px solid var(--border)',borderRadius:6,cursor:'pointer',fontSize:'.85rem',background:'white'}},'▶')
      ),

      e('div',{style:{display:'flex',alignItems:'center',gap:6,marginLeft:'auto'}},
        e('button',{onClick:toggleGuide,title:'Guía de líneas cruzadas',
          style:{padding:'4px 10px',border:'1.5px solid '+(guideOn?'var(--primary)':'var(--border)'),borderRadius:6,cursor:'pointer',fontSize:'.75rem',fontWeight:700,
            background:guideOn?'var(--primary)':'white',color:guideOn?'white':'var(--text-secondary)'}},
          '\u271F Guía'),
        e('span',{style:{fontSize:'.76rem',color:'var(--text-secondary)',fontWeight:600}},'Saltar a:'),
        e('input',{type:'date',className:'form-input',
          style:{padding:'2px 8px',fontSize:'.75rem',height:'28px'},
          value:startDate.toISOString().split('T')[0],
          onChange:function(ev){if(ev.target.value){setStartDate(new Date(ev.target.value));}}
        })
      )
    ),

    // === ARRIVALS / DEPARTURES STRIP ===
    (todayArr.length+todayDep.length>0)?e('div',{style:{
        background:'linear-gradient(90deg,#e8f5e9 0%,#e3f2fd 100%)',
        border:'1px solid var(--border)',borderRadius:8,padding:'8px 16px',
        marginBottom:10,display:'flex',gap:20,flexWrap:'wrap',fontSize:'.8rem',alignItems:'center'}},
      e('strong',{style:{color:'var(--primary)',fontSize:'.82rem'}},'📆 Hoy '+todayStr),
      e('span',null,'✈️ ',e('strong',null,todayArr.length+' llegada'+(todayArr.length!==1?'s':'')),
        '  '+todayArr.slice(0,3).map(function(g){return (g.name||'')+ ' '+(g.surname||'').charAt(0)+'. ('+(g.pitchCode||'')+')';}).join(' · ')+(todayArr.length>3?' +más':'')),
      e('span',null,'🚪 ',e('strong',null,todayDep.length+' salida'+(todayDep.length!==1?'s':'')),
        '  '+todayDep.slice(0,3).map(function(g){return (g.name||'')+' '+(g.surname||'').charAt(0)+'. ('+(g.pitchCode||'')+')';}).join(' · ')+(todayDep.length>3?' +más':''))
    ):null,

    // === LEGEND ===
    e('div',{style:{display:'flex',gap:10,marginBottom:10,flexWrap:'wrap',alignItems:'center'}},
      e('span',{style:{fontSize:'.7rem',color:'var(--text-tertiary)',fontWeight:600}},'LEYENDA:'),
      Object.keys(SCOL).map(function(st){
        return e('div',{key:st,style:{display:'flex',alignItems:'center',gap:4,fontSize:'.7rem'}},
          e('div',{style:{width:22,height:11,borderRadius:3,background:SBGC[st],border:'2px solid '+SCOL[st]}}),
          e('span',{style:{color:'var(--text-secondary)'}},(SLBL[st]||st)));
      }),
      e('span',{style:{fontSize:'.7rem',color:'var(--text-tertiary)',marginLeft:8}},'💡 Clic en banda = abrir ficha · Clic en celda vacía = nueva reserva')
    ),

    // === MAIN GANTT GRID ===
    e('div',{style:{overflowX:'auto',overflowY:'auto',maxHeight:'calc(100vh - 180px)',border:'1px solid var(--border)',borderRadius:8,boxShadow:'var(--shadow-sm)',position:'relative'},
      onWheel:function(ev){
        if(!ev.ctrlKey&&!ev.metaKey)return;
        ev.preventDefault();
        setViewDays(function(prev){
          var step=Math.max(3,Math.round(prev*0.12));
          var next=ev.deltaY>0?prev+step:prev-step;
          return Math.min(120,Math.max(7,next));
        });
      },
      onMouseMove:guideOn?function(ev){setMousePos({x:ev.clientX,y:ev.clientY});}:null,
      onMouseLeave:guideOn?function(){setMousePos({x:-1,y:-1});}:null},
      guideOn&&mousePos.x>=0?[
        e('div',{key:'gh',style:{position:'fixed',left:0,right:0,top:mousePos.y,height:'1px',background:'rgba(2,136,209,.6)',pointerEvents:'none',zIndex:9999}}),
        e('div',{key:'gv',style:{position:'fixed',top:0,bottom:0,left:mousePos.x,width:'1px',background:'rgba(2,136,209,.6)',pointerEvents:'none',zIndex:9999}})
      ]:null,
      e('div',{style:{minWidth:LABEL_W+totalW+'px'}},

        // DATE HEADER ROW
        e('div',{style:{display:'flex',position:'sticky',top:0,zIndex:20,background:'#fff',borderBottom:'2px solid #ddd'}},
          e('div',{style:{width:LABEL_W,flexShrink:0,padding:'6px 10px',fontSize:'.68rem',fontWeight:700,
            color:'var(--text-secondary)',background:'#f5f5f3',borderRight:'2px solid #ddd',
            display:'flex',alignItems:'center'}},'Parcela'),
          e('div',{style:{display:'flex',flex:1}},
            dates.map(function(d,idx){
              var isToday=d.getTime()===todayMs;
              var isSun=d.getDay()===0,isSat=d.getDay()===6;

                  padding:'3px 0',boxSizing:'border-box',

                  borderLeft:'1px solid #eee',
                  borderBottom:isToday?'3px solid #f9a825':'1px solid transparent'}},
                e('div',{style:{fontSize:'.58rem',color:isToday?'#e65100':'#aaa',fontWeight:isToday?700:400}},
                  DAY_NAMES[d.getDay()]),
                e('div',{style:{fontSize:'.78rem',fontWeight:isToday?800:600,
                    color:isToday?'#e65100':'var(--text)'}},d.getDate()),
                (idx===0||d.getDate()===1)?e('div',{style:{fontSize:'.55rem',color:'#bbb'}},
                  MON_NAMES[d.getMonth()]):null
              );
            })
          )
        ),

        // PITCH ROWS
        rows.map(function(row,ri){
          // ZONE SEPARATOR
          if(row.t==='z'){
            return e('div',{key:'z'+row.z+ri,style:{
                display:'flex',alignItems:'center',
                background:'linear-gradient(90deg,var(--primary) 0%,var(--primary-hover) 60%,var(--primary) 100%)',
                color:'#fff',padding:'5px 0',borderTop:'1px solid var(--primary-hover)'}},
              e('div',{style:{width:LABEL_W,flexShrink:0,padding:'0 10px',fontWeight:800,
                fontSize:'.75rem',letterSpacing:'.8px',display:'flex',alignItems:'center',gap:6}},
                '📍 ZONA '+row.z,
                e('span',{style:{fontWeight:400,fontSize:'.65rem',opacity:.8}},
                  '('+pitches.filter(function(p){return p.zone===row.z;}).length+' parcelas)')),
              e('div',{style:{flex:1,height:2}})
            );

          // PITCH ROW (MULTI-SEGMENT SUPPORT)

                var startMs=dtMs(seg.dateIn), endMs=dtMs(seg.dateOut);
                var rS=startDate.getTime(),rE=endDate.getTime()+86400000;
                if(endMs>rS && startMs<rE) {
                  pitchSegments.push({ g:g, seg:seg, sIdx:sIdx, totalSegs:segs.length });
                }
              }
            });
          });
          var isOcc=pitchSegments.some(function(ps){return ps.g.status==='checkedIn'&&dtMs(ps.seg.dateIn)<=todayMs&&dtMs(ps.seg.dateOut)>todayMs;});
          
          if(availFilter==='free' && pitchSegments.length>0) return null;
          if(availFilter==='occ' && pitchSegments.length===0) return null;

          var rowBg=ri%2===0?'#fafafa':'#fff';

          return e('div',{key:p.id,
              onDragOver:function(ev){ev.preventDefault();ev.dataTransfer.dropEffect='move';},
              onDrop:function(ev){
                ev.preventDefault();
                if(!dragSeg)return;
                var tg=dragSeg.g, ts=dragSeg.seg, sIdx=dragSeg.sIdx;
                if(ts.pitchCode===p.code){setDragSeg(null);return;}
                var conflict=pitchConflictLocal(p.code, ts.dateIn, ts.dateOut, tg.id);
                if(conflict){showToast('\u26a0\ufe0f Solapamiento: '+p.code+' ya está ocupada en esas fechas','error');setDragSeg(null);return;}
                var cloneSegs=(tg.segments||[{pitchCode:tg.pitchCode,dateIn:tg.dateIn,dateOut:tg.dateOut}]).slice();
                cloneSegs[sIdx]=Object.assign({},cloneSegs[sIdx],{pitchCode:p.code});
                props.setGuests(function(prev){return prev.map(function(x){
                  if(x.id===tg.id){
                    var ng=Object.assign({},x,{segments:cloneSegs});
                    if(sIdx===0) ng.pitchCode=p.code;
                    return ng;
                  }
                  return x;
                })});
                showToast('Mudanza rápida: '+ts.pitchCode+' \u2192 '+p.code,'success');
                setDragSeg(null);
              },
              style:{display:'flex',borderBottom:'1px solid #f0f0f0',
              height:ROW_H,background:rowBg,position:'relative'}},

            // PITCH LABEL (sticky left)
            e('div',{style:{width:LABEL_W,flexShrink:0,borderRight:'2px solid #e8e8e8',
                display:'flex',flexDirection:'column',justifyContent:'center',padding:'0 8px',
                background:'#f8f7f4',position:'sticky',left:0,zIndex:5}},
              e('div',{style:{display:'flex',alignItems:'center',gap:4}},
                e('span',{style:{fontWeight:800,fontSize:'.8rem',

                elecIcon(p.electricity)?e('span',{style:{fontSize:'.62rem',color:'#f57f17'}},elecIcon(p.electricity)):null,
                p.water?e('span',{style:{fontSize:'.62rem',color:'#0277bd'}},'💧'):null
              ),
              e('div',{style:{fontSize:'.55rem',color:'var(--text-tertiary)',lineHeight:1.2}},
                p.tipoPlaza?(TIPOS_PLAZA_AMB.find(function(x){return x.value===p.tipoPlaza;})||{label:p.tipoPlaza}).label:(p.size||'Estándar'))
            ),

            // DAY CELLS + BANDS
            e('div',{style:{display:'flex',flex:1,position:'relative',overflow:'hidden'}},

              // Background day columns
              dates.map(function(d,di){

                return e('div',{key:di,
                  style:{width:CELL_W,height:ROW_H,flexShrink:0,boxSizing:'border-box',

                    borderLeft:'1px solid '+(isToday?'rgba(249,168,37,.4)':'#f0f0f0'),
                    cursor:'pointer'},
                  onClick:function(){
                    var busy=pitchSegments.some(function(ps){
                      return dtMs(ps.seg.dateIn)<=d.getTime()&&dtMs(ps.seg.dateOut)>d.getTime();
                    });
                    if(!busy)setNewResData({code:p.code,dateIn:d.toISOString().slice(0,10)});
                  }
                });
              }),

              // RESERVATION BANDS (SEGMENTS)
              pitchSegments.map(function(ps){

                    borderLeftWidth: hasPrev ? '0' : '1.5px',
                    borderRightWidth: hasNext ? '0' : '1.5px',

                    cursor:'grab',overflow:'hidden',display:'flex',alignItems:'center',
                    padding:'0 5px',gap:3,boxSizing:'border-box',zIndex:isDragging?50:3,
                    boxShadow:'0 3px 6px rgba(0,0,0,.15)',transition:'transform .1s',
                    opacity: (g.status==='cancelled'||isDragging)?0.4:1
                  },

                  onMouseLeave:function(ev){ev.currentTarget.style.transform='none';ev.currentTarget.style.zIndex='3';ev.currentTarget.style.boxShadow='0 3px 6px rgba(0,0,0,.15)';}},

// Lista los correos clasificados por Claude Haiku. Fuente:

function _inboxLoad(){
  try{
    var tid=_csConfig().tenantId||'';
    var raw=localStorage.getItem(tid+'_inbox');
    var arr=raw?JSON.parse(raw):[];
    return Array.isArray(arr)?arr:[];
  }catch(e){return [];}
}
function _inboxCountNew(){
  var arr=_inboxLoad();
  return arr.filter(function(m){return (m.status||'new')==='new';}).length;
}

function InboxPage(props){
  var showToast=props.showToast||function(){};
  var _ib=useState(_inboxLoad),items=_ib[0],setItems=_ib[1];
  var _sel=useState(null),selected=_sel[0],setSelected=_sel[1];
  var _cat=useState('all'),catFilter=_cat[0],setCatFilter=_cat[1];
  var _pri=useState('all'),priFilter=_pri[0],setPriFilter=_pri[1];
  var _q=useState(''),query=_q[0],setQuery=_q[1];
  var _onlyNew=useState(false),onlyNew=_onlyNew[0],setOnlyNew=_onlyNew[1];
  var _refr=useState(false),refreshing=_refr[0],setRefreshing=_refr[1];
  var _draft=useState(''),draft=_draft[0],setDraft=_draft[1];
  var _gen=useState(false),generating=_gen[0],setGenerating=_gen[1];
  var _sending=useState(false),sendingReply=_sending[0],setSendingReply=_sending[1];
  var _showArch=useState(false),showArchived=_showArch[0],setShowArchived=_showArch[1];
  var _clean=useState(false),cleaning=_clean[0],setCleaning=_clean[1];
  var _sel2=useState({}),selectedIds=_sel2[0],setSelectedIds=_sel2[1];
  // Fase 4: traducción del correo entrante al castellano
  var _tr=useState(null),translation=_tr[0],setTranslation=_tr[1]; // {subject,bodyText,sourceLang} o null
  var _trLoad=useState(false),translating=_trLoad[0],setTranslating=_trLoad[1];
  var _showTr=useState(false),showTranslation=_showTr[0],setShowTranslation=_showTr[1];
  // Fase 4: vista previa castellana del borrador
  var _draftEs=useState(''),draftPreviewEs=_draftEs[0],setDraftPreviewEs=_draftEs[1];
  var _showDraftEs=useState(false),showDraftEs=_showDraftEs[0],setShowDraftEs=_showDraftEs[1];
  // Fase 4: vínculo manual a huésped
  var _linking=useState(false),linking=_linking[0],setLinking=_linking[1];
  var _showLink=useState(false),showLinkDialog=_showLink[0],setShowLinkDialog=_showLink[1];
  // Fase 4: edición manual de categoría (IA puede equivocarse)
  var _catPick=useState(false),catPickerOpen=_catPick[0],setCatPickerOpen=_catPick[1];
  // Mini-menú contextual en la LISTA para corregir categoría sin abrir el detalle
  var _quickCat=useState(null),quickCatFor=_quickCat[0],setQuickCatFor=_quickCat[1]; // guarda msg._id o null
  var _quickCatRect=useState(null),quickCatRect=_quickCatRect[0],setQuickCatRect=_quickCatRect[1]; // rect del botón para posicionar el popup

  // ── Selección múltiple ─────────────────────────────────────────────────
  function toggleSel(msgId){
    setSelectedIds(function(prev){
      var next=Object.assign({},prev);
      if(next[msgId]) delete next[msgId]; else next[msgId]=true;
      return next;
    });
  }
  function clearSel(){ setSelectedIds({}); }
  function selAllVisible(){
    var all={};
    (window.__inboxFiltered||[]).forEach(function(m){all[m._id]=true;});
    setSelectedIds(all);
  }
  function selCountIn(list){
    var n=0;for(var i=0;i<list.length;i++){ if(selectedIds[list[i]._id]) n++; }
    return n;
  }

  // Archivar un correo (solo oculta de la pantalla, NO borra de Gmail ni de Firestore)
  function archiveMsg(msg, silent){
    if(!msg) return Promise.resolve();
    var tid=_csConfig().tenantId||'';
    if(!(window.Checksmart&&window.Checksmart.db)) return Promise.resolve();
    return window.Checksmart.db.collection('tenants').doc(tid).collection('inbox').doc(msg._id)
      .set({archived:true,archivedAt:new Date().toISOString()},{merge:true})
      .then(function(){
        setItems(function(prev){return prev.map(function(x){return x._id===msg._id?Object.assign({},x,{archived:true}):x;});});
        if(!silent) showToast('🗂️ Correo archivado','success');
      })
      .catch(function(e){
        if(!silent) showToast('Error archivando: '+e.message,'error');
      });
  }

  // Restaurar (desarchivar)
  function unarchiveMsg(msg){
    if(!msg) return;
    var tid=_csConfig().tenantId||'';
    if(!(window.Checksmart&&window.Checksmart.db)) return;
    window.Checksmart.db.collection('tenants').doc(tid).collection('inbox').doc(msg._id)
      .set({archived:false,archivedAt:null},{merge:true})
      .then(function(){
        setItems(function(prev){return prev.map(function(x){return x._id===msg._id?Object.assign({},x,{archived:false}):x;});});
        showToast('↩️ Correo restaurado','success');
      })
      .catch(function(e){showToast('Error: '+e.message,'error');});
  }

  // Limpiar pantalla:
  //   - Si hay correos seleccionados con los checks → archiva SOLO esos.
  //   - Si no hay selección → archiva todos los visibles (filtrados, no archivados).
  async function doCleanVisible(){
    if(cleaning) return;
    var visibles=(window.__inboxFiltered||[]).filter(function(m){return !m.archived;});
    var selMsgs=visibles.filter(function(m){return selectedIds[m._id];});
    var lista=selMsgs.length>0?selMsgs:visibles;
    var tieneSel=selMsgs.length>0;

    if(lista.length===0){showToast('No hay correos que limpiar','info');return;}
    var txt=tieneSel
      ? '¿Archivar los '+lista.length+' correo'+(lista.length===1?'':'s')+' seleccionado'+(lista.length===1?'':'s')+'?'
      : '¿Limpiar los '+lista.length+' correo'+(lista.length===1?'':'s')+' visible'+(lista.length===1?'':'s')+'?';
    if(!confirm(txt+'\n\nLos correos NO se borran de Gmail, solo se ocultan aquí. Puedes recuperarlos con "Ver archivados".')) return;

    setCleaning(true);
    try{
      for(var i=0;i<lista.length;i++){
        await archiveMsg(lista[i], true);
      }
      clearSel();
      showToast('✅ '+lista.length+' correo'+(lista.length===1?'':'s')+' archivado'+(lista.length===1?'':'s'),'success');
    }catch(e){
      showToast('Error: '+e.message,'error');
    }finally{
      setCleaning(false);
    }
  }

  // Refrescar manualmente — llama a pollInboxManual (solo admin global)
  async function doRefresh(){
    if(refreshing) return;
    setRefreshing(true);
    try{
      var user=window.firebase&&firebase.auth().currentUser;
      if(!user){showToast('Necesitas estar logueado','error');setRefreshing(false);return;}
      var token=await user.getIdToken();
      var tid=_csConfig().tenantId||'';
      var url=_csFnBase()+'/pollInboxManual'+(tid?'?tenantId='+encodeURIComponent(tid):'');
      var resp=await fetch(url,{method:'GET',headers:{'Authorization':'Bearer '+token}});
      var data=await resp.json();
      if(!resp.ok){
        showToast('Error: '+(data.error||resp.status),'error');
      }else{
        var rs=data.results||[];
        var tot=rs.reduce(function(a,r){return a+(r.processed||0);},0);
        var errs=rs.reduce(function(a,r){return a+(r.errors||0);},0);
        showToast('✅ Refrescado · '+tot+' nuevo'+(tot===1?'':'s')+(errs?' · '+errs+' err':''),'success');
      }
    }catch(e){
      showToast('Error: '+e.message,'error');
    }finally{
      setRefreshing(false);
    }
  }

  // Listener sincronización Firestore
  useEffect(function(){
    function onUpd(ev){
      if(ev.detail&&ev.detail.key==='inbox'){
        setItems(_inboxLoad());
      }
    }
    window.addEventListener('cs:data-updated',onUpd);
    return function(){window.removeEventListener('cs:data-updated',onUpd);};
  },[]);

  // Cierra el popup de cambio de categoría al hacer scroll o resize
  // (si no, el popup con position:fixed se queda en sitio fijo mientras la fila se mueve)
  useEffect(function(){
    if(!quickCatFor) return;
    function closeOnMove(){ setQuickCatFor(null); setQuickCatRect(null); }
    window.addEventListener('scroll',closeOnMove,true); // captura scroll de cualquier ancestro
    window.addEventListener('resize',closeOnMove);
    return function(){
      window.removeEventListener('scroll',closeOnMove,true);
      window.removeEventListener('resize',closeOnMove);
    };
  },[quickCatFor]);

  // Cuando cambia el mensaje seleccionado, cargo su borrador existente (si lo hay)
  useEffect(function(){
    if(selected){
      setDraft(selected.aiDraft||'');
      setDraftPreviewEs(selected.aiDraftPreviewEs||'');
      // Si el correo ya tiene traducción cacheada, la dejamos lista para mostrar
      if(selected.translationEs && selected.translationEs.bodyText){
        setTranslation({
          subject:selected.translationEs.subject||'',
          bodyText:selected.translationEs.bodyText||'',
          sourceLang:selected.translationEs.sourceLang||selected.language||'other'
        });
      }else{
        setTranslation(null);
      }
      setShowTranslation(false);
      setShowDraftEs(false);
      setCatPickerOpen(false);
    }else{
      setDraft('');
      setDraftPreviewEs('');
      setTranslation(null);
      setShowTranslation(false);
      setShowDraftEs(false);
      setCatPickerOpen(false);
    }
  },[selected&&selected._id]);

  // Traducir correo entrante al castellano
  async function doTranslate(){
    if(!selected||translating) return;
    // Si ya tenemos traducción cargada, solo conmutamos la vista
    if(translation && translation.bodyText){
      setShowTranslation(function(v){return !v;});
      return;
    }
    setTranslating(true);
    try{
      var user=window.firebase&&firebase.auth().currentUser;
      if(!user){showToast('Necesitas estar logueado','error');setTranslating(false);return;}
      var token=await user.getIdToken();
      var tid=_csConfig().tenantId||'';
      var resp=await fetch(_csFnBase()+'/translateInboxMessage',{
        method:'POST',
        headers:{'Content-Type':'application/json','Authorization':'Bearer '+token},
        body:JSON.stringify({tenantId:tid,msgId:selected._id})
      });
      var data=await resp.json();
      if(!resp.ok){
        showToast('Error: '+(data.error||resp.status),'error');
      }else{
        var tr={subject:data.subject||'',bodyText:data.bodyText||'',sourceLang:data.sourceLang||selected.language||'other'};
        setTranslation(tr);
        setShowTranslation(true);
        // Optimistic update local
        setItems(function(prev){return prev.map(function(x){return x._id===selected._id?Object.assign({},x,{translationEs:Object.assign({},tr)}):x;});});
        setSelected(function(prev){return prev?Object.assign({},prev,{translationEs:Object.assign({},tr)}):prev;});
        showToast(data.cached?'🌐 Traducción cargada':'🌐 Traducido al castellano','success');
      }
    }catch(err){
      showToast('Error: '+err.message,'error');
    }finally{
      setTranslating(false);
    }
  }

  // Generar borrador IA — llama a generateInboxDraft
  async function doGenerateDraft(){
    if(!selected||generating) return;
    setGenerating(true);
    try{
      var user=window.firebase&&firebase.auth().currentUser;
      if(!user){showToast('Necesitas estar logueado','error');setGenerating(false);return;}
      var token=await user.getIdToken();
      var tid=_csConfig().tenantId||'';
      var resp=await fetch(_csFnBase()+'/generateInboxDraft',{
        method:'POST',
        headers:{'Content-Type':'application/json','Authorization':'Bearer '+token},
        body:JSON.stringify({tenantId:tid,msgId:selected._id})
      });
      var data=await resp.json();
      if(!resp.ok){
        showToast('Error: '+(data.error||resp.status),'error');
      }else if(data.skipped){
        showToast('ℹ️ Este correo se detectó como spam — no se genera borrador','info');
      }else{
        setDraft(data.draft||'');
        setDraftPreviewEs(data.draftPreviewEs||'');
        // Optimistic update local
        setItems(function(prev){return prev.map(function(x){return x._id===selected._id?Object.assign({},x,{aiDraft:data.draft,aiDraftPreviewEs:data.draftPreviewEs||''}):x;});});
        setSelected(function(prev){return prev?Object.assign({},prev,{aiDraft:data.draft,aiDraftPreviewEs:data.draftPreviewEs||''}):prev;});
        showToast('✨ Borrador generado','success');
      }
    }catch(err){
      showToast('Error: '+err.message,'error');
    }finally{
      setGenerating(false);
    }
  }

  // Enviar respuesta — llama a sendInboxReply
  async function doSendReply(){
    if(!selected||sendingReply) return;
    var txt=(draft||'').trim();
    if(!txt){showToast('El borrador está vacío','error');return;}
    if(!confirm('¿Enviar esta respuesta a '+(selected.from||'el cliente')+'?')) return;
    setSendingReply(true);
    try{
      var user=window.firebase&&firebase.auth().currentUser;
      if(!user){showToast('Necesitas estar logueado','error');setSendingReply(false);return;}
      var token=await user.getIdToken();
      var tid=_csConfig().tenantId||'';
      var resp=await fetch(_csFnBase()+'/sendInboxReply',{
        method:'POST',
        headers:{'Content-Type':'application/json','Authorization':'Bearer '+token},
        body:JSON.stringify({tenantId:tid,msgId:selected._id,body:txt})
      });
      var data=await resp.json();
      if(!resp.ok){
        showToast('Error: '+(data.error||resp.status),'error');
      }else{
        showToast('📤 Respuesta enviada','success');
        setItems(function(prev){return prev.map(function(x){return x._id===selected._id?Object.assign({},x,{status:'replied',replyText:txt}):x;});});

  function markRead(msg){
    if(!msg||msg.status==='read') return;
    var tid=_csConfig().tenantId||'';
    // Escribir status en Firestore directamente
    if(window.Checksmart&&window.Checksmart.db){
      window.Checksmart.db.collection('tenants').doc(tid).collection('inbox').doc(msg._id)
        .set({status:'read',readAt:new Date().toISOString()},{merge:true})
        .catch(function(e){console.warn('[inbox] markRead:',e.message);});

    setItems(function(prev){return prev.map(function(x){return x._id===msg._id?Object.assign({},x,{status:'read'}):x;});});

  // Fase 4: cambiar categoría a mano (la IA se equivoca sobre todo con spam)
  // Guarda categoryManual:true para que una futura re-clasificación no la sobrescriba.
  function setCategoryFor(msg, newCat){
    if(!msg||!newCat||msg.category===newCat) { setCatPickerOpen(false); return; }
    var tid=_csConfig().tenantId||'';
    var patch={category:newCat, categoryManual:true, categoryEditedAt:new Date().toISOString()};
    if(window.Checksmart&&window.Checksmart.db){
      window.Checksmart.db.collection('tenants').doc(tid).collection('inbox').doc(msg._id)
        .set(patch,{merge:true})
        .then(function(){ if(typeof showToast==='function') showToast('Categoría actualizada','success'); })
        .catch(function(e){
          console.warn('[inbox] setCategory:',e.message);
          if(typeof showToast==='function') showToast('Error al cambiar categoría','error');
        });
    }
    // Optimistic update
    setItems(function(prev){return prev.map(function(x){return x._id===msg._id?Object.assign({},x,patch):x;});});
    setSelected(function(prev){return prev&&prev._id===msg._id?Object.assign({},prev,patch):prev;});
    setCatPickerOpen(false);
  }

  function fmtDate(iso){
    if(!iso) return '';
    try{
      var d=new Date(iso);
      var today=new Date();today.setHours(0,0,0,0);
      var ms=d.getTime();
      var diff=Date.now()-ms;
      if(diff<60*60*1000) return Math.floor(diff/60000)+' min';
      if(d>=today) return d.toLocaleTimeString('es-ES',{hour:'2-digit',minute:'2-digit'});
      return d.toLocaleDateString('es-ES',{day:'2-digit',month:'short'});
    }catch(e){return '';}
  }

function ComunicacionesPage(props){
  var guests=props.guests||[];

  var _subj=useState('Confirmación de reserva — Solicitud de transferencia bancaria'),subject=_subj[0],setSubject=_subj[1];
  var _body=useState(
    'Estimado/a {{nombre}},\n\n'+
    'Nos complace informarle que tiene una reserva confirmada en nuestra área del {{fechaEntrada}} al {{fechaSalida}} (Parcela: {{parcela}}).\n\n'+
    'El importe total de su estancia es de {{importe}}.\n\n'+

    '{{linkPago}}\n\n'+
    '— OPCIÓN 2 — Transferencia bancaria:\n'+
    'Concepto: Reserva {{codigo}}\n'+
    'Banco: \nIBAN: \nTitular: \n\n'+
    'Una vez efectuado el pago por transferencia, envíenos el justificante respondiendo a este email.\n\n'+
    'Muchas gracias por su confianza.\n\nUn saludo,\nEl equipo de recepción'
  ),body=_body[0],setBody=_body[1];
  var _prev=useState(false),preview=_prev[0],setPreview=_prev[1];
  var _sending=useState(false),sending=_sending[0],setSending=_sending[1];
  var _result=useState(null),sendResult=_result[0],setSendResult=_result[1];
  var taRef=React.useRef(null);

  var statusOptions=[
    {v:'all',l:'Todos los estados'},
    {v:'confirmed',l:'Confirmadas'},
    {v:'checkedIn',l:'Con check-in'},
    {v:'pending',l:'Pendientes'},
    {v:'cancelled',l:'Canceladas'}
  ];

  var filtered=guests.filter(function(g){
    if(statusFilter!=='all'&&g.status!==statusFilter) return false;
    if(dateFrom&&g.dateIn&&g.dateIn<dateFrom) return false;
    if(dateTo&&g.dateIn&&g.dateIn>dateTo) return false;
    if(!g.email) return false;
    if(excluded[g.id]) return false;
    return true;
  });

  var selectedIds=Object.keys(selected).filter(function(id){return selected[id];});
  var allSelected=filtered.length>0&&filtered.every(function(g){return selected[g.id];});

  function toggleAll(){
    if(allSelected){setSelected({});return;}
    var n={};filtered.forEach(function(g){n[g.id]=true;});setSelected(n);
  }
  function toggleOne(id){
    setSelected(function(prev){var n=Object.assign({},prev);if(n[id])delete n[id];else n[id]=true;return n;});
  }
  function removeSelected(){
    if(!selectedIds.length) return;
    var n=Object.assign({},excluded);
    selectedIds.forEach(function(id){n[id]=true;});
    setExcluded(n);
    setSelected({});
  }
  function removeAll(){
    var n={};
    filtered.forEach(function(g){n[g.id]=true;});
    setExcluded(function(prev){return Object.assign({},prev,n);});
    setSelected({});
  }
  function restoreAll(){
    setExcluded({});
    setSelected({});
  }
  function insertVar(v){
    var tag='{{'+v+'}}';
    if(preview) setPreview(false);
    var ta=taRef.current;
    if(ta){
      var start=ta.selectionStart||0;
      var end=ta.selectionEnd||0;
      setBody(function(b){return b.slice(0,start)+tag+b.slice(end);});
      // restaurar cursor tras render
      setTimeout(function(){
        if(taRef.current){
          taRef.current.selectionStart=start+tag.length;
          taRef.current.selectionEnd=start+tag.length;
          taRef.current.focus();
        }
      },0);
    } else {
      setBody(function(b){return b+tag;});
    }
  }

  var prevGuest=selectedIds.length>0?guests.find(function(g){return g.id===selectedIds[0];})||{}:filtered[0]||{};
  var prevBody=body
    .replace(/\{\{nombre\}\}/g,((prevGuest.name||'')+' '+(prevGuest.surname||'')).trim())
    .replace(/\{\{fechaEntrada\}\}/g,prevGuest.dateIn||'')
    .replace(/\{\{fechaSalida\}\}/g,prevGuest.dateOut||'')
    .replace(/\{\{parcela\}\}/g,prevGuest.pitchCode||'')
    .replace(/\{\{importe\}\}/g,(prevGuest.totalPrice||'0')+' €')
    .replace(/\{\{codigo\}\}/g,prevGuest.bookCode||'');

    if(!selectedIds.length){showToast('Selecciona al menos un destinatario','error');return;}

    setSending(true);setSendResult(null);

      setSending(false);

        showToast('✅ Enviados: '+data.sent+' email'+(data.sent!==1?'s':'')+(data.errors?' ('+data.errors+' con error)':''),'success');
        setSendResult(data);setSelected({});
      } else {

      }
    }).catch(function(){
      setSending(false);showToast('Error de conexión con el servidor','error');

  var VARS=['nombre','fechaEntrada','fechaSalida','parcela','importe','codigo','linkPago'];

          style:{fontSize:'.85rem'}},

  // ─── INE EOAC — Parte Semanal y Mensual ───────────────────────────────────────
  // ineCalcPeriod — cálculos adaptados a requisitos del cliente:
  //  • pernoctaciones = Σ (noches × personas)        → personas-día pernoctando
  //  • viajeros       = Σ personas en check-ins      → personas entradas nuevas
  //  • autocaravanasNuevas = nº de reservas con entrada en el periodo
  //  • parcelasDiaOcupadas = Σ (parcelas distintas ocupadas cada día)
  //  • daily[]        = desglose diario (fecha, nacionalidad→{pernoc,entradas})
  function ineCalcPeriod(firstDay, lastDay){
    // firstDay inclusive, lastDay exclusive
    var pernocESP=0,pernocEXT=0,viajESP=0,viajEXT=0;
    var natData={}; // { nat: {viaj:0,pernoc:0} }
    var autocaravanasNuevas=0;
    var days=Math.round((lastDay-firstDay)/86400000);
    // estructura por día para el parte semanal
    var daily=[];
    for(var d0=0; d0<days; d0++){
      var dObj=new Date(firstDay);
      dObj.setDate(dObj.getDate()+d0);
      daily.push({
        date:new Date(dObj),
        dateKey:dObj.toISOString().slice(0,10),
        dow:dObj.getDay(),
        nats:{},                // {ES:{pernoc,entradas}, FR:{...}, ...}
        pernocTotal:0,
        entradasTotal:0,
        _pitches:new Set()
      });
    }
    function _nat(v){ return (v&&String(v).trim())||'—'; }

    guests.forEach(function(g){
      if(!g.dateIn||!g.dateOut) return;
      var di=new Date(g.dateIn),dout=new Date(g.dateOut);
      if(isNaN(di)||isNaN(dout)) return;
      var persons=(parseInt(g.adults)||0)+(parseInt(g.children)||0);
      if(persons<=0) persons=1;
      var s=di>firstDay?di:firstDay;
      var en=dout<lastDay?dout:lastDay;
      var nights=Math.max(0,Math.round((en-s)/86400000));
      var isESP=(g.nationality||'').toUpperCase().startsWith('ES')||(g.nationality||'').toLowerCase().startsWith('esp');
      var nat=_nat(g.nationality);
      if(!natData[nat]) natData[nat]={viaj:0,pernoc:0};

      if(nights>0){
        var pernocP=nights*persons;
        if(isESP) pernocESP+=pernocP; else pernocEXT+=pernocP;
        natData[nat].pernoc+=pernocP;
        // acumular por día cada una de las noches pernoctadas
        for(var dd=0; dd<nights; dd++){
          var curD=new Date(s);
          curD.setDate(curD.getDate()+dd);
          var idx=Math.round((curD-firstDay)/86400000);
          if(idx>=0 && idx<days){
            var row=daily[idx];
            if(!row.nats[nat]) row.nats[nat]={pernoc:0,entradas:0};
            row.nats[nat].pernoc += persons;
            row.pernocTotal += persons;
            if(g.pitchCode) row._pitches.add(g.pitchCode);
          }
        }
      }
      // check-in nuevo (la autocaravana entra en el periodo)
      if(di>=firstDay && di<lastDay){
        autocaravanasNuevas++;
        if(isESP) viajESP+=persons; else viajEXT+=persons;
        natData[nat].viaj+=persons;
        var idxE=Math.round((di-firstDay)/86400000);
        if(idxE>=0 && idxE<days){
          var rowE=daily[idxE];
          if(!rowE.nats[nat]) rowE.nats[nat]={pernoc:0,entradas:0};
          rowE.nats[nat].entradas += persons;
          rowE.entradasTotal += persons;
        }
      }
    });

    // parcelasDiaOcupadas = Σ parcelas distintas ocupadas cada día
    var parcelasDiaOcupadas=0;
    daily.forEach(function(row){
      row.parcelasOcupadas=row._pitches.size;
      parcelasDiaOcupadas += row._pitches.size;
      delete row._pitches;
    });

    var plazasAbiertas=pitches.filter(function(p){return p.status!=='maintenance';}).length||pitches.length||1;
    var plazasDia=plazasAbiertas*days; // OFERTA (capacidad ofertada)
    var pernocTotal=pernocESP+pernocEXT;
    var viajTotal=viajESP+viajEXT;
    // Grado ocupación INE = personas-pernoc / plazas-día ofertadas × 100
    var ocup=plazasDia>0?Math.round((pernocTotal/plazasDia)*1000)/10:0;
    // Ocupación por parcelas (informativa para el gestor)
    var ocupParcelas=plazasDia>0?Math.round((parcelasDiaOcupadas/plazasDia)*1000)/10:0;
    var estMedia=viajTotal>0?Math.round((pernocTotal/viajTotal)*10)/10:0;
    return {
      days:days,
      plazasAbiertas:plazasAbiertas,
      plazasDia:plazasDia,
      parcelasDiaOcupadas:parcelasDiaOcupadas,
      pernocESP:pernocESP,pernocEXT:pernocEXT,pernocTotal:pernocTotal,
      viajESP:viajESP,viajEXT:viajEXT,viajTotal:viajTotal,
      autocaravanasNuevas:autocaravanasNuevas,
      ocup:ocup,
      ocupParcelas:ocupParcelas,
      estMedia:estMedia,
      natData:natData,
      daily:daily
    };
  }

  // Escape XML: evita que caracteres especiales rompan el XML ARCE
  function _xmlEsc(s){
    return String(s==null?'':s)
      .replace(/&/g,'&amp;')
      .replace(/</g,'&lt;')
      .replace(/>/g,'&gt;')
      .replace(/"/g,'&quot;')
      .replace(/'/g,'&apos;');
  }

  function renderINE(){

    // ── Fase 3: calcular recordatorio de plazo ──

    var todayDay=today.getDate();
    var reminderSemanal=todayDow===1; // lunes
    var reminderMensual=todayDay>=5&&todayDay<=8; // días 5-8 del mes

    // ── Cálculo periodo semanal — VENTANA LIBRE (INE puede pedir semanas no naturales) ──

    if(isNaN(wkEnd) || wkEnd<wkStart){ wkEnd=new Date(wkStart); wkEnd.setDate(wkStart.getDate()+6); }
    // lastDay (exclusivo) = día fin + 1
    var wkLastEx=new Date(wkEnd); wkLastEx.setDate(wkEnd.getDate()+1);
    var wkDays=Math.round((wkLastEx-wkStart)/86400000);
    var wkLabel=wkStart.toLocaleDateString('es-ES',{day:'numeric',month:'short'})+' – '+wkEnd.toLocaleDateString('es-ES',{day:'numeric',month:'short',year:'numeric'})+' · '+wkDays+' días';

    var moFirst=new Date(moY,moM,1),moLast=new Date(moY,moM+1,0);
    var moLastEx=new Date(moY,moM+1,1);
    var moLabel=moFirst.toLocaleDateString('es-ES',{month:'long',year:'numeric'});
    var moStats=ineCalcPeriod(moFirst,moLastEx);

    function copyToClipboard(txt){
      try{navigator.clipboard.writeText(txt);showToast('Copiado al portapapeles','success');}
      catch(ex){showToast('No se pudo copiar','error');}
    }

    // ── Fase 2: Generador XML ARCE/EOAC ──
    // ISO 8601 week (semana en la que cae el jueves)
    function _isoWeek(d){
      var t=new Date(Date.UTC(d.getFullYear(),d.getMonth(),d.getDate()));
      // día ISO 1..7 (lunes..domingo)
      var dayNum=t.getUTCDay()||7;
      t.setUTCDate(t.getUTCDate()+4-dayNum);
      var yearStart=new Date(Date.UTC(t.getUTCFullYear(),0,1));
      var wk=Math.ceil((((t-yearStart)/86400000)+1)/7);
      return { year:t.getUTCFullYear(), week:wk };
    }
    function buildXML(tipo, s, periodo){
      // tipo: 'S' (semanal) o 'M' (mensual)
      var no=_xmlEsc(ineNumOrden||'00000');
      var dc=_xmlEsc(ineDigControl||'0');
      var nombre=_xmlEsc(_csNombre()||'Establecimiento');
      var anno,semana='',mes='';
      if(tipo==='S'){
        var wk=new Date(ineWeekStr+'T00:00:00');
        var iso=_isoWeek(wk);
        anno=iso.year;
        semana=String(iso.week).padStart(2,'0');
      } else {
        var moParts=ineMonthStr.split('-');
        anno=moParts[0];
        mes=moParts[1];
      }
      var lines=[];
      lines.push('<?xml version="1.0" encoding="UTF-8"?>');
      lines.push('<EOAC xmlns:xsi="http://www.w3.org/2001/XMLSchema-instance">');
      lines.push('  <CUESTIONARIO>');
      lines.push('    <NUM_ORDEN>'+no+'</NUM_ORDEN>');
      lines.push('    <DIGITO_CTRL>'+dc+'</DIGITO_CTRL>');
      lines.push('    <NOMBRE_EST>'+nombre+'</NOMBRE_EST>');
      lines.push('    <TIPO_PARTE>'+tipo+'</TIPO_PARTE>');
      lines.push('    <ANO>'+anno+'</ANO>');
      if(tipo==='S'){
        lines.push('    <SEMANA>'+semana+'</SEMANA>');
        // Ventana libre: indicar fechas exactas (INE puede pedir semanas no naturales)
        lines.push('    <FECHA_INICIO>'+_xmlEsc(ineWeekStr)+'</FECHA_INICIO>');
        lines.push('    <FECHA_FIN>'+_xmlEsc(ineWeekEndStr)+'</FECHA_FIN>');
        lines.push('    <DIAS_PERIODO>'+s.days+'</DIAS_PERIODO>');
      } else {
        lines.push('    <MES>'+mes+'</MES>');
      }
      lines.push('    <OFERTA>');
      lines.push('      <PLAZAS_ABIERTAS>'+s.plazasAbiertas+'</PLAZAS_ABIERTAS>');
      lines.push('      <PLAZAS_DIA_OFERTADAS>'+s.plazasDia+'</PLAZAS_DIA_OFERTADAS>');
      lines.push('      <PLAZAS_DIA_OCUPADAS>'+s.parcelasDiaOcupadas+'</PLAZAS_DIA_OCUPADAS>');
      lines.push('    </OFERTA>');
      lines.push('    <DEMANDA>');
      lines.push('      <VIAJEROS_ESPANA>'+s.viajESP+'</VIAJEROS_ESPANA>');
      lines.push('      <VIAJEROS_EXTRANJERO>'+s.viajEXT+'</VIAJEROS_EXTRANJERO>');
      lines.push('      <VIAJEROS_TOTAL>'+s.viajTotal+'</VIAJEROS_TOTAL>');
      lines.push('      <PERNOCTACIONES_ESPANA>'+s.pernocESP+'</PERNOCTACIONES_ESPANA>');
      lines.push('      <PERNOCTACIONES_EXTRANJERO>'+s.pernocEXT+'</PERNOCTACIONES_EXTRANJERO>');
      lines.push('      <PERNOCTACIONES_TOTAL>'+s.pernocTotal+'</PERNOCTACIONES_TOTAL>');
      lines.push('      <GRADO_OCUPACION>'+s.ocup+'</GRADO_OCUPACION>');
      lines.push('      <ESTANCIA_MEDIA>'+s.estMedia+'</ESTANCIA_MEDIA>');
      // Nacionalidades
      var nats=Object.keys(s.natData).sort(function(a,b){return s.natData[b].pernoc-s.natData[a].pernoc;});
      if(nats.length){
        lines.push('      <PAISES>');
        nats.forEach(function(n){
          lines.push('        <PAIS>');
          lines.push('          <NOMBRE>'+_xmlEsc(n)+'</NOMBRE>');
          lines.push('          <VIAJEROS>'+s.natData[n].viaj+'</VIAJEROS>');
          lines.push('          <PERNOCTACIONES>'+s.natData[n].pernoc+'</PERNOCTACIONES>');
          lines.push('        </PAIS>');
        });
        lines.push('      </PAISES>');
      }
      lines.push('    </DEMANDA>');
      if(tipo==='M'){
        lines.push('    <VEHICULOS>');
        lines.push('      <AUTOCARAVANAS_NUEVAS>'+s.autocaravanasNuevas+'</AUTOCARAVANAS_NUEVAS>');
        lines.push('    </VEHICULOS>');
        lines.push('    <EMPLEO>');
        lines.push('      <TRABAJADORES_FIJOS>'+(parseInt(ineEmplFijos)||0)+'</TRABAJADORES_FIJOS>');
        lines.push('      <TRABAJADORES_EVENTUALES>'+(parseInt(ineEmplEven)||0)+'</TRABAJADORES_EVENTUALES>');
        lines.push('    </EMPLEO>');
        lines.push('    <PRECIOS_IPC>');
        lines.push('      <MOTORHOME>'+(prices.motorhome||prices.pernocta||0)+'</MOTORHOME>');
        lines.push('      <CARAVANA>'+(prices.caravan||prices.pernocta||0)+'</CARAVANA>');
        lines.push('      <CAMPER>'+(prices.camper||prices.pernocta||0)+'</CAMPER>');
        lines.push('      <FURGONETA>'+(prices.van||prices.pernocta||0)+'</FURGONETA>');
        lines.push('    </PRECIOS_IPC>');
      }
      lines.push('  </CUESTIONARIO>');
      lines.push('</EOAC>');
      return lines.join('\n');
    }

    function downloadXML(tipo, s){
      var xml=buildXML(tipo,s);
      var blob=new Blob([xml],{type:'application/xml;charset=utf-8'});
      var url=URL.createObjectURL(blob);
      var a=document.createElement('a');
      var fname='EOAC_'+(tipo==='S'?'SEMANAL_'+ineWeekStr+'_'+ineWeekEndStr:'MENSUAL_'+ineMonthStr)+'_'+(_csNombre()||'est').replace(/\s+/g,'_')+'.xml';
      a.href=url; a.download=fname; document.body.appendChild(a); a.click();

      showToast('XML descargado: '+fname,'success');

// VOICE COMMAND SYSTEM
// ══════════════════════════════════════════════════════════════════════════
function VoiceCommandSystem(props){
  var guests=props.guests, setGuests=props.setGuests, showToast=props.showToast;

  // States
  var _vs=useState('idle'),vState=_vs[0],setVState=_vs[1]; // idle|listening|processing|confirm|error|settings
  var _tr=useState(''),transcript=_tr[0],setTranscript=_tr[1];
  var _cmd=useState(null),pendingCmd=_cmd[0],setPendingCmd=_cmd[1];
  var _err=useState(''),errMsg=_err[0],setErrMsg=_err[1];
  var _svcs=useState(_loadVoiceServices),services=_svcs[0],setServices=_svcs[1];
  var _showS=useState(false),showSettings=_showS[0],setShowSettings=_showS[1];
  var _newN=useState(''),newName=_newN[0],setNewName=_newN[1];
  var _newP=useState(''),newPrice=_newP[0],setNewPrice=_newP[1];
  var _newK=useState(''),newKw=_newK[0],setNewKw=_newK[1];
  var _newD=useState('parcela'),newDest=_newD[0],setNewDest=_newD[1];
  var recogRef=useRef(null);

  function startListening(){
    var SR=window.SpeechRecognition||window.webkitSpeechRecognition;
    if(!SR){setErrMsg('Tu navegador no soporta reconocimiento de voz. Usa Chrome.');setVState('error');return;}
    var rec=new SR();
    rec.lang='es-ES';
    rec.continuous=false;
    rec.interimResults=false;
    rec.onresult=function(ev){
      var text=ev.results[0][0].transcript;
      setTranscript(text);
      setVState('processing');
      var parsed=_parseVoiceCommand(text,services);
      if(!parsed){
        setErrMsg('No entendí el comando. Di algo como "carga a la parcela 70 una botella de butano".');
        setVState('error');
      } else {
        setPendingCmd(parsed);
        setVState('confirm');
      }
    };
    rec.onerror=function(ev){
      if(ev.error==='no-speech'){setErrMsg('No se detectó ninguna voz. Inténtalo de nuevo.');}
      else if(ev.error==='not-allowed'){setErrMsg('Permiso de micrófono denegado. Actívalo en la configuración del navegador.');}
      else{setErrMsg('Error: '+ev.error);}
      setVState('error');
    };
    rec.onend=function(){
      if(vState==='listening') setVState('idle');
    };
    recogRef.current=rec;
    rec.start();
    setTranscript('');
    setErrMsg('');
    setVState('listening');
  }

  function stopListening(){
    if(recogRef.current){try{recogRef.current.stop();}catch(ex){}}
    setVState('idle');
  }

  function confirmCommand(){
    var cmd=pendingCmd;
    if(!cmd){setVState('idle');return;}
    try{
    var svc=cmd.service;
    var total=(svc.price*cmd.qty);
    var now=new Date();
    var dateStr=now.toLocaleDateString('es-ES',{day:'2-digit',month:'2-digit',year:'numeric'});
    var timeStr=now.toLocaleTimeString('es-ES',{hour:'2-digit',minute:'2-digit'});

    if(cmd.dest==='parcela'){
      // Charge to guest tab on that pitch
      // pitchCode is like "P-01" or "A-12" — extract numeric part to match spoken number
      var parNum=cmd.parcelaNum;
      var matched=null;
      if(parNum){
        var cmdN=parseInt(parNum,10);
        matched=(guests||[]).find(function(g){
          var code=String(g.pitchCode||g.pitch||g.plot||'');
          var codeN=parseInt(code.replace(/\D+/g,''),10);
          return !isNaN(codeN)&&codeN===cmdN;
        });
      }
      if(!matched){
        // 2026-04-22: fallback — en vez de bloquear, mostramos el error con opción
        // de cargar directamente a la caja del día (botón "Cargar en caja").
        var msg=parNum?('No hay ningún huésped activo en la parcela '+parNum+'. ¿Cargar en la caja del día?'):'No se pudo identificar la parcela. Especifica el número.';
        setErrMsg(msg);
        setVState('error');
        return;
      }
      var tabEntry={
        date:dateStr, time:timeStr,
        items:[{id:svc.id,name:svc.name,price:svc.price,qty:cmd.qty,total:total}],
        total:total
      };
      setGuests(function(prev){
        return prev.map(function(g){
          if(g.id===matched.id){
            return Object.assign({},g,{tabItems:(g.tabItems||[]).concat(tabEntry)});
          }
          return g;
        });
      });
      if(showToast) showToast(svc.icon+' '+svc.name+' (×'+cmd.qty+') → Parcela '+matched.pitchCode+' — €'+total.toFixed(2),'success');
    } else if(cmd.dest==='caja5'){
      // Charge to Caja Segura (C5) — añade movimiento a entries
      var c5=_loadC5();
      c5.entries=(c5.entries||[]).concat([{
        type:'in',
        amount:total,
        note:svc.icon+' '+svc.name+(cmd.qty>1?' ×'+cmd.qty:'')+' (voz)',
        ts:new Date().toISOString()
      }]);
      _saveC5(c5);
      window.dispatchEvent(new CustomEvent('cs:caja-updated'));
      window.dispatchEvent(new CustomEvent('cs:c5-updated'));
      if(showToast) showToast(svc.icon+' '+svc.name+' (×'+cmd.qty+') → Caja 5 — €'+total.toFixed(2),'success');
    } else {
      // Charge to caja del día — write to today's date bucket
      var today=now.toISOString().split('T')[0];
      var caja=_loadCaja();
      var dayBucket=caja[today]||{manualEntries:[],notes:'',fondo:'',cajaClose:null,turnoClose:null};
      dayBucket.manualEntries=(dayBucket.manualEntries||[]).concat([{
        id:'v'+Date.now(),
        type:'in',
        desc:svc.icon+' '+svc.name+(cmd.qty>1?' ×'+cmd.qty:''),
        amount:total,
        ts:Date.now()
      }]);
      caja[today]=dayBucket;
      _saveCaja(caja);
      // Notificar a CajaDiariaPage para que refresque su estado
      window.dispatchEvent(new CustomEvent('cs:caja-updated'));
      if(showToast) showToast(svc.icon+' '+svc.name+' (×'+cmd.qty+') → Caja — €'+total.toFixed(2),'success');
    }
    setPendingCmd(null);
    setVState('idle');
    }catch(err){
      // 2026-04-22: cualquier excepción en confirmCommand la atrapamos aquí
      // para que el modal NO se quede congelado. Mostramos el error al usuario.
      console.error('[VoiceCommand] confirmCommand falló:', err);
      setErrMsg('Error al registrar el cargo: '+(err&&err.message||err));
      setVState('error');
    }
  }

  // 2026-04-22: Fallback al pulsar "Cargar en caja" desde el estado de error
  // (cuando la parcela no tenía huésped). Lleva el cargo a la caja del día.
  function confirmFallbackCaja(){
    var cmd=pendingCmd;
    if(!cmd){setVState('idle');return;}
    try{
      var svc=cmd.service;
      var total=(svc.price*cmd.qty);
      var today=new Date().toISOString().split('T')[0];
      var caja=_loadCaja();
      var dayBucket=caja[today]||{manualEntries:[],notes:'',fondo:'',cajaClose:null,turnoClose:null};
      dayBucket.manualEntries=(dayBucket.manualEntries||[]).concat([{
        id:'v'+Date.now(), type:'in',
        desc:svc.icon+' '+svc.name+(cmd.qty>1?' ×'+cmd.qty:'')+' (voz — fallback)',
        amount:total, ts:Date.now()
      }]);
      caja[today]=dayBucket;
      _saveCaja(caja);
      window.dispatchEvent(new CustomEvent('cs:caja-updated'));
      if(showToast) showToast(svc.icon+' '+svc.name+' (×'+cmd.qty+') → Caja del día — €'+total.toFixed(2),'success');
      setPendingCmd(null);
      setVState('idle');
    }catch(err){
      console.error('[VoiceCommand] fallback caja falló:', err);
      setErrMsg('Error: '+(err&&err.message||err));
    }
  }

  function cancelCommand(){setPendingCmd(null);setVState('idle');}

  function saveServices(arr){setServices(arr);_saveVoiceServices(arr);}

  function addService(){
    var n=newName.trim();
    var p=parseFloat(newPrice)||0;
    var kws=newKw.trim().toLowerCase().split(',').map(function(k){return k.trim();}).filter(Boolean);
    if(!n||!p||!kws.length)return;
    var arr=services.concat([{id:'vs'+Date.now(),name:n,keywords:kws,price:p,icon:'🔹',dest:newDest}]);
    saveServices(arr);
    setNewName('');setNewPrice('');setNewKw('');setNewDest('parcela');
  }

  function delService(id){saveServices(services.filter(function(s){return s.id!==id;}));}

  function updatePrice(id,val){
    saveServices(services.map(function(s){return s.id===id?Object.assign({},s,{price:parseFloat(val)||s.price}):s;}));
  }

  // fab onClick
  function onFabClick(){
    if(vState==='listening'){stopListening();return;}
    if(vState==='confirm'||vState==='error'){setVState('idle');return;}
    startListening();
  }

  var fabClass='voice-fab'+(vState==='listening'?' voice-fab--listening':vState==='processing'?' voice-fab--processing':'');
  var fabIcon=vState==='listening'?'⏹':vState==='processing'?'⌛':'🎤';

  return e(React.Fragment,null,
    // Settings toggle
    e('button',{className:'voice-settings-btn',title:'Servicios de voz',
      onClick:function(){setShowSettings(function(v){return !v;})}},'⚙️'),

    // Settings panel
    showSettings?e('div',{className:'voice-settings-panel'},
      e('div',{className:'voice-settings-title'},
        e('span',null,'Servicios de Voz'),
        e('button',{onClick:function(){setShowSettings(false)},
          style:{background:'none',border:'none',cursor:'pointer',fontSize:16,color:'#999'}},'✕')
      ),
      services.map(function(svc){
        return e('div',{key:svc.id,className:'voice-service-row'},
          e('span',{style:{fontSize:16}},svc.icon),
          e('span',{className:'voice-service-name'},svc.name),
          e('span',{style:{fontSize:'.72rem',color:'#aaa',marginRight:4}},svc.dest==='caja'?'📦':'📍'),
          e('div',{className:'voice-service-price'},
            e('input',{type:'number',value:svc.price,min:0,step:0.5,
              onChange:function(ev){updatePrice(svc.id,ev.target.value);}})
          ),
          e('button',{className:'voice-service-del',onClick:function(){delService(svc.id);}},'🗑')
        );
      }),
      e('div',{className:'voice-add-service',style:{flexDirection:'column',gap:6}},
        e('div',{style:{fontSize:'.7rem',fontWeight:700,color:'#555',marginBottom:2}},'Nuevo servicio:'),
        e('div',{style:{display:'flex',gap:4}},

function simHash(str){var h1=0xdeadbeef^0,h2=0x41c6ce57^0;for(var i=0,ch;i<str.length;i++){ch=str.charCodeAt(i);h1=Math.imul(h1^ch,2654435761);h2=Math.imul(h2^ch,1597334677);}h1=Math.imul(h1^(h1>>>16),2246822507)^Math.imul(h2^(h2>>>13),3266489909);h2=Math.imul(h2^(h2>>>16),2246822507)^Math.imul(h1^(h1>>>13),3266489909);return(4294967296*(2097151&h2)+(h1>>>0)).toString(16).padStart(16,'0')+Date.now().toString(16)+(str.length*13).toString(16).padStart(32,'0');}

// ==================== TOMBSTONES DE RESERVAS BORRADAS ====================
// Bug arreglado 2026-04-22: al borrar una reserva, el snapshot de Firestore
// (onSnapshot en firestore-db.js) podía disparar con la lista AÚN incluyendo
// el doc (hay ventana de ~1–2 s antes de que el delete se consolide). Eso
// repoblaba el state y la reserva "reaparecía".
// Guardamos los IDs/bookCodes recién borrados durante 2 min y los filtramos
// en todos los paths que re-hidratan `guests` desde localStorage/snapshot.
window.Checksmart = window.Checksmart || {};
if(!window.Checksmart._deletedGuests){
  window.Checksmart._deletedGuests = Object.create(null);
  window.Checksmart._tombAdd = function(id, bookCode){
    var t = window.Checksmart._deletedGuests;
    var now = Date.now();
    if(id!=null && id!=='') t['id:'+String(id)] = now;
    if(bookCode) t['bc:'+bookCode] = now;
  };
  window.Checksmart._tombFilter = function(list){
    var t = window.Checksmart._deletedGuests;
    var now = Date.now();
    // Limpieza: tombstones >2 min ya están consolidadas
    Object.keys(t).forEach(function(k){ if(now - t[k] > 120000) delete t[k]; });
    if(!Array.isArray(list)) return list;
    if(!Object.keys(t).length) return list;
    return list.filter(function(g){
      if(!g) return false;
      if(g.id!=null && t['id:'+String(g.id)]) return false;
      if(g.bookCode && t['bc:'+g.bookCode]) return false;
      return true;
    });
  };
}

// ── FASE 2: esperar a que Firestore haya hidratado localStorage ─────────────
var _csRoot = document.getElementById('root');
var _csLoadingEl = document.getElementById('cs-loading');

function _csMountApp() {
  if (_csLoadingEl) {
    _csLoadingEl.style.opacity = '0';
    _csLoadingEl.style.transition = 'opacity .3s';
    setTimeout(function(){ if (_csLoadingEl) _csLoadingEl.remove(); }, 320);
  }
  ReactDOM.createRoot(_csRoot).render(e(App));
}

if (window.Checksmart && window.Checksmart.dbReady) {
  // Ya está listo (carga ultrarrápida / datos en caché offline)
  _csMountApp();
} else {
  var _csDbTimeout = setTimeout(function() {
    // Failsafe: si en 6s no hay señal, arrancar con datos locales
    console.warn('[CS] Timeout esperando cs:db-ready — arrancando con datos locales');
    _csMountApp();
  }, 6000);

  window.addEventListener('cs:db-ready', function _onDbReady() {
    window.removeEventListener('cs:db-ready', _onDbReady);
    clearTimeout(_csDbTimeout);
    _csMountApp();
  });
}
})();
