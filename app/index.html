  // ─── FASE E: Export / Import CSV + Renumerar ───────────────────────────
  function _csvEscape(v){
    if(v==null) return '';
    var s=String(v);
    if(s.indexOf(',')>=0||s.indexOf('"')>=0||s.indexOf('\n')>=0||s.indexOf(';')>=0){
      return '"'+s.replace(/"/g,'""')+'"';
    }
    return s;
  }
  function exportPitchesCSV(){
    if(!pitches.length){showToast('No hay plazas para exportar','error');return;}
    var headers=['code','zone','tipoPlaza','electricity','status','agua','vertido','barbacoa','sombra','wifi','parking','notas'];
    var rows=[headers.join(',')];
    pitches.forEach(function(p){
      rows.push([
        _csvEscape(p.code),
        _csvEscape(p.zone||''),
        _csvEscape(p.tipoPlaza||'otras'),
        _csvEscape(p.electricity||''),
        _csvEscape(p.status||'free'),
        (p.agua||p.water)?'1':'0',
        p.vertido?'1':'0',
        p.barbacoa?'1':'0',
        p.sombra?'1':'0',
        p.wifi?'1':'0',
        p.parking?'1':'0',
        _csvEscape(p.notas||'')
      ].join(','));
    });
    var csv=rows.join('\n');
    var bom='\ufeff'; // UTF-8 BOM para Excel
    var blob=new Blob([bom+csv],{type:'text/csv;charset=utf-8'});
    var url=URL.createObjectURL(blob);
    var a=document.createElement('a');
    a.href=url;
    a.download='plazas_'+(_csConfig().tenantId||'tenant')+'_'+new Date().toISOString().slice(0,10)+'.csv';
    document.body.appendChild(a);a.click();
    setTimeout(function(){document.body.removeChild(a);URL.revokeObjectURL(url);},100);
    showToast(pitches.length+' plazas exportadas a CSV','success');
  }
  function _csvParse(text){
    // Parseo simple con soporte para comillas dobles y separadores , o ;
    text=text.replace(/^\ufeff/,''); // quitar BOM si existe
    var lines=[];
    var cur='', row=[], inQuotes=false;
    for(var i=0;i<text.length;i++){
      var c=text[i], n=text[i+1];
      if(inQuotes){
        if(c==='"' && n==='"'){cur+='"';i++;}
        else if(c==='"'){inQuotes=false;}
        else{cur+=c;}
      } else {
        if(c==='"'){inQuotes=true;}
        else if(c===','||c===';'){row.push(cur);cur='';}
        else if(c==='\r'){/*skip*/}
        else if(c==='\n'){row.push(cur);lines.push(row);row=[];cur='';}
        else{cur+=c;}
      }
    }
    if(cur!==''||row.length){row.push(cur);lines.push(row);}
    return lines.filter(function(r){return r.length&&r.some(function(v){return v!==undefined&&v!=='';});});
  }
  function importPitchesCSV(){
    var inp=document.createElement('input');
    inp.type='file';inp.accept='.csv,text/csv';
    inp.onchange=function(ev){
      var f=ev.target.files&&ev.target.files[0];if(!f)return;
      var reader=new FileReader();
      reader.onload=function(e2){
        try{
          var rows=_csvParse(e2.target.result);
          if(rows.length<2){showToast('CSV vacío o sin datos','error');return;}
          var headers=rows[0].map(function(h){return (h||'').trim().toLowerCase();});
          var iCode=headers.indexOf('code');
          if(iCode<0){showToast('Falta columna "code" en el CSV','error');return;}
          var iZone=headers.indexOf('zone');
          var iTipo=headers.indexOf('tipoplaza');
          var iElec=headers.indexOf('electricity');
          var iStatus=headers.indexOf('status');
          var iAgua=headers.indexOf('agua');
          var iVert=headers.indexOf('vertido');
          var iBbq=headers.indexOf('barbacoa');
          var iSombra=headers.indexOf('sombra');
          var iWifi=headers.indexOf('wifi');
          var iParking=headers.indexOf('parking');
          var iNotas=headers.indexOf('notas');
          function b(v){v=(v||'').trim().toLowerCase();return v==='1'||v==='true'||v==='sí'||v==='si'||v==='yes';}
          var imported=[];
          var planKey=(_csConfig().plan||'essential').toLowerCase();
          var planLimit=PLAN_LIMITS[planKey]||PLAN_LIMITS.essential;
          for(var r=1;r<rows.length;r++){
            var cols=rows[r];
            var code=(cols[iCode]||'').trim();
            if(!code)continue;
            imported.push({
              id: code, // unificado: id = code (= docId Firestore)
              code: code,
              zone: iZone>=0?(cols[iZone]||'A').trim():'A',
              tipoPlaza: iTipo>=0?(cols[iTipo]||'otras').trim():'otras',
              electricity: iElec>=0?(cols[iElec]||'').trim():'',
              status: iStatus>=0?(cols[iStatus]||'free').trim():'free',
              agua: iAgua>=0?b(cols[iAgua]):false,
              water: iAgua>=0?b(cols[iAgua]):false,
              vertido: iVert>=0?b(cols[iVert]):false,
              barbacoa: iBbq>=0?b(cols[iBbq]):false,
              sombra: iSombra>=0?b(cols[iSombra]):false,
              wifi: iWifi>=0?b(cols[iWifi]):false,
              parking: iParking>=0?b(cols[iParking]):false,
              notas: iNotas>=0?(cols[iNotas]||'').trim():''
            });
          }
          if(!imported.length){showToast('No se encontraron filas válidas','error');return;}
          if(imported.length>planLimit){
            showToast('El CSV tiene '+imported.length+' plazas, tu plan '+planKey+' permite '+planLimit,'error');
            return;
          }
          // Detectar duplicados internos
          var seen={};
          for(var j=0;j<imported.length;j++){
            if(seen[imported[j].code]){
              showToast('Código duplicado en CSV: '+imported[j].code,'error');return;
            }
            seen[imported[j].code]=true;
          }
          // Modo: reemplazar o fusionar (preguntar si hay pitches existentes)
          var mode='replace';
          if(pitches.length>0){
            var resp=confirm('Se van a importar '+imported.length+' plaza(s).\n\nACEPTAR = REEMPLAZAR todas las plazas actuales ('+pitches.length+' plazas existentes se borrarán).\nCANCELAR = FUSIONAR (añadir nuevas + actualizar las que coincidan por code).');
            mode=resp?'replace':'merge';
            if(mode==='replace'){
              // Comprobar que no haya reservas activas en las que desaparecen
              var hoy=new Date().toISOString().slice(0,10);
              var nuevosCodes={};imported.forEach(function(p){nuevosCodes[p.code]=true;});
              var desaparecen=pitches.filter(function(p){return !nuevosCodes[p.code];});
              var bloqueadas=desaparecen.filter(function(p){
                return guests.some(function(g){
                  return g.pitchCode===p.code && g.status!=='cancelled' && g.status!=='checkedOut' && (g.dateOut||'9999-12-31')>=hoy;
                });
              });
              if(bloqueadas.length>0){
                showToast('No se puede reemplazar: '+bloqueadas.length+' plaza(s) desaparecerían y tienen reservas activas','error');
                return;
              }
            }
          }
          var finalPitches;
          if(mode==='replace'){
            finalPitches=imported;
          } else {
            // merge: actualizar existentes por code, añadir nuevas
            var byCode={};pitches.forEach(function(p){byCode[p.code]=p;});
            imported.forEach(function(np){
              if(byCode[np.code]){
                byCode[np.code]=Object.assign({},byCode[np.code],np,{id:byCode[np.code].id});
              } else {
                byCode[np.code]=np;
              }
            });
            finalPitches=Object.keys(byCode).map(function(k){return byCode[k];});
            if(finalPitches.length>planLimit){
              showToast('Tras fusionar serían '+finalPitches.length+' plazas, plan permite '+planLimit,'error');
              return;
            }
          }
          setPitches(finalPitches);
          try{localStorage.setItem(_csKey('pitches'),JSON.stringify(finalPitches));}catch(ex){}
          showToast(imported.length+' plaza(s) importadas ('+mode+')','success');
          clearPitchSel();
        }catch(err){
          showToast('Error al leer CSV: '+err.message,'error');
        }
      };
      reader.readAsText(f,'utf-8');
    };
    inp.click();
  }
  function renumerarPlazas(){
    if(!pitches.length){showToast('No hay plazas para renumerar','error');return;}
    // Comprobar reservas activas: renumerar rompe relación g.pitchCode → p.code
    var hoy=new Date().toISOString().slice(0,10);
    var activas=guests.filter(function(g){
      return g.status!=='cancelled' && g.status!=='checkedOut' && (g.dateOut||'9999-12-31')>=hoy;
    });
    if(activas.length>0){
      if(!confirm('⚠️ Hay '+activas.length+' reserva(s) activa(s)/futuras. Al renumerar, los códigos de plaza cambiarán y las reservas se actualizarán automáticamente para mantener la asociación. ¿Continuar?')) return;
    } else {
      if(!confirm('¿Renumerar todas las plazas secuencialmente por zona? Los códigos actuales serán reemplazados.')) return;
    }
    var pref=((prices.prefijoPlaza||'P').trim().toUpperCase())||'P';
    var prefMap=prices.prefijosPorTipo||{};
    // Agrupar por zona manteniendo orden original dentro de cada zona
    var byZone={}, zoneOrder=[];
    pitches.forEach(function(p){
      var z=p.zone||'_';
      if(!byZone[z]){byZone[z]=[];zoneOrder.push(z);}
      byZone[z].push(p);
    });
    // Renumerar: primero por zona, luego por índice
    var oldToNew={};
    var counter=1;
    var newPitches=[];
    zoneOrder.forEach(function(z){
      byZone[z].forEach(function(p){
        var usePref=(prefMap[p.tipoPlaza]||'').trim().toUpperCase()||pref;
        var newCode=usePref+'-'+String(counter).padStart(2,'0');
        // Si colisiona con un code ya asignado, seguir sumando
        while(oldToNew[newCode] || newPitches.find(function(np){return np.code===newCode;})){
          counter++;
          newCode=usePref+'-'+String(counter).padStart(2,'0');
        }
        oldToNew[p.code]=newCode;
        // id = newCode unificado (= docId Firestore). Antes el id se quedaba con
        // el valor antiguo y desincronizado, lo que impedia que setPitches detectara
        // la fila como "renombrada" en algunos paths que aun comparaban por id.
        newPitches.push(Object.assign({},p,{id:newCode,code:newCode}));
        counter++;
      });
    });
    // Actualizar reservas con nuevos códigos
    var newGuests=guests.map(function(g){
      if(g.pitchCode && oldToNew[g.pitchCode]) return Object.assign({},g,{pitchCode:oldToNew[g.pitchCode]});
      return g;
    });
    setPitches(newPitches);
    try{localStorage.setItem(_csKey('pitches'),JSON.stringify(newPitches));}catch(ex){}
    // Guardar guests renumerados — la key correcta es 'global_database', no 'guests'
    // (bug preexistente: guardaba en una key fantasma que firestore-db.js ignora,
    // asi que las reservas reasignadas nunca llegaban a Firestore tras renumerar).
    if(typeof setGuests==='function'){
      setGuests(newGuests);
      try{localStorage.setItem(_csKey('global_database'),JSON.stringify({bookings:newGuests}));}catch(ex){}
    }
    showToast(newPitches.length+' plazas renumeradas'+(activas.length>0?' + '+activas.length+' reserva(s) actualizadas':''),'success');
    clearPitchSel();
  }

function PolicePage(props){
  var t=props.t,guests=props.guests,setGuests=props.setGuests,reportedMap=props.reportedMap,setReportedMap=props.setReportedMap,showToast=props.showToast;
  var _f=useState('pending'),filterTab=_f[0],setFilterTab=_f[1];
  var _s=useState(''),search=_s[0],setSearch=_s[1];
  var _sel=useState({}),sel=_sel[0],setSel=_sel[1];
  var _addMod=useState(false),addMod=_addMod[0],setAddMod=_addMod[1];
  var _addFrm=useState({name:'',surname:'',idDoc:'',docType:'DNI',nationality:'',birthDate:'',dateIn:'',dateOut:'',pitchCode:'',plate:''}),addFrm=_addFrm[0],setAddFrm=_addFrm[1];
  var today=new Date().toISOString().split('T')[0];

  var today=new Date().toISOString().split('T')[0];
  var relevant=guests.filter(function(g){return g.status==='checkedIn'||g.status==='confirmed'||g.status==='checkedOut'});
  var filtered=relevant.filter(function(g){
    if(filterTab==='pending'&&reportedMap[g.id]) return false;
    if(filterTab==='sent'&&!reportedMap[g.id]) return false;
    if(search){var s=search.toLowerCase();return ((g.name||'')+' '+(g.surname||'')).toLowerCase().indexOf(s)>=0||(g.idDoc||'').toLowerCase().indexOf(s)>=0||(g.pitchCode||'').toLowerCase().indexOf(s)>=0}
    return true;
  });

  function markSent(ids){
    var upd=Object.assign({},reportedMap);
    ids.forEach(function(id){upd[id]=today});
    setReportedMap(upd);
    showToast(ids.length===1?'Parte enviado correctamente':ids.length+' partes enviados','success');
  }

  function generateCSV(guestList){
    var rows=[['TIPO_DOC','NUM_DOC','APELLIDO1','APELLIDO2','NOMBRE','FECHA_NAC','NACIONALIDAD','FECHA_ENTRADA','FECHA_SALIDA','PARCELA','MATRICULA']];
    guestList.forEach(function(g){
      var parts=(g.surname||'').split(' ');
      var docT=g.docType||(/^\d{8}[A-Za-z]$/.test(g.idDoc||'')?'DNI':'P');
      rows.push([docT,g.idDoc||'',parts[0]||(g.surname||''),parts[1]||'',g.name||'',g.birthDate||'',g.nationality||'',g.dateIn||'',g.dateOut||'',g.pitchCode||'',g.plate||'']);
    });
    var csv=rows.map(function(r){return r.map(function(c){return '"'+String(c).replace(/"/g,'""')+'"'}).join(';')}).join('\n');
    var blob=new Blob(['\uFEFF'+csv],{type:'text/csv;charset=utf-8'});
    var url=URL.createObjectURL(blob);
    var a=document.createElement('a');a.href=url;a.download='partes_viajeros_'+today+'.csv';a.click();
    URL.revokeObjectURL(url);
  }

  var pending=relevant.filter(function(g){return !reportedMap[g.id]});

  var selIds=Object.keys(sel).filter(function(id){return sel[id];});
  var allVisibleSelected=filtered.length>0&&filtered.every(function(g){return sel[g.id];});

  function toggleSel(id){setSel(function(prev){var n=Object.assign({},prev);n[id]=!n[id];return n;});}
  function selectAllVisible(){var n={};filtered.forEach(function(g){n[g.id]=true;});setSel(n);}
  function clearSel(){setSel({});}
  function deleteGuests(ids){
    // SEGURIDAD: NO borramos del sistema. Solo marcamos como gestionado
    // para que desaparezcan del listado de partes (mantiene el huésped en ficha360,
    // reservas, cobros, etc.). Evita pérdidas de datos por click erróneo.
    if(!ids.length)return;
    if(!confirm('¿Quitar '+ids.length+' huésped(es) del listado de partes?\n\nEsto NO borra al huésped del sistema, solo lo marca como gestionado para que no aparezca aquí. Seguirá en la ficha de su reserva.'))return;
    var upd=Object.assign({},reportedMap);
    ids.forEach(function(id){ upd[id]=today; });
    setReportedMap(upd);
    setSel({});
    showToast(ids.length+' huésped(es) marcado(s) como gestionado(s)','success');
  }
  function saveAddGuest(){
    if(!addFrm.name.trim()||!addFrm.surname.trim()||!addFrm.idDoc.trim()){showToast('Nombre, apellido y documento son obligatorios','error');return;}
    var ng=Object.assign({},addFrm,{id:'pol_'+Date.now(),status:'checkedIn',priceTotal:0,paid:true,adults:1,children:0,pets:0,notes:'Añadido manualmente desde Partes'});
    setGuests(function(prev){return prev.concat([ng]);});
    setAddMod(false);
    setAddFrm({name:'',surname:'',idDoc:'',docType:'DNI',nationality:'',birthDate:'',dateIn:'',dateOut:'',pitchCode:'',plate:''});
    showToast('Huésped añadido a partes','success');
  }

      e('div',{className:'stat-card',style:{borderLeft:'4px solid var(--danger)'}},
        e('div',{className:'stat-label'},'Partes Pendientes'),
        e('div',{className:'stat-value',style:{color:'var(--danger)'}},pending.length),
        e('div',{style:{fontSize:'.75rem',color:'var(--text-secondary)',marginTop:4}},'Obligatorio envio en 24h')
      ),
      e('div',{className:'stat-card',style:{borderLeft:'4px solid var(--primary)'}},
        e('div',{className:'stat-label'},'Enviados Hoy'),
        e('div',{className:'stat-value',style:{color:'var(--primary)'}},relevant.filter(function(g){return reportedMap[g.id]===today}).length)
      ),
      e('div',{className:'stat-card',style:{borderLeft:'4px solid var(--info)'}},
        e('div',{className:'stat-label'},'Total Comunicados'),
        e('div',{className:'stat-value'},Object.keys(reportedMap).length)
      )
    ),
    e('div',{style:{background:'#fff3e0',border:'1px solid #ffe0b2',borderRadius:'var(--radius)',padding:'10px 14px',fontSize:'.82rem',color:'#e65100',marginBottom:16}},
      '\u26a0\ufe0f ',e('strong',null,'Obligación legal: '),'El art. 25 de la Ley Orgánica 4/2015 obliga a comunicar los datos de los viajeros a las Fuerzas y Cuerpos de Seguridad en un plazo máximo de 24 horas desde la entrada.'
    ),

    // === PANEL DE ENVÍO ===
    e('div',{style:{background:'linear-gradient(135deg,#1a237e 0%,#283593 100%)',borderRadius:'var(--radius-lg)',padding:'18px 22px',marginBottom:16,color:'white'}},
      e('div',{style:{fontWeight:700,fontSize:'1rem',marginBottom:12}},'🔗 Canales de envío de partes'),
      e('div',{style:{display:'grid',gridTemplateColumns:'repeat(auto-fit,minmax(220px,1fr))',gap:12}},

        // Portal SES

          e('div',{style:{fontSize:'.75rem',color:'rgba(255,255,255,.7)',marginBottom:10,lineHeight:1.5}},

function ScannerPage(props){
  var showToast=props.showToast,setGuests=props.setGuests,pitches=props.pitches,setPitches=props.setPitches;
  var _mode=useState('camera'),mode=_mode[0],setMode=_mode[1];
  var _mrz=useState(''),mrzLine=_mrz[0],setMrzLine=_mrz[1];
  var _parsed=useState(null),parsed=_parsed[0],setParsed=_parsed[1];
  var _form=useState(null),form=_form[0],setForm=_form[1];

  function parseMRZ(lines){
    var l1=lines[0]||'',l2=lines[1]||'';
    if(l2.length<44) return null;
    var docNum=l2.substring(0,9).replace(/</g,'');
    var dob=l2.substring(13,19);
    var sex=l2.charAt(20);
    var exp=l2.substring(21,27);
    var nat=l2.substring(10,13).replace(/</g,'');
    var namePart=l1.substring(5).replace(/</g,' ').trim();
    var nameSplit=namePart.split('  ');
    var surname=(nameSplit[0]||'').trim();
    var firstname=(nameSplit[1]||'').trim();
    var yy=parseInt(dob.substring(0,2),10);
    var year=(yy>25?1900:2000)+yy;
    var birthDate=year+'-'+dob.substring(2,4)+'-'+dob.substring(4,6);
    var docType=l2.charAt(0)==='P'?'Pasaporte':'DNI';
    return{name:firstname,surname:surname,idDoc:docNum,nationality:nat,birthDate:birthDate,sex:sex,docType:docType};
  }

  function handleMRZInput(){
    var lines=mrzLine.split('\n').map(function(l){return l.trim()}).filter(Boolean);
    var result=parseMRZ(lines);
    if(!result){showToast('MRZ no reconocido. Verifica el formato.','error');return;}
    setParsed(result);
    var freePitch=(pitches.find(function(p){return p.status==='free'})||{}).code||'';
    var today=new Date().toISOString().split('T')[0];
    var checkout=new Date();checkout.setDate(checkout.getDate()+1);
    setForm({name:result.name,surname:result.surname,idDoc:result.idDoc,nationality:getNationality(result.nationality),
      vehicleType:'motorhome',plate:'',pitchCode:freePitch,
      dateIn:today,dateOut:checkout.toISOString().split('T')[0],
      adults:1,children:0,pets:0,notes:'',priceTotal:0,paid:false,nights:1,email:'',phone:''});
  }

  function getNationality(code){
    var map={ESP:'Espana',DEU:'Alemania',FRA:'Francia',GBR:'Reino Unido',NLD:'Paises Bajos',ITA:'Italia',PRT:'Portugal',BEL:'Belgica',CHE:'Suiza',DNK:'Dinamarca',SWE:'Suecia',NOR:'Noruega',AUT:'Austria',POL:'Polonia',IRL:'Irlanda',USA:'USA',CAN:'Canada',AUS:'Australia'};
    return map[code]||code;
  }

  function handleSaveCheckin(){
    if(!form||!form.pitchCode){showToast('Selecciona una parcela','error');return;}
    var fp=pitches.find(function(p){return p.code===form.pitchCode&&p.status==='free'});
    if(fp) setPitches(function(prev){return prev.map(function(p){return p.id===fp.id?Object.assign({},p,{status:'occupied'}):p})});
    setGuests(function(prev){
      var maxId=prev.reduce(function(m,g){return Math.max(m,g.id)},0);
      return prev.concat([Object.assign({},form,{id:maxId+1,status:'checkedIn'})]);
    });
    showToast('Check-in registrado: '+form.name+' '+form.surname,'success');
    setParsed(null);setForm(null);setMrzLine('');
  }

  function upForm(k,v){setForm(function(f){var o={};o[k]=v;return Object.assign({},f,o)})}
  var freePitches=pitches.filter(function(p){return p.status==='free'});

  return e('div',null,
    e('div',{className:'card',style:{marginBottom:16}},
      e('div',{className:'card-header'},e('h3',null,'\ud83d\udd0d Escaner de Documentos \u2014 Check-in Rapido')),
      e('div',{className:'card-body'},
        e('div',{className:'tabs'},
          e('div',{className:'tab'+(mode==='camera'?' active':''),onClick:function(){setMode('camera')}},'\ud83d\udcf7 Camara'),
          e('div',{className:'tab'+(mode==='mrz'?' active':''),onClick:function(){setMode('mrz')}},'\u2328\ufe0f Introducir MRZ'),
          e('div',{className:'tab'+(mode==='manual'?' active':''),onClick:function(){setMode('manual')}},'\u270f\ufe0f Manual')
        ),
        mode==='camera'?e('div',{style:{textAlign:'center',padding:32}},
          e('div',{style:{fontSize:3+'rem',marginBottom:12}},'\ud83d\udcf7'),
          e('p',{style:{color:'var(--text-secondary)',marginBottom:16,fontSize:'.9rem'}},'Conecta un lector de DNI/pasaporte USB o usa la camara del dispositivo. Apunta al codigo MRZ (las dos lineas de texto en la parte inferior del documento).'),
          e('div',{style:{background:'var(--surface-alt)',border:'2px dashed var(--border)',borderRadius:'var(--radius)',padding:40,marginBottom:16,fontSize:'.85rem',color:'var(--text-secondary)'}},
            '[ Area de captura de camara ]',e('br',null),e('br',null),

          ),
          e('button',{className:'btn btn-outline',onClick:function(){setMode('mrz')}},'Introducir MRZ manualmente \u2192')

          ),

            e('div',{style:{opacity:.5,marginBottom:4}},'Ejemplo DNI:'),

            onChange:function(ev){setMrzLine(ev.target.value)},

        ):null,

          e('button',{className:'btn btn-primary',onClick:function(){
            var freePitch=(pitches.find(function(p){return p.status==='free'})||{}).code||'';
            var today=new Date().toISOString().split('T')[0];

            setForm({name:'',surname:'',idDoc:'',nationality:'Espana',vehicleType:'motorhome',plate:'',pitchCode:freePitch,dateIn:today,dateOut:checkout.toISOString().split('T')[0],adults:1,children:0,pets:0,notes:'',priceTotal:0,paid:false,nights:1,email:'',phone:''});

    ):null,
    form?e('div',{className:'card'},

/**
 * Parse a spoken command into an action object or null.
 * Understands:
 *   "carga [a] [la] parcela X [qty] artículo"
 *   "carga [qty] artículo [a/en] [la] parcela X"
 *   "carga [qty] artículo en [la] caja [del día]"
 * Returns: {service, qty, dest:'parcela'|'caja', parcelaNum:string|null} or null
 */
function _parseVoiceCommand(text, services){
  var t = text.toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'');
  // Normalizar: "plaza" → "parcela" para aceptar ambas formas
  t = t.replace(/\bplazas?\b/g,'parcela');
  // find matching service
  var svc=null;
  for(var i=0;i<services.length;i++){
    var kws=services[i].keywords;
    for(var j=0;j<kws.length;j++){
      if(t.indexOf(kws[j].normalize('NFD').replace(/[\u0300-\u036f]/g,''))!==-1){svc=services[i];break;}
    }
    if(svc)break;
  }
  if(!svc)return null;

  var qty=1;
  var parcelaNum=null;

  // parcela number — "parcela 10", "parcela numero 10", "la 10" (si ya hay otro contexto de parcela)
  var mParc=t.match(/parcela\s+(?:numero\s+|n[\.\u00ba]?\s*)?(\d+)/);
  if(mParc) parcelaNum=mParc[1];

  // dest: "en/a caja 5" / "en/a la c5" → Caja Segura
  //       "en/a caja" (sin número) → caja del día
  //       "en/a parcela N" o número + contexto → parcela
  // 2026-04-22: bug fix — antes el último if sobrescribía caja5 siempre que hubiera "parcela".
  // Ahora: caja5 explícito gana sobre todo; parcela solo si hay número o mención explícita.
  var destOverride=null;
  var hasCaja5 = /\b(en|a)\s+(la\s+)?(caja\s*(5|cinco)|c\s*5)\b/.test(t);
  var hasCajaPlain = /\ben\s+(la\s+)?caja\b/.test(t) && !hasCaja5;
  var hasParcelaCtx = parcelaNum || /\b(en|a)\s+(la\s+)?parcela\b/.test(t);

  if(hasCaja5) destOverride='caja5';
  else if(hasParcelaCtx) destOverride='parcela';
  else if(hasCajaPlain) destOverride='caja';

  // qty: nº NO siendo el nº de parcela ni el "5" de "caja 5"
  var tForQty=t.replace(/parcela\s+(?:numero\s+|n[\.\u00ba]?\s*)?\d+/,'parcela X')
               .replace(/caja\s*(5|cinco)/,'cajaX')
               .replace(/\bc\s*5\b/,'cx');
  var mQ=tForQty.match(/\b(\d+)\b/);
  if(mQ) qty=parseInt(mQ[1],10)||1;

  var dest = destOverride || svc.dest;
  return {service:svc, qty:qty, dest:dest, parcelaNum:parcelaNum};
}

        setMasterErr((res.data && res.data.error) || 'Credenciales incorrectas');

      e('div',{className:'pin-user-grid'},
        users.map(function(u){

            e('div',{className:'pin-role'},u.role==='admin'?'Admin':'Recepción')
          );
        })
      ),
      selUser?e('div',null,
        e('div',{className:'pin-display'},dots),
        e('div',{className:'pin-numpad'},
          ['1','2','3','4','5','6','7','8','9','','0','⌫'].map(function(k,i){
            if(k==='')return e('div',{key:i,className:'pin-btn pin-empty'});
            if(k==='⌫')return e('button',{key:i,className:'pin-btn pin-del',onClick:delDigit},'⌫');

    // ─── Modal Acceso Master (Servicio Técnico) ───

function CajaDiariaPage(props){
  var invoices=props.invoices||[],showToast=props.showToast,currentUser=props.currentUser;

  var _date=useState(today),selDate=_date[0],setSelDate=_date[1];
  var _caja=useState(_loadCaja()),cajaData=_caja[0],setCajaData=_caja[1];
  var _ndesc=useState(''),ndesc=_ndesc[0],setNdesc=_ndesc[1];
  var _namt=useState(''),namt=_namt[0],setNamt=_namt[1];
  var _ntype=useState('in'),ntype=_ntype[0],setNtype=_ntype[1];
  var _notes=useState(''),notes=_notes[0],setNotes=_notes[1];
  var _fondo=useState(''),fondo=_fondo[0],setFondo=_fondo[1];
  var _provs=useState(_loadProv),provs=_provs[0];
  var _selProv=useState(''),selProv=_selProv[0],setSelProv=_selProv[1];

  // Ref para distinguir 1 click (precierre caja diaria) vs 2 clicks (cierre C5)
  var precierreTimerRef=React.useRef(null);

  useEffect(function(){
    var d=_loadCaja();
    var dd=d[selDate]||{manualEntries:[],notes:'',fondo:'',cajaClose:null,turnoClose:null};
    setNotes(dd.notes||'');
    setFondo(dd.fondo!=null?String(dd.fondo):'');
    setCajaData(d);
  },[selDate]);

  // Refrescar cuando el sistema de voz añade una entrada a la caja
  useEffect(function(){
    function onVoiceCaja(){
      setCajaData(_loadCaja());
    }
    window.addEventListener('cs:caja-updated', onVoiceCaja);
    return function(){ window.removeEventListener('cs:caja-updated', onVoiceCaja); };
  },[]);

  var dayData=cajaData[selDate]||{manualEntries:[],notes:''};
  var manualEntries=dayData.manualEntries||[];

  // Invoice data for selected date
  var dayInvoices=invoices.filter(function(i){return i.type==='invoice'&&i.date===selDate});
  var dayCredits=invoices.filter(function(i){return i.type==='credit'&&i.date===selDate});

  var alojTotal=dayInvoices.reduce(function(s,i){return s+i.total;},0);
  var alojCash=dayInvoices.filter(function(i){return i.payMethod==='cash';}).reduce(function(s,i){return s+i.total;},0)
    +dayInvoices.filter(function(i){return i.payMethod==='mixed';}).reduce(function(s,i){return s+(i.cashAmount||0);},0);
  var alojCard=dayInvoices.filter(function(i){return i.payMethod==='card';}).reduce(function(s,i){return s+i.total;},0)
    +dayInvoices.filter(function(i){return i.payMethod==='mixed';}).reduce(function(s,i){return s+(i.cardAmount||0);},0);
  var creditTotal=dayCredits.reduce(function(s,i){return s+Math.abs(i.total);},0);

  var manualIn=manualEntries.filter(function(m){return m.type==='in';}).reduce(function(s,m){return s+m.amount;},0);
  var manualOut=manualEntries.filter(function(m){return m.type==='out';}).reduce(function(s,m){return s+m.amount;},0);

  var totalEfectivo=alojCash+manualIn-manualOut;
  var totalTarjeta=alojCard;
  var totalCreditos=creditTotal;
  var saldoFinal=alojTotal-creditTotal+manualIn-manualOut;

  function addEntry(){
    var v=parseFloat(namt);
    var descFinal=ndesc.trim();
    if(!v||v<=0){showToast('Introduce un importe válido','error');return;}
    if(ntype==='out'&&selProv){
      var pObj=provs.find(function(p){return String(p.id)===selProv;});
      if(pObj&&!descFinal) descFinal='Pago a '+pObj.name;
      else if(pObj) descFinal=descFinal+' — '+pObj.name;
    }
    if(!descFinal){showToast('Rellena el concepto','error');return;}
    var entry={id:Date.now(),type:ntype,amount:v,desc:descFinal,
      provId:ntype==='out'?selProv||null:null,
      ts:new Date().toISOString()};
    var newDay=Object.assign({},dayData,{manualEntries:manualEntries.concat([entry])});
    var newCaja=Object.assign({},cajaData);newCaja[selDate]=newDay;
    setCajaData(newCaja);_saveCaja(newCaja);setNdesc('');setNamt('');setSelProv('');
    showToast('Movimiento añadido','success');
  }
  function removeEntry(id){
    // Solo admin/isMaster puede borrar movimientos de caja. Recepción normal
    // no debería poder tocar el historial económico — si se equivocó, que un
    // administrador lo corrija.
    if(!_csCanDelete(currentUser)){
      showToast('Solo un administrador puede borrar movimientos de caja','error');
      return;
    }
    var target=manualEntries.find(function(m){return m.id===id;});
    if(!target){return;}
    var signo=target.type==='in'?'+':'-';
    var msg='¿Borrar esta línea de la caja diaria?\n\n'
      +(target.type==='in'?'📥 ENTRADA':'📤 SALIDA')+'\n'
      +'Concepto: '+target.desc+'\n'
      +'Importe: '+signo+'€'+Number(target.amount).toFixed(2)+'\n\n'
      +'Esta acción no se puede deshacer.';
    if(!confirm(msg))return;
    var newDay=Object.assign({},dayData,{manualEntries:manualEntries.filter(function(m){return m.id!==id;})});
    var newCaja=Object.assign({},cajaData);newCaja[selDate]=newDay;
    setCajaData(newCaja);_saveCaja(newCaja);
    showToast('Línea borrada','success');
  }

// ==================== WELCOME / GOODBYE OVERLAY ====================
function WelcomeOverlay(props){
  var user=props.user,type=props.type,onDone=props.onDone;
  var now=new Date();
  var h=now.getHours();
  var greeting=h<12?'Buenos días':h<20?'Buenas tardes':'Buenas noches';
  var timeStr=now.toLocaleTimeString('es-ES',{hour:'2-digit',minute:'2-digit'});
  var isWelcome=type==='welcome';

  useEffect(function(){
    var t=setTimeout(onDone,isWelcome?3200:3800);
    return function(){clearTimeout(t);};
  },[]);

  return e('div',{className:'wc-overlay '+(isWelcome?'welcome':'goodbye'),onClick:onDone},
    e('div',{className:'wc-card'},
      e('img',{src:_csLogo(),className:'wc-logo',alt:''}),
      e('div',{className:'wc-greeting'},isWelcome?greeting:'¡Hasta pronto!'),
      e('div',{className:'wc-name '+(isWelcome?'green':'blue')},user.name),
      e('div',{className:'wc-role'},(user.role==='admin'?'👑 Administrador':'👤 Recepción')),
      isWelcome?e('div',{className:'wc-time-chip green'},'🟢 Turno iniciado · '+timeStr)
               :e('div',{className:'wc-time-chip blue'},'🔵 Turno cerrado · '+timeStr),
      !isWelcome?e('div',{className:'wc-warn-box'},
        '⚠️ Recuerda cerrar sesión en el navegador si es un equipo compartido con otros usuarios'
      ):null
    ),
    e('div',{className:'wc-hint'},'Toca para continuar')
  );
}

// Lista los correos clasificados por Claude Haiku. Fuente:

  try{
    var tid=_csConfig().tenantId||'';
    var raw=localStorage.getItem(tid+'_inbox');
    var arr=raw?JSON.parse(raw):[];
    return Array.isArray(arr)?arr:[];
  }catch(e){return [];}
}
function _inboxCountNew(){
  var arr=_inboxLoad();
  return arr.filter(function(m){return (m.status||'new')==='new';}).length;
}

        React.createElement('div',{style:{fontSize:'.75rem',color:'#888',marginTop:4}},guests.length+' huésped'+(guests.length===1?'':'es')+' · mostrando '+matches.length)

function InboxPage(props){
  var showToast=props.showToast||function(){};
  var _ib=useState(_inboxLoad),items=_ib[0],setItems=_ib[1];
  var _sel=useState(null),selected=_sel[0],setSelected=_sel[1];
  var _cat=useState('all'),catFilter=_cat[0],setCatFilter=_cat[1];
  var _pri=useState('all'),priFilter=_pri[0],setPriFilter=_pri[1];
  var _q=useState(''),query=_q[0],setQuery=_q[1];
  var _onlyNew=useState(false),onlyNew=_onlyNew[0],setOnlyNew=_onlyNew[1];
  var _refr=useState(false),refreshing=_refr[0],setRefreshing=_refr[1];
  var _draft=useState(''),draft=_draft[0],setDraft=_draft[1];
  var _gen=useState(false),generating=_gen[0],setGenerating=_gen[1];
  var _sending=useState(false),sendingReply=_sending[0],setSendingReply=_sending[1];
  var _showArch=useState(false),showArchived=_showArch[0],setShowArchived=_showArch[1];
  var _clean=useState(false),cleaning=_clean[0],setCleaning=_clean[1];
  var _sel2=useState({}),selectedIds=_sel2[0],setSelectedIds=_sel2[1];
  // Fase 4: traducción del correo entrante al castellano
  var _tr=useState(null),translation=_tr[0],setTranslation=_tr[1]; // {subject,bodyText,sourceLang} o null
  var _trLoad=useState(false),translating=_trLoad[0],setTranslating=_trLoad[1];
  var _showTr=useState(false),showTranslation=_showTr[0],setShowTranslation=_showTr[1];
  // Fase 4: vista previa castellana del borrador
  var _draftEs=useState(''),draftPreviewEs=_draftEs[0],setDraftPreviewEs=_draftEs[1];
  var _showDraftEs=useState(false),showDraftEs=_showDraftEs[0],setShowDraftEs=_showDraftEs[1];
  // Fase 4: vínculo manual a huésped
  var _linking=useState(false),linking=_linking[0],setLinking=_linking[1];
  var _showLink=useState(false),showLinkDialog=_showLink[0],setShowLinkDialog=_showLink[1];
  // Fase 4: edición manual de categoría (IA puede equivocarse)
  var _catPick=useState(false),catPickerOpen=_catPick[0],setCatPickerOpen=_catPick[1];
  // Mini-menú contextual en la LISTA para corregir categoría sin abrir el detalle
  var _quickCat=useState(null),quickCatFor=_quickCat[0],setQuickCatFor=_quickCat[1]; // guarda msg._id o null
  var _quickCatRect=useState(null),quickCatRect=_quickCatRect[0],setQuickCatRect=_quickCatRect[1]; // rect del botón para posicionar el popup

  // ── Selección múltiple ─────────────────────────────────────────────────
  function toggleSel(msgId){
    setSelectedIds(function(prev){
      var next=Object.assign({},prev);
      if(next[msgId]) delete next[msgId]; else next[msgId]=true;
      return next;
    });
  }
  function clearSel(){ setSelectedIds({}); }
  function selAllVisible(){
    var all={};
    (window.__inboxFiltered||[]).forEach(function(m){all[m._id]=true;});
    setSelectedIds(all);
  }
  function selCountIn(list){
    var n=0;for(var i=0;i<list.length;i++){ if(selectedIds[list[i]._id]) n++; }
    return n;
  }

  // Archivar un correo (solo oculta de la pantalla, NO borra de Gmail ni de Firestore)
  function archiveMsg(msg, silent){
    if(!msg) return Promise.resolve();
    var tid=_csConfig().tenantId||'';
    if(!(window.Checksmart&&window.Checksmart.db)) return Promise.resolve();
    return window.Checksmart.db.collection('tenants').doc(tid).collection('inbox').doc(msg._id)
      .set({archived:true,archivedAt:new Date().toISOString()},{merge:true})
      .then(function(){
        setItems(function(prev){return prev.map(function(x){return x._id===msg._id?Object.assign({},x,{archived:true}):x;});});
        if(!silent) showToast('🗂️ Correo archivado','success');
      })
      .catch(function(e){
        if(!silent) showToast('Error archivando: '+e.message,'error');
      });
  }

  // Restaurar (desarchivar)
  function unarchiveMsg(msg){
    if(!msg) return;
    var tid=_csConfig().tenantId||'';
    if(!(window.Checksmart&&window.Checksmart.db)) return;
    window.Checksmart.db.collection('tenants').doc(tid).collection('inbox').doc(msg._id)
      .set({archived:false,archivedAt:null},{merge:true})
      .then(function(){
        setItems(function(prev){return prev.map(function(x){return x._id===msg._id?Object.assign({},x,{archived:false}):x;});});
        showToast('↩️ Correo restaurado','success');
      })
      .catch(function(e){showToast('Error: '+e.message,'error');});
  }

  // Limpiar pantalla:
  //   - Si hay correos seleccionados con los checks → archiva SOLO esos.
  //   - Si no hay selección → archiva todos los visibles (filtrados, no archivados).
  async function doCleanVisible(){
    if(cleaning) return;
    var visibles=(window.__inboxFiltered||[]).filter(function(m){return !m.archived;});
    var selMsgs=visibles.filter(function(m){return selectedIds[m._id];});
    var lista=selMsgs.length>0?selMsgs:visibles;
    var tieneSel=selMsgs.length>0;

    if(lista.length===0){showToast('No hay correos que limpiar','info');return;}
    var txt=tieneSel
      ? '¿Archivar los '+lista.length+' correo'+(lista.length===1?'':'s')+' seleccionado'+(lista.length===1?'':'s')+'?'
      : '¿Limpiar los '+lista.length+' correo'+(lista.length===1?'':'s')+' visible'+(lista.length===1?'':'s')+'?';
    if(!confirm(txt+'\n\nLos correos NO se borran de Gmail, solo se ocultan aquí. Puedes recuperarlos con "Ver archivados".')) return;

    setCleaning(true);
    try{
      for(var i=0;i<lista.length;i++){
        await archiveMsg(lista[i], true);
      }
      clearSel();
      showToast('✅ '+lista.length+' correo'+(lista.length===1?'':'s')+' archivado'+(lista.length===1?'':'s'),'success');
    }catch(e){
      showToast('Error: '+e.message,'error');
    }finally{
      setCleaning(false);
    }
  }

  // Refrescar manualmente — llama a pollInboxManual (solo admin global)
  async function doRefresh(){
    if(refreshing) return;
    setRefreshing(true);
    try{
      var user=window.firebase&&firebase.auth().currentUser;
      if(!user){showToast('Necesitas estar logueado','error');setRefreshing(false);return;}
      var token=await user.getIdToken();
      var tid=_csConfig().tenantId||'';
      var url=_csFnBase()+'/pollInboxManual'+(tid?'?tenantId='+encodeURIComponent(tid):'');
      var resp=await fetch(url,{method:'GET',headers:{'Authorization':'Bearer '+token}});
      var data=await resp.json();
      if(!resp.ok){
        showToast('Error: '+(data.error||resp.status),'error');
      }else{
        var rs=data.results||[];
        var tot=rs.reduce(function(a,r){return a+(r.processed||0);},0);
        var errs=rs.reduce(function(a,r){return a+(r.errors||0);},0);
        showToast('✅ Refrescado · '+tot+' nuevo'+(tot===1?'':'s')+(errs?' · '+errs+' err':''),'success');
      }
    }catch(e){
      showToast('Error: '+e.message,'error');
    }finally{
      setRefreshing(false);
    }
  }

  // Listener sincronización Firestore
  useEffect(function(){
    function onUpd(ev){
      if(ev.detail&&ev.detail.key==='inbox'){
        setItems(_inboxLoad());
      }
    }
    window.addEventListener('cs:data-updated',onUpd);
    return function(){window.removeEventListener('cs:data-updated',onUpd);};
  },[]);

  // Cierra el popup de cambio de categoría al hacer scroll o resize
  // (si no, el popup con position:fixed se queda en sitio fijo mientras la fila se mueve)
  useEffect(function(){
    if(!quickCatFor) return;
    function closeOnMove(){ setQuickCatFor(null); setQuickCatRect(null); }
    window.addEventListener('scroll',closeOnMove,true); // captura scroll de cualquier ancestro
    window.addEventListener('resize',closeOnMove);
    return function(){
      window.removeEventListener('scroll',closeOnMove,true);
      window.removeEventListener('resize',closeOnMove);
    };
  },[quickCatFor]);

  // Cuando cambia el mensaje seleccionado, cargo su borrador existente (si lo hay)
  useEffect(function(){
    if(selected){
      setDraft(selected.aiDraft||'');
      setDraftPreviewEs(selected.aiDraftPreviewEs||'');
      // Si el correo ya tiene traducción cacheada, la dejamos lista para mostrar
      if(selected.translationEs && selected.translationEs.bodyText){
        setTranslation({
          subject:selected.translationEs.subject||'',
          bodyText:selected.translationEs.bodyText||'',
          sourceLang:selected.translationEs.sourceLang||selected.language||'other'
        });
      }else{
        setTranslation(null);
      }
      setShowTranslation(false);
      setShowDraftEs(false);
      setCatPickerOpen(false);
    }else{
      setDraft('');
      setDraftPreviewEs('');
      setTranslation(null);
      setShowTranslation(false);
      setShowDraftEs(false);
      setCatPickerOpen(false);
    }
  },[selected&&selected._id]);

  // Traducir correo entrante al castellano
  async function doTranslate(){
    if(!selected||translating) return;
    // Si ya tenemos traducción cargada, solo conmutamos la vista
    if(translation && translation.bodyText){
      setShowTranslation(function(v){return !v;});
      return;
    }
    setTranslating(true);
    try{
      var user=window.firebase&&firebase.auth().currentUser;
      if(!user){showToast('Necesitas estar logueado','error');setTranslating(false);return;}
      var token=await user.getIdToken();
      var tid=_csConfig().tenantId||'';
      var resp=await fetch(_csFnBase()+'/translateInboxMessage',{

  function markRead(msg){
    if(!msg||msg.status==='read') return;
    var tid=_csConfig().tenantId||'';
    // Escribir status en Firestore directamente
    if(window.Checksmart&&window.Checksmart.db){
      window.Checksmart.db.collection('tenants').doc(tid).collection('inbox').doc(msg._id)
        .set({status:'read',readAt:new Date().toISOString()},{merge:true})
        .catch(function(e){console.warn('[inbox] markRead:',e.message);});
    }
    // Optimistic update local
    setItems(function(prev){return prev.map(function(x){return x._id===msg._id?Object.assign({},x,{status:'read'}):x;});});

  // Fase 4: cambiar categoría a mano (la IA se equivoca sobre todo con spam)
  // Guarda categoryManual:true para que una futura re-clasificación no la sobrescriba.
  function setCategoryFor(msg, newCat){
    if(!msg||!newCat||msg.category===newCat) { setCatPickerOpen(false); return; }
    var tid=_csConfig().tenantId||'';
    var patch={category:newCat, categoryManual:true, categoryEditedAt:new Date().toISOString()};
    if(window.Checksmart&&window.Checksmart.db){
      window.Checksmart.db.collection('tenants').doc(tid).collection('inbox').doc(msg._id)
        .set(patch,{merge:true})
        .then(function(){ if(typeof showToast==='function') showToast('Categoría actualizada','success'); })
        .catch(function(e){
          console.warn('[inbox] setCategory:',e.message);
          if(typeof showToast==='function') showToast('Error al cambiar categoría','error');
        });
    }
    // Optimistic update
    setItems(function(prev){return prev.map(function(x){return x._id===msg._id?Object.assign({},x,patch):x;});});
    setSelected(function(prev){return prev&&prev._id===msg._id?Object.assign({},prev,patch):prev;});
    setCatPickerOpen(false);
  }

  function fmtDate(iso){
    if(!iso) return '';
    try{
      var d=new Date(iso);
      var today=new Date();today.setHours(0,0,0,0);
      var ms=d.getTime();
      var diff=Date.now()-ms;
      if(diff<60*60*1000) return Math.floor(diff/60000)+' min';
      if(d>=today) return d.toLocaleTimeString('es-ES',{hour:'2-digit',minute:'2-digit'});
      return d.toLocaleDateString('es-ES',{day:'2-digit',month:'short'});
    }catch(e){return '';}
  }

function ComunicacionesPage(props){
  var guests=props.guests||[];

  var _df=useState(''),dateFrom=_df[0],setDateFrom=_df[1];

  var _sf=useState('confirmed'),statusFilter=_sf[0],setStatusFilter=_sf[1];
  var _sel=useState({}),selected=_sel[0],setSelected=_sel[1];
  var _excl=useState({}),excluded=_excl[0],setExcluded=_excl[1];
  var _subj=useState('Confirmación de reserva — Solicitud de transferencia bancaria'),subject=_subj[0],setSubject=_subj[1];
  var _body=useState(
    'Estimado/a {{nombre}},\n\n'+
    'Nos complace informarle que tiene una reserva confirmada en nuestra área del {{fechaEntrada}} al {{fechaSalida}} (Parcela: {{parcela}}).\n\n'+
    'El importe total de su estancia es de {{importe}}.\n\n'+
    '— OPCIÓN 1 — Pago online seguro (recomendado):\n\n'+
    '{{linkPago}}\n\n'+
    '— OPCIÓN 2 — Transferencia bancaria:\n'+
    'Concepto: Reserva {{codigo}}\n'+
    'Banco: \nIBAN: \nTitular: \n\n'+
    'Una vez efectuado el pago por transferencia, envíenos el justificante respondiendo a este email.\n\n'+
    'Muchas gracias por su confianza.\n\nUn saludo,\nEl equipo de recepción'
  ),body=_body[0],setBody=_body[1];
  var _prev=useState(false),preview=_prev[0],setPreview=_prev[1];
  var _sending=useState(false),sending=_sending[0],setSending=_sending[1];
  var _result=useState(null),sendResult=_result[0],setSendResult=_result[1];
  var taRef=React.useRef(null);

  var statusOptions=[
    {v:'all',l:'Todos los estados'},
    {v:'confirmed',l:'Confirmadas'},
    {v:'checkedIn',l:'Con check-in'},
    {v:'pending',l:'Pendientes'},
    {v:'cancelled',l:'Canceladas'}
  ];

  var filtered=guests.filter(function(g){
    if(statusFilter!=='all'&&g.status!==statusFilter) return false;
    if(dateFrom&&g.dateIn&&g.dateIn<dateFrom) return false;
    if(dateTo&&g.dateIn&&g.dateIn>dateTo) return false;
    if(!g.email) return false;
    if(excluded[g.id]) return false;
    return true;
  });

  var selectedIds=Object.keys(selected).filter(function(id){return selected[id];});
  var allSelected=filtered.length>0&&filtered.every(function(g){return selected[g.id];});

  function toggleAll(){
    if(allSelected){setSelected({});return;}
    var n={};filtered.forEach(function(g){n[g.id]=true;});setSelected(n);
  }
  function toggleOne(id){
    setSelected(function(prev){var n=Object.assign({},prev);if(n[id])delete n[id];else n[id]=true;return n;});
  }
  function removeSelected(){
    if(!selectedIds.length) return;
    var n=Object.assign({},excluded);
    selectedIds.forEach(function(id){n[id]=true;});
    setExcluded(n);
    setSelected({});
  }
  function removeAll(){
    var n={};
    filtered.forEach(function(g){n[g.id]=true;});
    setExcluded(function(prev){return Object.assign({},prev,n);});
    setSelected({});
  }
  function restoreAll(){
    setExcluded({});
    setSelected({});
  }
  function insertVar(v){
    var tag='{{'+v+'}}';
    if(preview) setPreview(false);
    var ta=taRef.current;
    if(ta){
      var start=ta.selectionStart||0;
      var end=ta.selectionEnd||0;
      setBody(function(b){return b.slice(0,start)+tag+b.slice(end);});
      // restaurar cursor tras render
      setTimeout(function(){
        if(taRef.current){
          taRef.current.selectionStart=start+tag.length;
          taRef.current.selectionEnd=start+tag.length;
          taRef.current.focus();
        }
      },0);
    } else {
      setBody(function(b){return b+tag;});
    }
  }

  var prevGuest=selectedIds.length>0?guests.find(function(g){return g.id===selectedIds[0];})||{}:filtered[0]||{};
  var prevBody=body
    .replace(/\{\{nombre\}\}/g,((prevGuest.name||'')+' '+(prevGuest.surname||'')).trim())
    .replace(/\{\{fechaEntrada\}\}/g,prevGuest.dateIn||'')
    .replace(/\{\{fechaSalida\}\}/g,prevGuest.dateOut||'')
    .replace(/\{\{parcela\}\}/g,prevGuest.pitchCode||'')
    .replace(/\{\{importe\}\}/g,(prevGuest.totalPrice||'0')+' €')
    .replace(/\{\{codigo\}\}/g,prevGuest.bookCode||'');

  function handleSend(){
    if(!selectedIds.length){showToast('Selecciona al menos un destinatario','error');return;}
    if(!subject.trim()){showToast('El asunto es obligatorio','error');return;}
    if(!body.trim()){showToast('El cuerpo del mensaje es obligatorio','error');return;}
    setSending(true);setSendResult(null);
    var tenantId=(window.Checksmart&&window.Checksmart.tenantId)||'demo';
    fetch(_csFnBase()+'/sendBulkEmail',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({tenantId:tenantId,guestIds:selectedIds,subject:subject,htmlBody:body.replace(/\n/g,'<br>')})
    }).then(function(r){return r.json();}).then(function(data){
      setSending(false);
      if(data.ok){
        showToast('✅ Enviados: '+data.sent+' email'+(data.sent!==1?'s':'')+(data.errors?' ('+data.errors+' con error)':''),'success');
        setSendResult(data);setSelected({});
      } else {
        showToast('Error: '+(data.error||'desconocido'),'error');
      }
    }).catch(function(){
      setSending(false);showToast('Error de conexión con el servidor','error');
    });
  }

  var VARS=['nombre','fechaEntrada','fechaSalida','parcela','importe','codigo','linkPago'];
  var statusColor={confirmed:'#2e7d32',checkedIn:'var(--primary)',pending:'#f57f17',cancelled:'#9e9e9e',checkedOut:'#9e9e9e'};

  return e('div',{style:{display:'flex',gap:20,height:'calc(100vh - 120px)',overflow:'hidden'}},

    // ── Panel izquierdo: filtros + lista destinatarios ──────────────────────
    e('div',{style:{width:420,flexShrink:0,display:'flex',flexDirection:'column',gap:12,overflowY:'auto'}},

      // Filtros
      e('div',{className:'card',style:{padding:16}},
        e('div',{style:{fontWeight:700,fontSize:'.9rem',marginBottom:12,color:'var(--text-secondary)'}},
          '🔍 FILTRAR DESTINATARIOS'),
        e('div',{style:{display:'grid',gridTemplateColumns:'1fr 1fr',gap:8,marginBottom:8}},
          e('div',null,

  // ─── INE EOAC — Parte Semanal y Mensual ───────────────────────────────────────
  // ineCalcPeriod — cálculos adaptados a requisitos del cliente:
  //  • pernoctaciones = Σ (noches × personas)        → personas-día pernoctando
  //  • viajeros       = Σ personas en check-ins      → personas entradas nuevas
  //  • autocaravanasNuevas = nº de reservas con entrada en el periodo
  //  • parcelasDiaOcupadas = Σ (parcelas distintas ocupadas cada día)
  //  • daily[]        = desglose diario (fecha, nacionalidad→{pernoc,entradas})
  function ineCalcPeriod(firstDay, lastDay){
    // firstDay inclusive, lastDay exclusive
    var pernocESP=0,pernocEXT=0,viajESP=0,viajEXT=0;
    var natData={}; // { nat: {viaj:0,pernoc:0} }
    var autocaravanasNuevas=0;
    var days=Math.round((lastDay-firstDay)/86400000);
    // estructura por día para el parte semanal
    var daily=[];
    for(var d0=0; d0<days; d0++){
      var dObj=new Date(firstDay);
      dObj.setDate(dObj.getDate()+d0);
      daily.push({
        date:new Date(dObj),
        dateKey:dObj.toISOString().slice(0,10),
        dow:dObj.getDay(),
        nats:{},                // {ES:{pernoc,entradas}, FR:{...}, ...}
        pernocTotal:0,
        entradasTotal:0,
        _pitches:new Set()
      });
    }
    function _nat(v){ return (v&&String(v).trim())||'—'; }

    guests.forEach(function(g){
      if(!g.dateIn||!g.dateOut) return;
      var di=new Date(g.dateIn),dout=new Date(g.dateOut);
      if(isNaN(di)||isNaN(dout)) return;
      var persons=(parseInt(g.adults)||0)+(parseInt(g.children)||0);
      if(persons<=0) persons=1;
      var s=di>firstDay?di:firstDay;
      var en=dout<lastDay?dout:lastDay;
      var nights=Math.max(0,Math.round((en-s)/86400000));
      var isESP=(g.nationality||'').toUpperCase().startsWith('ES')||(g.nationality||'').toLowerCase().startsWith('esp');
      var nat=_nat(g.nationality);
      if(!natData[nat]) natData[nat]={viaj:0,pernoc:0};

      if(nights>0){
        var pernocP=nights*persons;
        if(isESP) pernocESP+=pernocP; else pernocEXT+=pernocP;
        natData[nat].pernoc+=pernocP;
        // acumular por día cada una de las noches pernoctadas
        for(var dd=0; dd<nights; dd++){
          var curD=new Date(s);
          curD.setDate(curD.getDate()+dd);
          var idx=Math.round((curD-firstDay)/86400000);
          if(idx>=0 && idx<days){
            var row=daily[idx];
            if(!row.nats[nat]) row.nats[nat]={pernoc:0,entradas:0};
            row.nats[nat].pernoc += persons;
            row.pernocTotal += persons;
            if(g.pitchCode) row._pitches.add(g.pitchCode);
          }
        }
      }
      // check-in nuevo (la autocaravana entra en el periodo)
      if(di>=firstDay && di<lastDay){
        autocaravanasNuevas++;
        if(isESP) viajESP+=persons; else viajEXT+=persons;
        natData[nat].viaj+=persons;
        var idxE=Math.round((di-firstDay)/86400000);
        if(idxE>=0 && idxE<days){
          var rowE=daily[idxE];
          if(!rowE.nats[nat]) rowE.nats[nat]={pernoc:0,entradas:0};
          rowE.nats[nat].entradas += persons;
          rowE.entradasTotal += persons;
        }
      }
    });

    // parcelasDiaOcupadas = Σ parcelas distintas ocupadas cada día
    var parcelasDiaOcupadas=0;
    daily.forEach(function(row){
      row.parcelasOcupadas=row._pitches.size;
      parcelasDiaOcupadas += row._pitches.size;
      delete row._pitches;
    });

    var plazasAbiertas=pitches.filter(function(p){return p.status!=='maintenance';}).length||pitches.length||1;
    var plazasDia=plazasAbiertas*days; // OFERTA (capacidad ofertada)
    var pernocTotal=pernocESP+pernocEXT;
    var viajTotal=viajESP+viajEXT;
    // Grado ocupación INE = personas-pernoc / plazas-día ofertadas × 100
    var ocup=plazasDia>0?Math.round((pernocTotal/plazasDia)*1000)/10:0;
    // Ocupación por parcelas (informativa para el gestor)
    var ocupParcelas=plazasDia>0?Math.round((parcelasDiaOcupadas/plazasDia)*1000)/10:0;
    var estMedia=viajTotal>0?Math.round((pernocTotal/viajTotal)*10)/10:0;
    return {
      days:days,
      plazasAbiertas:plazasAbiertas,
      plazasDia:plazasDia,
      parcelasDiaOcupadas:parcelasDiaOcupadas,
      pernocESP:pernocESP,pernocEXT:pernocEXT,pernocTotal:pernocTotal,
      viajESP:viajESP,viajEXT:viajEXT,viajTotal:viajTotal,
      autocaravanasNuevas:autocaravanasNuevas,
      ocup:ocup,
      ocupParcelas:ocupParcelas,
      estMedia:estMedia,
      natData:natData,
      daily:daily
    };
  }

  // Escape XML: evita que caracteres especiales rompan el XML ARCE
  function _xmlEsc(s){
    return String(s==null?'':s)
      .replace(/&/g,'&amp;')
      .replace(/</g,'&lt;')
      .replace(/>/g,'&gt;')
      .replace(/"/g,'&quot;')
      .replace(/'/g,'&apos;');
  }

    var todayDow=today.getDay(); // 0=dom,1=lun
    var todayDay=today.getDate();
    var reminderSemanal=todayDow===1; // lunes
    var reminderMensual=todayDay>=5&&todayDay<=8; // días 5-8 del mes

    // ── Cálculo periodo semanal — VENTANA LIBRE (INE puede pedir semanas no naturales) ──
    var wkStart=new Date(ineWeekStr+'T00:00:00');
    if(isNaN(wkStart)) wkStart=new Date();
    var wkEnd=new Date(ineWeekEndStr+'T00:00:00');
    if(isNaN(wkEnd) || wkEnd<wkStart){ wkEnd=new Date(wkStart); wkEnd.setDate(wkStart.getDate()+6); }
    // lastDay (exclusivo) = día fin + 1
    var wkLastEx=new Date(wkEnd); wkLastEx.setDate(wkEnd.getDate()+1);
    var wkDays=Math.round((wkLastEx-wkStart)/86400000);
    var wkLabel=wkStart.toLocaleDateString('es-ES',{day:'numeric',month:'short'})+' – '+wkEnd.toLocaleDateString('es-ES',{day:'numeric',month:'short',year:'numeric'})+' · '+wkDays+' días';

    var moFirst=new Date(moY,moM,1),moLast=new Date(moY,moM+1,0);
    var moLastEx=new Date(moY,moM+1,1);
    var moLabel=moFirst.toLocaleDateString('es-ES',{month:'long',year:'numeric'});
    var moStats=ineCalcPeriod(moFirst,moLastEx);

    function copyToClipboard(txt){

      catch(ex){showToast('No se pudo copiar','error');}
    }

    // ── Fase 2: Generador XML ARCE/EOAC ──
    // ISO 8601 week (semana en la que cae el jueves)
    function _isoWeek(d){
      var t=new Date(Date.UTC(d.getFullYear(),d.getMonth(),d.getDate()));
      // día ISO 1..7 (lunes..domingo)
      var dayNum=t.getUTCDay()||7;
      t.setUTCDate(t.getUTCDate()+4-dayNum);
      var yearStart=new Date(Date.UTC(t.getUTCFullYear(),0,1));
      var wk=Math.ceil((((t-yearStart)/86400000)+1)/7);
      return { year:t.getUTCFullYear(), week:wk };
    }
    function buildXML(tipo, s, periodo){
      // tipo: 'S' (semanal) o 'M' (mensual)
      var no=_xmlEsc(ineNumOrden||'00000');
      var dc=_xmlEsc(ineDigControl||'0');
      var nombre=_xmlEsc(_csNombre()||'Establecimiento');
      var anno,semana='',mes='';
      if(tipo==='S'){
        var wk=new Date(ineWeekStr+'T00:00:00');
        var iso=_isoWeek(wk);
        anno=iso.year;
        semana=String(iso.week).padStart(2,'0');
      } else {
        var moParts=ineMonthStr.split('-');
        anno=moParts[0];
        mes=moParts[1];
      }
      var lines=[];
      lines.push('<?xml version="1.0" encoding="UTF-8"?>');
      lines.push('<EOAC xmlns:xsi="http://www.w3.org/2001/XMLSchema-instance">');
      lines.push('  <CUESTIONARIO>');
      lines.push('    <NUM_ORDEN>'+no+'</NUM_ORDEN>');
      lines.push('    <DIGITO_CTRL>'+dc+'</DIGITO_CTRL>');
      lines.push('    <NOMBRE_EST>'+nombre+'</NOMBRE_EST>');
      lines.push('    <TIPO_PARTE>'+tipo+'</TIPO_PARTE>');
      lines.push('    <ANO>'+anno+'</ANO>');
      if(tipo==='S'){
        lines.push('    <SEMANA>'+semana+'</SEMANA>');
        // Ventana libre: indicar fechas exactas (INE puede pedir semanas no naturales)
        lines.push('    <FECHA_INICIO>'+_xmlEsc(ineWeekStr)+'</FECHA_INICIO>');
        lines.push('    <FECHA_FIN>'+_xmlEsc(ineWeekEndStr)+'</FECHA_FIN>');
        lines.push('    <DIAS_PERIODO>'+s.days+'</DIAS_PERIODO>');
      } else {
        lines.push('    <MES>'+mes+'</MES>');
      }
      lines.push('    <OFERTA>');
      lines.push('      <PLAZAS_ABIERTAS>'+s.plazasAbiertas+'</PLAZAS_ABIERTAS>');
      lines.push('      <PLAZAS_DIA_OFERTADAS>'+s.plazasDia+'</PLAZAS_DIA_OFERTADAS>');
      lines.push('      <PLAZAS_DIA_OCUPADAS>'+s.parcelasDiaOcupadas+'</PLAZAS_DIA_OCUPADAS>');
      lines.push('    </OFERTA>');
      lines.push('    <DEMANDA>');
      lines.push('      <VIAJEROS_ESPANA>'+s.viajESP+'</VIAJEROS_ESPANA>');
      lines.push('      <VIAJEROS_EXTRANJERO>'+s.viajEXT+'</VIAJEROS_EXTRANJERO>');
      lines.push('      <VIAJEROS_TOTAL>'+s.viajTotal+'</VIAJEROS_TOTAL>');
      lines.push('      <PERNOCTACIONES_ESPANA>'+s.pernocESP+'</PERNOCTACIONES_ESPANA>');
      lines.push('      <PERNOCTACIONES_EXTRANJERO>'+s.pernocEXT+'</PERNOCTACIONES_EXTRANJERO>');
      lines.push('      <PERNOCTACIONES_TOTAL>'+s.pernocTotal+'</PERNOCTACIONES_TOTAL>');
      lines.push('      <GRADO_OCUPACION>'+s.ocup+'</GRADO_OCUPACION>');
      lines.push('      <ESTANCIA_MEDIA>'+s.estMedia+'</ESTANCIA_MEDIA>');
      // Nacionalidades
      var nats=Object.keys(s.natData).sort(function(a,b){return s.natData[b].pernoc-s.natData[a].pernoc;});
      if(nats.length){
        lines.push('      <PAISES>');
        nats.forEach(function(n){
          lines.push('        <PAIS>');
          lines.push('          <NOMBRE>'+_xmlEsc(n)+'</NOMBRE>');
          lines.push('          <VIAJEROS>'+s.natData[n].viaj+'</VIAJEROS>');
          lines.push('          <PERNOCTACIONES>'+s.natData[n].pernoc+'</PERNOCTACIONES>');
          lines.push('        </PAIS>');
        });
        lines.push('      </PAISES>');
      }
      lines.push('    </DEMANDA>');
      if(tipo==='M'){
        lines.push('    <VEHICULOS>');
        lines.push('      <AUTOCARAVANAS_NUEVAS>'+s.autocaravanasNuevas+'</AUTOCARAVANAS_NUEVAS>');
        lines.push('    </VEHICULOS>');
        lines.push('    <EMPLEO>');
        lines.push('      <TRABAJADORES_FIJOS>'+(parseInt(ineEmplFijos)||0)+'</TRABAJADORES_FIJOS>');
        lines.push('      <TRABAJADORES_EVENTUALES>'+(parseInt(ineEmplEven)||0)+'</TRABAJADORES_EVENTUALES>');
        lines.push('    </EMPLEO>');
        lines.push('    <PRECIOS_IPC>');
        lines.push('      <MOTORHOME>'+(prices.motorhome||prices.pernocta||0)+'</MOTORHOME>');
        lines.push('      <CARAVANA>'+(prices.caravan||prices.pernocta||0)+'</CARAVANA>');
        lines.push('      <CAMPER>'+(prices.camper||prices.pernocta||0)+'</CAMPER>');
        lines.push('      <FURGONETA>'+(prices.van||prices.pernocta||0)+'</FURGONETA>');
        lines.push('    </PRECIOS_IPC>');
      }
      lines.push('  </CUESTIONARIO>');
      lines.push('</EOAC>');
      return lines.join('\n');
    }

    function renderSemanal(){
      var s=wkStats;
      var DOWS=['Dom','Lun','Mar','Mié','Jue','Vie','Sáb'];
      // Nacionalidades presentes en la semana (unión)
      var wkNats={};
      s.daily.forEach(function(r){
        Object.keys(r.nats).forEach(function(n){
          if(!wkNats[n]) wkNats[n]={pernoc:0,entradas:0};
          wkNats[n].pernoc += r.nats[n].pernoc;
          wkNats[n].entradas += r.nats[n].entradas;
        });

// VOICE COMMAND SYSTEM
// ══════════════════════════════════════════════════════════════════════════
function VoiceCommandSystem(props){
  var guests=props.guests, setGuests=props.setGuests, showToast=props.showToast;

  // States
  var _vs=useState('idle'),vState=_vs[0],setVState=_vs[1]; // idle|listening|processing|confirm|error|settings
  var _tr=useState(''),transcript=_tr[0],setTranscript=_tr[1];
  var _cmd=useState(null),pendingCmd=_cmd[0],setPendingCmd=_cmd[1];
  var _err=useState(''),errMsg=_err[0],setErrMsg=_err[1];
  var _svcs=useState(_loadVoiceServices),services=_svcs[0],setServices=_svcs[1];
  var _showS=useState(false),showSettings=_showS[0],setShowSettings=_showS[1];
  var _newN=useState(''),newName=_newN[0],setNewName=_newN[1];
  var _newP=useState(''),newPrice=_newP[0],setNewPrice=_newP[1];
  var _newK=useState(''),newKw=_newK[0],setNewKw=_newK[1];
  var _newD=useState('parcela'),newDest=_newD[0],setNewDest=_newD[1];
  var recogRef=useRef(null);

  function startListening(){
    var SR=window.SpeechRecognition||window.webkitSpeechRecognition;
    if(!SR){setErrMsg('Tu navegador no soporta reconocimiento de voz. Usa Chrome.');setVState('error');return;}
    var rec=new SR();
    rec.lang='es-ES';
    rec.continuous=false;
    rec.interimResults=false;
    rec.onresult=function(ev){
      var text=ev.results[0][0].transcript;
      setTranscript(text);
      setVState('processing');
      var parsed=_parseVoiceCommand(text,services);
      if(!parsed){
        setErrMsg('No entendí el comando. Di algo como "carga a la parcela 70 una botella de butano".');
        setVState('error');
      } else {
        setPendingCmd(parsed);
        setVState('confirm');
      }
    };
    rec.onerror=function(ev){
      if(ev.error==='no-speech'){setErrMsg('No se detectó ninguna voz. Inténtalo de nuevo.');}
      else if(ev.error==='not-allowed'){setErrMsg('Permiso de micrófono denegado. Actívalo en la configuración del navegador.');}
      else{setErrMsg('Error: '+ev.error);}
      setVState('error');
    };
    rec.onend=function(){
      if(vState==='listening') setVState('idle');
    };
    recogRef.current=rec;
    rec.start();
    setTranscript('');
    setErrMsg('');
    setVState('listening');
  }

  function stopListening(){
    if(recogRef.current){try{recogRef.current.stop();}catch(ex){}}
    setVState('idle');
  }

  function confirmCommand(){
    var cmd=pendingCmd;
    if(!cmd){setVState('idle');return;}
    try{
    var svc=cmd.service;
    var total=(svc.price*cmd.qty);
    var now=new Date();
    var dateStr=now.toLocaleDateString('es-ES',{day:'2-digit',month:'2-digit',year:'numeric'});
    var timeStr=now.toLocaleTimeString('es-ES',{hour:'2-digit',minute:'2-digit'});

    if(cmd.dest==='parcela'){
      // Charge to guest tab on that pitch
      // pitchCode is like "P-01" or "A-12" — extract numeric part to match spoken number
      var parNum=cmd.parcelaNum;
      var matched=null;
      if(parNum){
        var cmdN=parseInt(parNum,10);
        matched=(guests||[]).find(function(g){
          var code=String(g.pitchCode||g.pitch||g.plot||'');
          var codeN=parseInt(code.replace(/\D+/g,''),10);
          return !isNaN(codeN)&&codeN===cmdN;
        });
      }
      if(!matched){
        // 2026-04-22: fallback — en vez de bloquear, mostramos el error con opción
        // de cargar directamente a la caja del día (botón "Cargar en caja").
        var msg=parNum?('No hay ningún huésped activo en la parcela '+parNum+'. ¿Cargar en la caja del día?'):'No se pudo identificar la parcela. Especifica el número.';
        setErrMsg(msg);
        setVState('error');
        return;
      }
      var tabEntry={
        date:dateStr, time:timeStr,
        items:[{id:svc.id,name:svc.name,price:svc.price,qty:cmd.qty,total:total}],
        total:total
      };
      setGuests(function(prev){
        return prev.map(function(g){
          if(g.id===matched.id){
            return Object.assign({},g,{tabItems:(g.tabItems||[]).concat(tabEntry)});
          }
          return g;
        });
      });
      if(showToast) showToast(svc.icon+' '+svc.name+' (×'+cmd.qty+') → Parcela '+matched.pitchCode+' — €'+total.toFixed(2),'success');
    } else if(cmd.dest==='caja5'){
      // Charge to Caja Segura (C5) — añade movimiento a entries
      var c5=_loadC5();
      c5.entries=(c5.entries||[]).concat([{
        type:'in',
        amount:total,
        note:svc.icon+' '+svc.name+(cmd.qty>1?' ×'+cmd.qty:'')+' (voz)',
        ts:new Date().toISOString()
      }]);
      _saveC5(c5);
      window.dispatchEvent(new CustomEvent('cs:caja-updated'));
      window.dispatchEvent(new CustomEvent('cs:c5-updated'));
      if(showToast) showToast(svc.icon+' '+svc.name+' (×'+cmd.qty+') → Caja 5 — €'+total.toFixed(2),'success');
    } else {
      // Charge to caja del día — write to today's date bucket
      var today=now.toISOString().split('T')[0];
      var caja=_loadCaja();
      var dayBucket=caja[today]||{manualEntries:[],notes:'',fondo:'',cajaClose:null,turnoClose:null};
      dayBucket.manualEntries=(dayBucket.manualEntries||[]).concat([{
        id:'v'+Date.now(),
        type:'in',
        desc:svc.icon+' '+svc.name+(cmd.qty>1?' ×'+cmd.qty:''),
        amount:total,
        ts:Date.now()
      }]);
      caja[today]=dayBucket;
      _saveCaja(caja);
      // Notificar a CajaDiariaPage para que refresque su estado
      window.dispatchEvent(new CustomEvent('cs:caja-updated'));
      if(showToast) showToast(svc.icon+' '+svc.name+' (×'+cmd.qty+') → Caja — €'+total.toFixed(2),'success');
    }
    setPendingCmd(null);
    setVState('idle');
    }catch(err){
      // 2026-04-22: cualquier excepción en confirmCommand la atrapamos aquí
      // para que el modal NO se quede congelado. Mostramos el error al usuario.
      console.error('[VoiceCommand] confirmCommand falló:', err);
      setErrMsg('Error al registrar el cargo: '+(err&&err.message||err));
      setVState('error');
    }
  }

  // 2026-04-22: Fallback al pulsar "Cargar en caja" desde el estado de error
  // (cuando la parcela no tenía huésped). Lleva el cargo a la caja del día.
  function confirmFallbackCaja(){
    var cmd=pendingCmd;
    if(!cmd){setVState('idle');return;}
    try{
      var svc=cmd.service;
      var total=(svc.price*cmd.qty);
      var today=new Date().toISOString().split('T')[0];
      var caja=_loadCaja();
      var dayBucket=caja[today]||{manualEntries:[],notes:'',fondo:'',cajaClose:null,turnoClose:null};
      dayBucket.manualEntries=(dayBucket.manualEntries||[]).concat([{
        id:'v'+Date.now(), type:'in',
        desc:svc.icon+' '+svc.name+(cmd.qty>1?' ×'+cmd.qty:'')+' (voz — fallback)',
        amount:total, ts:Date.now()
      }]);
      caja[today]=dayBucket;
      _saveCaja(caja);
      window.dispatchEvent(new CustomEvent('cs:caja-updated'));
      if(showToast) showToast(svc.icon+' '+svc.name+' (×'+cmd.qty+') → Caja del día — €'+total.toFixed(2),'success');
      setPendingCmd(null);
      setVState('idle');
    }catch(err){
      console.error('[VoiceCommand] fallback caja falló:', err);
      setErrMsg('Error: '+(err&&err.message||err));
    }
  }

  function cancelCommand(){setPendingCmd(null);setVState('idle');}

  function saveServices(arr){setServices(arr);_saveVoiceServices(arr);}

  function addService(){
    var n=newName.trim();
    var p=parseFloat(newPrice)||0;
    var kws=newKw.trim().toLowerCase().split(',').map(function(k){return k.trim();}).filter(Boolean);
    if(!n||!p||!kws.length)return;
    var arr=services.concat([{id:'vs'+Date.now(),name:n,keywords:kws,price:p,icon:'🔹',dest:newDest}]);
    saveServices(arr);
    setNewName('');setNewPrice('');setNewKw('');setNewDest('parcela');
  }

  function delService(id){saveServices(services.filter(function(s){return s.id!==id;}));}

  function updatePrice(id,val){
    saveServices(services.map(function(s){return s.id===id?Object.assign({},s,{price:parseFloat(val)||s.price}):s;}));
  }

  // fab onClick
  function onFabClick(){
    if(vState==='listening'){stopListening();return;}
    if(vState==='confirm'||vState==='error'){setVState('idle');return;}
    startListening();
  }

  var fabClass='voice-fab'+(vState==='listening'?' voice-fab--listening':vState==='processing'?' voice-fab--processing':'');
  var fabIcon=vState==='listening'?'⏹':vState==='processing'?'⌛':'🎤';

  return e(React.Fragment,null,
    // Settings toggle
    e('button',{className:'voice-settings-btn',title:'Servicios de voz',
      onClick:function(){setShowSettings(function(v){return !v;})}},'⚙️'),

    // Settings panel
    showSettings?e('div',{className:'voice-settings-panel'},
      e('div',{className:'voice-settings-title'},
        e('span',null,'Servicios de Voz'),
        e('button',{onClick:function(){setShowSettings(false)},
          style:{background:'none',border:'none',cursor:'pointer',fontSize:16,color:'#999'}},'✕')
      ),
      services.map(function(svc){
        return e('div',{key:svc.id,className:'voice-service-row'},
          e('span',{style:{fontSize:16}},svc.icon),
          e('span',{className:'voice-service-name'},svc.name),
          e('span',{style:{fontSize:'.72rem',color:'#aaa',marginRight:4}},svc.dest==='caja'?'📦':'📍'),
          e('div',{className:'voice-service-price'},
            e('input',{type:'number',value:svc.price,min:0,step:0.5,

        e('div',{style:{display:'flex',gap:4}},
          e('input',{type:'text',placeholder:'Nombre',value:newName,onChange:function(ev){setNewName(ev.target.value);},style:{flex:2}}),
          e('input',{type:'number',placeholder:'€',value:newPrice,onChange:function(ev){setNewPrice(ev.target.value);},style:{width:52}}),
          e('select',{value:newDest,onChange:function(ev){setNewDest(ev.target.value);},style:{fontSize:'.75rem',border:'1px solid #ddd',borderRadius:6,padding:'4px 4px'}},
            e('option',{value:'parcela'},'\ud83d\udccd Parcela'),

          )
        ),
        e('div',{style:{display:'flex',gap:4}},

          e('button',{onClick:addService,

            '\ud83d\udcbe Guardar')

      )
    ):null,

    // FAB
    e('button',{className:fabClass,title:'Comando de voz',onClick:onFabClick},fabIcon),

    // Modal overlay
    (vState==='listening'||vState==='processing'||vState==='confirm'||vState==='error')?

            ):
            vState==='processing'?e('div',{className:'voice-listen-box',style:{background:'#fff3e0'}},
              e('div',{style:{fontSize:'1.2rem',color:'#fb8c00'}},'⌛'),

function simHash(str){var h1=0xdeadbeef^0,h2=0x41c6ce57^0;for(var i=0,ch;i<str.length;i++){ch=str.charCodeAt(i);h1=Math.imul(h1^ch,2654435761);h2=Math.imul(h2^ch,1597334677);}h1=Math.imul(h1^(h1>>>16),2246822507)^Math.imul(h2^(h2>>>13),3266489909);h2=Math.imul(h2^(h2>>>16),2246822507)^Math.imul(h1^(h1>>>13),3266489909);return(4294967296*(2097151&h2)+(h1>>>0)).toString(16).padStart(16,'0')+Date.now().toString(16)+(str.length*13).toString(16).padStart(32,'0');}

// ==================== TOMBSTONES DE RESERVAS BORRADAS ====================
// Bug arreglado 2026-04-22: al borrar una reserva, el snapshot de Firestore
// (onSnapshot en firestore-db.js) podía disparar con la lista AÚN incluyendo
// el doc (hay ventana de ~1–2 s antes de que el delete se consolide). Eso
// repoblaba el state y la reserva "reaparecía".
// Guardamos los IDs/bookCodes recién borrados durante 2 min y los filtramos
// en todos los paths que re-hidratan `guests` desde localStorage/snapshot.
window.Checksmart = window.Checksmart || {};
if(!window.Checksmart._deletedGuests){
  window.Checksmart._deletedGuests = Object.create(null);
  window.Checksmart._tombAdd = function(id, bookCode){
    var t = window.Checksmart._deletedGuests;
    var now = Date.now();
    if(id!=null && id!=='') t['id:'+String(id)] = now;
    if(bookCode) t['bc:'+bookCode] = now;
  };
  window.Checksmart._tombFilter = function(list){
    var t = window.Checksmart._deletedGuests;
    var now = Date.now();
    // Limpieza: tombstones >2 min ya están consolidadas
    Object.keys(t).forEach(function(k){ if(now - t[k] > 120000) delete t[k]; });
    if(!Array.isArray(list)) return list;
    return list.filter(function(g){
      if(!g) return false;
      // Soft-delete persistente (papelera): cualquier doc con _deleted:true queda
      // oculto de las vistas normales. Sigue existiendo en Firestore y aparece en
      // la pestaña "Papelera" hasta que expire su plazo (30 días) o se restaure.
      if(g._deleted === true) return false;
      // Tombstone corto post-borrado (evita repoblado por snapshot en la ventana
      // de consolidación de 1–2 s).
      if(g.id!=null && t['id:'+String(g.id)]) return false;
      if(g.bookCode && t['bc:'+g.bookCode]) return false;
      return true;
    });
  };
  // Listado de docs en papelera (sólo los _deleted:true, para la pestaña Papelera).
  window.Checksmart._trashFilter = function(list){
    if(!Array.isArray(list)) return [];
    return list.filter(function(g){ return g && g._deleted === true; });
  };
}

  function _csFirebaseAuth(user, pin){
    // POST-RESET 2026-04-28:
    // YA NO creamos users `u{id}@{tenant}.cs.internal` por PIN. Eso causaba
    // bugs de permission-denied porque cada PIN distinto creaba un Auth user
    // nuevo, y la app intentaba loguear con pass derivada del PIN — si el
    // user ya existía con otra pass, fallaba y la sesión quedaba como
    // anonymous sin claims. Las reglas Firestore bloqueaban TODO.
    //
    // Ahora usamos UN ÚNICO user Firebase por tenant (el del /login/ con
    // email+password real, ej. areamalagabeach@gmail.com). El PIN local
    // sigue siendo la barrera de acceso a la app y la pista de auditoría
    // (_changedBy), pero NO toca Firebase Auth.
    //
    // Si por alguna razón el user actual no tiene claims (caso primera vez
    // que un email se loguea), pedimos claims y forzamos refresh — pero
    // SIN crear users nuevos y SIN reload (que causaba bucles).
    try {
      if(!window.firebase || !window.firebase.auth) return;
      var tenantId = (window.Checksmart && window.Checksmart.tenantId) || 'demo';
      var auth  = window.firebase.auth();
      var fbUser = auth.currentUser;
      if(!fbUser || fbUser.isAnonymous){
        console.warn('[CS-Auth] No hay user Firebase real — usuario debe loguearse en /login/ primero');
        return;
      }
      // Verificar claims — si ya están bien, no tocar nada
      fbUser.getIdTokenResult(true).then(function(res){
        if(res && res.claims && res.claims.tenantId === tenantId){
          console.log('[CS-Auth] Claims OK · tenantId=' + tenantId);
          return;
        }
        // Claims faltan o no coinciden → pedir al backend que los asigne
        fbUser.getIdToken().then(function(idToken){
          var projectId = (window.Checksmart && window.Checksmart.firebaseProjectId) || 'checkingsmart-564a0';
          fetch('https://europe-west1-' + projectId + '.cloudfunctions.net/assignTenantClaim', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + idToken },
            body: JSON.stringify({ tenantId: tenantId })
          }).then(function(r){
            if(!r || !r.ok){ console.warn('[CS-Auth] assignTenantClaim no devolvió ok'); return; }
            // Force-refresh del token para que los nuevos claims estén activos
            fbUser.getIdToken(true).then(function(){
              console.log('[CS-Auth] Claims asignados y refrescados');
            }).catch(function(){});
          }).catch(function(e){ console.warn('[CS-Auth] fetch error:', e && e.message); });
        });
      }).catch(function(e){ console.warn('[CS-Auth] getIdTokenResult error:', e && e.message); });
    } catch(e){ console.warn('[CS-Auth] init error', e); }
  }
