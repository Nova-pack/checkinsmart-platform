// ── AUTO-UPDATE detector (post-fix 28/04/2026) ──────────────────────────
// Cada 5 minutos comprueba /version.json. Si la versión cambió respecto
// a la que tenía al cargar la página, muestra banner azul invitando al
// cliente a recargar. Sin esto, los clientes que dejan la pestaña abierta
// días/semanas se quedan con código antiguo y NO reciben actualizaciones.
var _csInitialVer = null;
function _csCheckVersion(){
  try{
    fetch('/version.json?_='+Date.now(),{cache:'no-store'})
      .then(function(r){ return r.ok ? r.json() : null; })
      .then(function(d){
        if(!d || !d.version) return;
        if(_csInitialVer===null){ _csInitialVer = d.version; return; }
        if(d.version !== _csInitialVer){
          var banner = document.getElementById('cs-update-banner');
          if(banner) return; // ya mostrado
          banner = document.createElement('div');
          banner.id = 'cs-update-banner';
          banner.style.cssText = 'position:fixed;top:0;left:0;right:0;background:#1565c0;color:white;text-align:center;padding:14px;font-weight:700;font-size:.95rem;z-index:99998;box-shadow:0 4px 14px rgba(0,0,0,.3)';
          banner.innerHTML = '🆕 Hay una nueva versión de CheckinSmart disponible. <button id="cs-update-btn" style="background:white;color:#1565c0;border:none;padding:7px 20px;border-radius:6px;font-weight:700;cursor:pointer;margin-left:14px;font-size:.9rem">Actualizar ahora</button>';
          document.body.appendChild(banner);
          document.getElementById('cs-update-btn').onclick = function(){ location.reload(); };
        }
      })
      .catch(function(){});
  }catch(_){}
}
// Comprobar a los 8s del arranque (deja que la app monte) y luego cada 5 min
setTimeout(_csCheckVersion, 8000);
setInterval(_csCheckVersion, 5*60*1000);

// ── AVISO sesión rota (post-fix 28/04/2026) ─────────────────────────────
// Si la sesión Firebase no tiene claim tenantId, todas las escrituras
// fallarán silenciosamente con permission-denied. Mostrar banner rojo
// fijado arriba de la app para que el usuario sepa que tiene que loguearse.
function _csCheckClaims(){
  try{
    if(!window.firebase || !window.firebase.auth) return;
    var u = window.firebase.auth().currentUser;
    if(!u) return; // anonymous está OK para motor público
    u.getIdTokenResult().then(function(res){
      var expectedTid = (window.Checksmart && window.Checksmart.tenantId) || null;
      var claimTid = res && res.claims && res.claims.tenantId;
      // Mostrar banner también si el user es anónimo en contexto de app (sin claims → escrituras silenciosas fallidas)
      var isAnonymousInApp = u.isAnonymous && expectedTid && expectedTid !== 'demo';
      var bad = isAnonymousInApp || (expectedTid && claimTid !== expectedTid && !u.isAnonymous);
      var existing = document.getElementById('cs-claim-warn');
      if(bad){
        if(!existing){
          var div = document.createElement('div');
          div.id = 'cs-claim-warn';
          div.style.cssText = 'position:fixed;top:0;left:0;right:0;background:#c62828;color:white;text-align:center;padding:10px;font-weight:700;font-size:.92rem;z-index:99999;box-shadow:0 4px 12px rgba(0,0,0,.3)';
          div.innerHTML = '⚠ Sesión sin permisos · Tus cambios NO se guardarán · <a href="/login/" style="color:#fff;text-decoration:underline">Pulsa aquí para iniciar sesión</a>';
          document.body.appendChild(div);
        }
      } else if(existing) {
        existing.remove();
      }
    }).catch(function(){});
  }catch(e){}
}
// Comprobar al arrancar y cada 30s
setTimeout(_csCheckClaims, 3000);
setInterval(_csCheckClaims, 30000);

// ── FASE 2: esperar a que Firestore haya hidratado localStorage ─────────────
var _csRoot = document.getElementById('root');
var _csLoadingEl = document.getElementById('cs-loading');

function _csMountApp() {
  if (_csLoadingEl) _csLoadingEl.style.display = 'none';
  if (_csRoot) {
    ReactDOM.render(React.createElement(App), _csRoot);
  }
}

if (window.Checksmart && window.Checksmart.dbReady) {
  _csMountApp();
} else {
  var _csDbTimeout = setTimeout(function () {
    console.warn('[CS] Timeout esperando cs:db-ready — arrancando con datos locales');
    _csMountApp();
  }, 20000);

  window.addEventListener('cs:db-ready', function _onDbReady() {
    window.removeEventListener('cs:db-ready', _onDbReady);
    clearTimeout(_csDbTimeout);
    _csMountApp();
  });
}
})();
