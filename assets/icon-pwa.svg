<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#4fc3f7"/>
      <stop offset="50%"  stop-color="#0288d1"/>
      <stop offset="100%" stop-color="#01579b"/>
    </linearGradient>
    <radialGradient id="hl" cx="30%" cy="22%" r="60%">
      <stop offset="0%"   stop-color="rgba(255,255,255,0.40)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0)"/>
    </radialGradient>
    <linearGradient id="cg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#e3f2fd"/>
    </linearGradient>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- Rounded square background (app icon style) -->
  <rect x="0" y="0" width="512" height="512" rx="112" fill="url(#bg)"/>
  <!-- Top highlight -->
  <rect x="0" y="0" width="512" height="512" rx="112" fill="url(#hl)"/>
  <!-- Subtle inner ring -->
  <circle cx="256" cy="256" r="180" fill="none" stroke="rgba(255,255,255,0.18)" stroke-width="3"/>
  <!-- Big bold checkmark -->
  <polyline points="150,260 230,340 380,180"
            stroke="url(#cg)" stroke-width="52"
            stroke-linecap="round" stroke-linejoin="round"
            fill="none" filter="url(#glow)"/>
  <!-- Small orange accent dot (brand identity) -->
  <circle cx="396" cy="396" r="22" fill="#FF6B35"/>
  <circle cx="396" cy="396" r="22" fill="none" stroke="rgba(255,255,255,0.3)" stroke-width="2"/>
</svg>
